<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0077b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%230077b6' width='512' height='512' rx='96'/%3E%3Ctext x='256' y='320' font-size='240' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%230077b6' width='512' height='512' rx='96'/%3E%3Ctext x='256' y='320' font-size='240' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
<title>临床助手</title>
<style>
/* ===== 1. CSS Variables ===== */
:root {
  --primary: #0077b6;
  --primary-dark: #005a8a;
  --primary-light: #e6f3fa;
  --danger: #e63946;
  --danger-bg: #ffebee;
  --warning: #f4a261;
  --warning-bg: #fff8e1;
  --success: #2a9d8f;
  --success-bg: #e8f5f3;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #5c6b73;
  --border: #e1e5e9;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-h: 44px;
  --tabbar-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --primary: #4dabf7;
  --primary-dark: #339af0;
  --primary-light: #1a3a5c;
  --danger: #ff6b6b;
  --danger-bg: #3a1a1a;
  --warning: #ffd43b;
  --warning-bg: #3a3310;
  --success: #51cf66;
  --success-bg: #1a3a1a;
  --bg: #0f1419;
  --card: #1a1f2e;
  --text: #e9ecef;
  --text2: #adb5bd;
  --border: #2d3748;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

/* ===== 2. Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:15px;
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  transition:background .3s,color .3s;
}
input,select,textarea,button{font:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-user-select:none;user-select:none}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ===== 3. Header ===== */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:100;
  display:flex;align-items:center;padding:0 12px;gap:8px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:.95rem;font-weight:600;
  box-shadow:0 1px 8px rgba(0,0,0,.12);
}
.app-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.15);font-size:.9rem;transition:background .2s;
}
.header-btn:active{background:rgba(255,255,255,.3)}

/* ===== 4. Bottom Tab Bar ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-h);
  padding-bottom:var(--safe-bottom);
  display:flex;background:var(--card);border-top:1px solid var(--border);
  z-index:100;box-shadow:0 -1px 8px rgba(0,0,0,.06);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:.65rem;color:var(--text2);transition:color .2s;position:relative;
}
.tab-item .tab-icon{font-size:1.2rem;line-height:1}
.tab-item.active{color:var(--primary)}
.tab-item.active::after{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;
  background:var(--primary);border-radius:0 0 2px 2px;
}

/* ===== 5. Page Container ===== */
.page{
  position:absolute;top:var(--header-h);bottom:var(--tabbar-h);left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px;padding-bottom:calc(12px + var(--safe-bottom));
  display:none;
}
.page.active{display:block}
.page-ai.active{display:flex;flex-direction:column;padding-bottom:0}
.page-ai #aiChatBody{flex:1;overflow-y:auto;min-height:0}

/* ===== 6. Cards ===== */
.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;margin-bottom:10px;
}
.card-title{font-weight:600;font-size:.9rem;margin-bottom:8px}

/* ===== 7. Patient Cards ===== */
.pt-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:12px 14px;margin-bottom:10px;
  border-left:4px solid var(--success);cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.pt-card:active{transform:scale(.98);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.pt-card.severity-critical{border-left-color:var(--danger)}
.pt-card.severity-warning{border-left-color:var(--warning)}
.pt-card.severity-stable{border-left-color:var(--success)}
.pt-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pt-card-name{font-weight:700;font-size:.95rem}
.pt-card-bed{
  font-size:.72rem;padding:1px 6px;border-radius:4px;
  background:var(--primary-light);color:var(--primary);font-weight:500;
}
.pt-card-demo{font-size:.75rem;color:var(--text2);margin-left:auto}
.pt-card-dx{font-size:.78rem;color:var(--text2);margin-bottom:4px}
.pt-card-vitals{font-size:.78rem;display:flex;flex-wrap:wrap;gap:6px 12px}
.pt-card-vitals span{white-space:nowrap}
.pt-card-labs{font-size:.75rem;margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 8px}
.pt-card-labs .abnormal{color:var(--danger);font-weight:600}
.pt-card-labs .warning{color:var(--warning)}
.pt-card-spark{margin-top:4px}

/* ===== 8. Severity Badge ===== */
.severity-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  display:inline-block;
}
.severity-dot.critical{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.severity-dot.warning{background:var(--warning)}
.severity-dot.stable{background:var(--success)}

/* ===== 9. Alerts Panel ===== */
.alerts-panel{
  background:var(--danger-bg);border:1px solid rgba(230,57,70,.2);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;
}
.alerts-panel-title{font-size:.82rem;font-weight:600;color:var(--danger);margin-bottom:6px}
.alerts-panel-item{font-size:.78rem;padding:2px 0;display:flex;gap:6px;align-items:center}
.alerts-panel-item .alert-name{font-weight:500}
.alerts-panel-item .alert-value{color:var(--danger)}

/* ===== 10. Quick Tools ===== */
.quick-tools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.qt-btn{
  padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid var(--border);
  transition:all .15s;
}
.qt-btn:active{background:var(--primary);color:#fff}
.qt-trigger.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 11. Forms ===== */
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-input,.pt-input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--card);font-size:.9rem;transition:border-color .2s;
}
.form-input:focus,.pt-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 15%,transparent)}
.pt-input{background:var(--bg);border-color:color-mix(in srgb,var(--border) 80%,var(--text2))}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
textarea.form-input{min-height:80px;resize:vertical;line-height:1.6}

/* ===== 12. Buttons ===== */
.btn{
  padding:10px 16px;border-radius:8px;font-size:.85rem;font-weight:500;
  transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:4px;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-secondary.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 10px;font-size:.78rem}
.btn-block{width:100%}

/* ===== 13. Sub Tabs ===== */
.sub-tabs{
  display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;
  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  flex-shrink:0;padding:10px 14px;font-size:.82rem;font-weight:500;
  color:var(--text2);border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.sub-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ===== 14. Accordion ===== */
.accordion-item{margin-bottom:6px}
.accordion-header{
  display:flex;align-items:center;gap:8px;padding:12px 14px;
  background:var(--card);border-radius:var(--radius);cursor:pointer;
  font-weight:600;font-size:.88rem;transition:background .15s;
  box-shadow:var(--shadow);
}
.accordion-header:active{background:var(--primary-light)}
.accordion-header .acc-icon{font-size:1rem}
.accordion-header .acc-arrow{
  margin-left:auto;font-size:.7rem;color:var(--text2);
  transition:transform .2s;
}
.accordion-item.open .acc-arrow{transform:rotate(90deg)}
.accordion-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  padding:0 4px;
}
.accordion-item.open .accordion-body{max-height:3000px}
.accordion-body-inner{padding:8px 0}

/* ===== 15. Result Display ===== */
.result-box{
  padding:10px 12px;border-radius:8px;margin:8px 0;font-size:.85rem;
  line-height:1.7;background:var(--bg);border:1px solid var(--border);
}
.result-box .res-label{color:var(--text2);font-size:.78rem}
.result-box .res-value{font-weight:600;font-size:1rem}
.result-ok{border-color:var(--success);background:var(--success-bg)}
.result-warn{border-color:var(--warning);background:var(--warning-bg)}
.result-danger{border-color:var(--danger);background:var(--danger-bg)}

/* ===== 16. Toast ===== */
.toast{
  position:fixed;top:calc(var(--header-h) + 8px);left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;
  background:rgba(0,0,0,.8);color:#fff;z-index:999;
  transition:transform .3s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== 17. Bottom Sheet ===== */
.bottom-sheet-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.bottom-sheet-mask.show{opacity:1;pointer-events:auto}
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;max-height:70vh;
  background:var(--card);border-radius:16px 16px 0 0;z-index:201;
  transform:translateY(100%);transition:transform .3s ease;
  overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bottom));
}
.bottom-sheet.show{transform:translateY(0)}
.bottom-sheet-handle{
  width:36px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 16px;
}

/* ===== 18. Slide Page ===== */
.slide-page{
  position:fixed;top:0;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg);transform:translateX(100%);
  transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.slide-page.show{transform:translateX(0)}
.slide-header{
  position:sticky;top:0;z-index:10;height:var(--header-h);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  background:var(--card);border-bottom:1px solid var(--border);
}
.slide-back{font-size:1.2rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.slide-title{flex:1;font-weight:600;font-size:.95rem}
.slide-actions{display:flex;gap:6px}
.slide-body{padding:12px;padding-bottom:calc(80px + var(--safe-bottom))}

/* ===== 19. AI Chat ===== */
.ai-msg{
  padding:10px 14px;border-radius:12px;margin-bottom:8px;
  font-size:.88rem;line-height:1.7;max-width:88%;word-break:break-word;
}
.ai-msg-user{background:var(--primary);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.ai-msg-assistant{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.ai-thinking{font-size:.72rem;color:var(--text2);padding:2px 0 4px;opacity:.7}
.ai-thinking .spin{
  display:inline-block;width:12px;height:12px;
  border:2px solid var(--primary);border-top-color:transparent;
  border-radius:50%;animation:spin .8s linear infinite;margin-right:4px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-quick-cmds{
  display:flex;gap:6px;overflow-x:auto;padding:8px 0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.ai-quick-cmds::-webkit-scrollbar{display:none}
.ai-cmd-btn{
  flex-shrink:0;padding:6px 12px;border-radius:16px;font-size:.78rem;
  background:var(--primary-light);color:var(--primary);border:1px solid var(--border);
}
.ai-cmd-btn:active{background:var(--primary);color:#fff}
.ai-input-bar{
  display:flex;gap:6px;padding:10px 12px;
  background:var(--bg);border-top:1px solid var(--border);
}
.ai-input-bar input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;
  background:var(--card);font-size:.9rem;
}
.ai-input-bar input:focus{border-color:var(--primary)}
.ai-input-bar .send-btn{
  width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
}
.ai-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ai-status-dot.connected{background:var(--success)}
.ai-status-dot.disconnected{background:var(--danger)}

/* ===== 20. Settings ===== */
.settings-group{margin-bottom:16px}
.settings-group-title{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:14px;
  background:var(--card);border-radius:var(--radius);margin-bottom:2px;cursor:pointer;
}
.settings-item:first-of-type{border-radius:var(--radius) var(--radius) 4px 4px}
.settings-item:last-of-type{border-radius:4px 4px var(--radius) var(--radius)}
.settings-item:only-of-type{border-radius:var(--radius)}
.settings-item+.settings-item{margin-top:-2px}
.settings-icon{font-size:1.2rem;width:28px;text-align:center}
.settings-text{flex:1}
.settings-label{font-size:.9rem;font-weight:500}
.settings-desc{font-size:.75rem;color:var(--text2)}
.settings-arrow{color:var(--text2);font-size:.8rem}
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border);
  position:relative;transition:background .2s;cursor:pointer;
}
.toggle.on{background:var(--primary)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(20px)}

/* ===== 21. Search Overlay ===== */
.search-overlay{
  position:fixed;inset:0;z-index:180;background:var(--bg);
  transform:translateY(-100%);transition:transform .25s ease;
  padding:12px;overflow-y:auto;
}
.search-overlay.show{transform:translateY(0)}
.search-bar{
  display:flex;gap:8px;align-items:center;margin-bottom:12px;
}
.search-bar input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);font-size:.9rem;
}
.search-bar input:focus{border-color:var(--primary)}

/* ===== 22. Utility ===== */
.hidden{display:none!important}
.text-center{text-align:center}
.text-sm{font-size:.78rem}
.text-secondary{color:var(--text2)}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-6{gap:6px}.gap-8{gap:8px}
.overflow-auto{overflow-x:auto}

/* ===== 23. Date Nav ===== */
.date-nav{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:8px 0;margin-bottom:8px;
}
.date-nav button{
  width:32px;height:32px;border-radius:50%;background:var(--bg);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
}
.date-nav button:active{background:var(--primary-light)}
.date-nav .date-display{font-size:.88rem;font-weight:600;min-width:120px;text-align:center}

/* ===== 24. Event Log ===== */
.event-tag{
  display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:4px;font-size:.72rem;font-weight:500;margin:2px;
}
.event-tag.critical{background:var(--danger-bg);color:var(--danger)}
.event-tag.procedure{background:var(--primary-light);color:var(--primary)}
.event-tag.info{background:var(--bg);color:var(--text2)}

/* ===== 25. Med List ===== */
.med-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--bg);border-radius:8px;margin-bottom:4px;font-size:.85rem;
}
.med-item .med-name{font-weight:600;flex:1}
.med-item .med-dose{color:var(--text2)}
.med-item .med-del{color:var(--danger);font-size:.9rem;padding:4px}

/* ===== 26. Lab Mode Toggle ===== */
.lab-mode-toggle{display:flex;gap:0;margin-bottom:10px}
.lab-mode-toggle button{
  flex:1;padding:8px;border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-size:.82rem;transition:all .15s;
}
.lab-mode-toggle button:first-child{border-radius:6px 0 0 6px}
.lab-mode-toggle button:last-child{border-radius:0 6px 6px 0}
.lab-mode-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 27. Sparkline ===== */
.sparkline{display:inline-block;vertical-align:middle}

/* ===== 31. Calc Cards ===== */
.calc-card{
  background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px;
  border:1px solid var(--border);
}

/* ===== 28. Crit Inline ===== */
.crit-inline{font-size:.72rem;padding:2px 0;min-height:16px}
.crit-inline.danger{color:var(--danger);font-weight:600}
.crit-inline.warn{color:var(--warning)}

/* ===== 29. Save Indicator ===== */
.save-indicator{
  position:fixed;bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 8px);
  right:12px;padding:4px 10px;border-radius:12px;font-size:.72rem;
  background:var(--success-bg);color:var(--success);opacity:0;
  transition:opacity .3s;pointer-events:none;z-index:50;
}
.save-indicator.show{opacity:1}

/* ===== 30. Responsive ===== */
@media(min-width:768px){
  body{max-width:500px;margin:0 auto;box-shadow:-1px 0 0 var(--border),1px 0 0 var(--border)}
  .app-header,.tabbar{max-width:500px;left:50%;right:auto;transform:translateX(-50%)}
  .slide-page{max-width:500px;left:50%;right:auto}
  .slide-page.slide-page{transform:translateX(100%)}
  .slide-page.slide-page.show{transform:translateX(-50%)}
  .search-overlay{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100%)}
  .search-overlay.show{transform:translateX(-50%) translateY(0)}
  .toast{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100px)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .bottom-sheet{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(100%)}
  .bottom-sheet.show{transform:translateX(-50%) translateY(0)}
}
</style>
</head>
<body>
<div id="db-debug" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;padding:8px 12px;font-size:.8rem;color:#fff;text-align:center;font-weight:600"></div>

<!-- ===== Header ===== -->
<header class="app-header" id="appHeader">
  <span class="app-title" id="headerTitle">临床助手</span>

<script>

   V3 — 临床助手 App
   ================================================================ */

/* ===== 4h. Utility Functions ===== */
const $ = id => document.getElementById(id);
const getVal = id => { const el = $(id); return el ? el.value?.trim() ?? '' : ''; };
const getNum = id => { const v = parseFloat(getVal(id)); return isNaN(v) ? null : v; };
const getSel = id => { const el = $(id); return el ? el.value ?? '' : ''; };
const getCheck = id => { const el = $(id); return el ? el.checked : false; };
const setVal = (id, v) => { const el = $(id); if (el) el.value = v ?? ''; };
const setSel = (id, v) => { const el = $(id); if (el) el.value = v ?? ''; };
const setCheck = (id, v) => { const el = $(id); if (el) el.checked = !!v; };
const dispatch = id => { const el = $(id); if (el) el.dispatchEvent(new Event('input', {bubbles:true})); };
const today = () => new Date().toISOString().slice(0,10);

function showToast(msg, dur=2000) {
  const el = $('toast'); if (!el) return;
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function showSaveIndicator() {
  const el = $('saveIndicator'); if (!el) return;
  el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 1500);
}

function openSheet(html) {
  $('sheetContent').innerHTML = html;
  $('bottomSheet').classList.add('show');
  $('sheetMask').classList.add('show');
}
function closeSheet() {
  $('bottomSheet').classList.remove('show');
  $('sheetMask').classList.remove('show');
}

function formatDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '/');
}

function getAdmitDays(p) {
  if (!p?.admitDate) return '?';
  return Math.floor((new Date(today()) - new Date(p.admitDate)) / 86400000) + 1;
}

function getSurgDays(p) {
  if (!p?.surgeryDate) return '';
  return Math.floor((new Date(today()) - new Date(p.surgeryDate)) / 86400000);
}

function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

/* ===== 4a. DB Storage Layer (IndexedDB primary + localStorage backup) ===== */
const DB = {
  _cache: {},
  _db: null,
  _idbReady: false,

  _showStatus(msg, type) {
    const el = document.getElementById('db-debug');
    if (el) { el.textContent = msg; el.style.background = type === 'error' ? 'var(--danger)' : type === 'warn' ? 'var(--warning)' : 'var(--success)'; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
  },

  async init() {
    // Step 1: Load localStorage into cache (instant, for fast startup)
    let lsCount = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith('mc_') || k === 'app_page')) {
        try { this._cache[k] = JSON.parse(localStorage.getItem(k)); lsCount++; } catch { this._cache[k] = localStorage.getItem(k); lsCount++; }
      }
    }

    // Step 2: Open IndexedDB (primary storage, survives browser cleanup)
    await new Promise((resolve) => {
      const req = indexedDB.open('clinic-db', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
      };
      req.onsuccess = (e) => {
        this._db = e.target.result;
        // Load all IDB data into cache (overwrites localStorage with fresh IDB data)
        const tx = this._db.transaction('kv', 'readonly');
        const store = tx.objectStore('kv');
        const cursorReq = store.openCursor();
        let idbCount = 0;
        cursorReq.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            this._cache[cursor.key] = cursor.value;
            idbCount++;
            cursor.continue();
          } else {
            this._idbReady = true;
            // Migrate any localStorage-only keys into IDB
            this._syncAllToIDB();
            // Show status
            const pts = this._cache['mc_patients'];
            const ptCount = Array.isArray(pts) ? pts.length : 0;
            this._showStatus(`V3.4 已加载: IDB=${idbCount}项, LS=${lsCount}项, ${ptCount}位患者`, 'ok');
            resolve();
          }
        };
        cursorReq.onerror = () => { this._idbReady = true; resolve(); };
      };
      req.onerror = () => {
        this._idbReady = false;
        this._showStatus(`IDB不可用, 仅用LS: ${lsCount}项`, 'warn');
        resolve();
      };
    });

    // Step 3: Request persistent storage (CRITICAL for Chrome PWA — prevents system from auto-clearing data)
    if (navigator.storage && navigator.storage.persist) {
      try {
        const isPersisted = await navigator.storage.persisted();
        if (!isPersisted) {
          const granted = await navigator.storage.persist();
          this._persistGranted = granted;
          setTimeout(() => {
            this._showStatus(granted ? '✅ 持久存储已授权(系统不再清理数据)' : '⚠️ 持久存储未授权,数据可能被系统清理', granted ? 'ok' : 'warn');
          }, 2000);
        } else {
          this._persistGranted = true;
        }
      } catch(e) {}
    }

    // Step 4: Register Service Worker (required for navigator.storage.persist())
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(r => r.update()).catch(() => {});
    }
  },

  // Sync all cached keys to IDB (for migration from localStorage)
  _syncAllToIDB() {
    if (!this._db) return;
    try {
      const tx = this._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      for (const [k, v] of Object.entries(this._cache)) {
        store.put(v, k);
      }
    } catch(e) {}
  },

  get(key, def) {
    const v = this._cache[key];
    return v !== undefined ? v : def;
  },

  set(key, val) {
    this._cache[key] = val;
    // Write to IndexedDB (primary)
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(val, key);
      } catch(e) {}
    }
    // Also write to localStorage (backup)
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  },

  remove(key) {
    delete this._cache[key];
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').delete(key);
      } catch(e) {}
    }
    try { localStorage.removeItem(key); } catch(e) {}
  }
};

// V3.4: Flush all state before page closes/hides (mobile Chrome may not fire pagehide reliably)
function _flushAllStorage(reason) {
  try {
    // Force-save any unsaved input value (even without blur)
    document.querySelectorAll('.pt-input').forEach(el => {
      try {
        if (el.dataset.pid && el.dataset.field) {
          _handleAutoSave({ target: el });
        }
      } catch(e) {}
    });
    // Flush full cache to localStorage as backup
    for (const [k, v] of Object.entries(DB._cache)) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
    }
  } catch(e) {}
}
window.addEventListener('pagehide', () => _flushAllStorage('pagehide'));
window.addEventListener('beforeunload', () => _flushAllStorage('beforeunload'));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') _flushAllStorage('visibilitychange');
});

/* ===== 4b. Router ===== */
const Router = {
  current: 'workspace',
  stack: [],

  switch(page) {
    if (this.stack.length > 0) this.pop(true);
    this.current = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = $('page-' + page);
    if (el) el.classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.page === page));
    const titles = {workspace:'工作台', toolbox:'工具箱', ai:'AI助手', settings:'设置'};
    $('headerTitle').textContent = titles[page] || '临床助手';
    DB.set('app_page', page);
    haptic();
    // Re-render page
    Pages.render(page);
  },

  push(html, title, replace) {
    if (replace && this.stack.length > 0) {
      this.stack[this.stack.length - 1] = {html, title};
    } else {
      this.stack.push({html, title});
    }
    $('slideTitle').textContent = title || '';
    $('slideBody').innerHTML = html;
    $('slidePage').classList.add('show');
  },

  pop(silent) {
    this.stack.pop();
    if (this.stack.length === 0) {
      $('slidePage').classList.remove('show');
    } else {
      const prev = this.stack[this.stack.length - 1];
      $('slideTitle').textContent = prev.title || '';
      $('slideBody').innerHTML = prev.html;
    }
    if (!silent) haptic();
  },

  init() {
    const saved = DB.get('app_page', 'workspace');
    this.current = saved;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = $('page-' + saved);
    if (el) el.classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.page === saved));
    const titles = {workspace:'工作台', toolbox:'工具箱', ai:'AI助手', settings:'设置'};
    $('headerTitle').textContent = titles[saved] || '临床助手';
  }
};

/* ===== 4c. State ===== */
const State = {
  patients: [],
  currentPatientId: null,
  currentDate: today(),
  favorites: [],
  quickCmds: [],
  labRanges: {},
  aiHistory: [],
  events: [],
  theme: 'light',

  load() {
    this.patients = DB.get('mc_patients', []);
    this.favorites = DB.get('mc_favorites', []);
    this.quickCmds = DB.get('mc_quick_cmds', [
      {id:'qc1', label:'分析血气', prompt:'请分析当前患者的血气结果'},
      {id:'qc2', label:'总结病情', prompt:'请总结患者今日病情变化'},
      {id:'qc3', label:'用药建议', prompt:'根据当前化验结果，给出用药建议'},
      {id:'qc4', label:'生成交班', prompt:'请生成交班报告'},
      {id:'qc5', label:'八项汇报', prompt:'请按八项模板（诊断/原发病/循环/呼吸/感染/脏器/营养/VTE）汇报今日病情'},
      {id:'qc6', label:'查房汇报', prompt:'查房：请分析当前患者今日变化，关注异常指标趋势'},
      {id:'qc7', label:'分析全部', prompt:'请分析所有在管患者，指出需要优先关注的患者'}
    ]);

    this.aiHistory = DB.get('mc_ai_history', []);

  },

  savePatients() { DB.set('mc_patients', this.patients); },
  saveFavorites() { DB.set('mc_favorites', this.favorites); },
  saveQuickCmds() { DB.set('mc_quick_cmds', this.quickCmds); },
  saveAIHistory() { DB.set('mc_ai_history', this.aiHistory); },
  saveEvents() { DB.set('mc_events', this.events); },

  getCurrentPatient() {
    return this.patients.find(p => p.id === this.currentPatientId) || null;
  },

  getCurrentRecord() {
    const p = this.getCurrentPatient();
    return p?.records?.[this.currentDate] || null;
  },

  getPatientRecord(p, date) {
    return p?.records?.[date] || null;
  }
};

/* ===== Search ===== */
function openSearch() {
  $('searchOverlay').classList.add('show');
  $('searchInput').focus();
}
function closeSearch() {
  $('searchOverlay').classList.remove('show');
  $('searchInput').value = '';
  $('searchResults').innerHTML = '';
}
function handleSearch(q) {
  const el = $('searchResults');
  if (!q.trim()) { el.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  let html = '';
  // Search patients
  State.patients.forEach(p => {
    if ((p.name||'').toLowerCase().includes(ql) || (p.bed||'').includes(ql) || (p.diagnosis||'').toLowerCase().includes(ql)) {
      html += `<div class="settings-item" onclick="closeSearch();openPatientDetail('${p.id}')">
        <span class="settings-icon">👤</span>
        <div class="settings-text"><div class="settings-label">${p.name} ${p.bed||''}</div>
        <div class="settings-desc">${p.diagnosis||''}</div></div></div>`;
    }
  });
  el.innerHTML = html || '<div class="text-center text-secondary text-sm" style="padding:20px">未找到</div>';
}

/* ===== Theme ===== */
function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', State.theme);
  DB.set('mc_theme', State.theme);
}
function applyTheme() {
  if (State.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
}

/* ===== Auto-save indicator ===== */
let _saveTimer = null;
function autoSave(fn) {
  fn();
  showSaveIndicator();
}

/* ===== 4i. Init ===== */
async function init() {
  await DB.init();
  State.load();
  applyTheme();
  Router.init();
  Pages.render(Router.current);
  // Night shift auto-rollover
  setInterval(() => {
    const t = today();
    if (t !== State.currentDate) {
      State.currentDate = t;
      Pages.render('workspace');
      showToast('日期已更新: ' + t);
    }
  }, 60000);
  // Smart clipboard
  document.addEventListener('paste', handlePaste);
}

/* ===== Paste Detection ===== */
function handlePaste(e) {
  const text = e.clipboardData?.getData('text') || '';
  if (text.length > 50 && /WBC|Hgb|PLT|Cr|BUN|pH|PaCO|乳酸|Na|K[\+＋]/i.test(text)) {
    openSheet(`
      <div class="card-title">📋 检测到化验文本</div>
      <p class="text-sm text-secondary mb-12">粘贴的内容看起来是化验报告</p>
      <button class="btn btn-primary btn-block mb-8" onclick="closeSheet();sendToAI('请分析以下化验结果：\\n${text.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'').slice(0,500)}')">🤖 AI 分析</button>
      <button class="btn btn-secondary btn-block" onclick="closeSheet()">取消</button>
    `);
  }
}

/* ===== 4d. Components ===== */
function SparklineCanvas(data, w=80, h=20) {
  if (!data || data.length < 2) return '';
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  let path = `M0,${h - (data[0]-min)/range*h}`;
  for (let i = 1; i < data.length; i++) {
    path += ` L${(i*step).toFixed(1)},${(h - (data[i]-min)/range*h).toFixed(1)}`;
  }
  const lastVal = data[data.length - 1];
  const prevVal = data[data.length - 2];
  const color = lastVal > prevVal ? 'var(--danger)' : lastVal < prevVal ? 'var(--success)' : 'var(--text2)';
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

/* ===== Clinical Decision Support ===== */
function getLabTrends(p) {
  if (!p?.records) return [];
  const dates = Object.keys(p.records).sort();
  if (dates.length < 2) return [];
  const alerts = [];
  const labsToCheck = [
    { key: 'cr', label: 'Cr', unit: 'μmol/L', riseAlert: 'Cr连续上升，警惕AKI', thresholds: [133, 200, 300] },
    { key: 'lac', label: '乳酸', unit: 'mmol/L', riseAlert: '乳酸持续升高，组织灌注恶化', thresholds: [2, 4] },
    { key: 'abg_lac', label: 'ABG乳酸', unit: 'mmol/L', riseAlert: '乳酸持续升高', thresholds: [2, 4] },
    { key: 'k', label: 'K⁺', unit: 'mmol/L', riseAlert: 'K⁺持续升高，注意心律', thresholds: [5.5, 6.0] },
    { key: 'plt', label: 'PLT', unit: '×10⁹/L', dropAlert: 'PLT持续下降，警惕DIC/出血', thresholds: [100, 50] },
    { key: 'hgb', label: 'Hb', unit: 'g/L', dropAlert: 'Hb持续下降，注意出血', thresholds: [90, 70] },
    { key: 'wbc', label: 'WBC', unit: '×10⁹/L', riseAlert: 'WBC持续升高，感染恶化', thresholds: [15, 20] },
    { key: 'crp', label: 'CRP', unit: 'mg/L', riseAlert: 'CRP持续升高', thresholds: [50, 100] },
    { key: 'pct', label: 'PCT', unit: 'ng/mL', riseAlert: 'PCT升高，细菌感染', thresholds: [0.5, 2] },
    { key: 'bun', label: 'BUN', unit: 'mmol/L', riseAlert: 'BUN上升', thresholds: [15, 30] },
    { key: 'na', label: 'Na⁺', unit: 'mmol/L', dropAlert: 'Na⁺下降', riseAlert: 'Na⁺升高', thresholds: [130, 150] }
  ];

  for (const lab of labsToCheck) {
    const vals = [];
    for (const d of dates.slice(-5)) {
      const v = parseFloat(p.records[d]?.labs?.[lab.key]);
      if (!isNaN(v)) vals.push({ date: d, value: v });
    }
    if (vals.length < 2) continue;
    const last3 = vals.slice(-3);
    // Check for continuous rise
    if (lab.riseAlert && last3.length >= 3 && last3[2].value > last3[1].value && last3[1].value > last3[0].value) {
      const change = last3[2].value - last3[0].value;
      alerts.push({ level: 'danger', text: `${lab.label}: ${last3[0].value}→${last3[1].value}→${last3[2].value} ↑ ${lab.riseAlert}` });
    }
    // Check for continuous drop
    if (lab.dropAlert && last3.length >= 3 && last3[2].value < last3[1].value && last3[1].value < last3[0].value) {
      alerts.push({ level: 'danger', text: `${lab.label}: ${last3[0].value}→${last3[1].value}→${last3[2].value} ↓ ${lab.dropAlert}` });
    }
    // Check current against thresholds
    const current = vals[vals.length - 1].value;
    if (lab.thresholds) {
      if (lab.thresholds[1] && current > lab.thresholds[1]) {
        alerts.push({ level: 'critical', text: `${lab.label} = ${current} ${lab.unit} ⚠️ 严重异常` });
      } else if (lab.thresholds[0] && current > lab.thresholds[0] && lab.riseAlert) {
        alerts.push({ level: 'warn', text: `${lab.label} = ${current} ${lab.unit} ↑` });
      }
      if (lab.dropAlert) {
        if (lab.thresholds[1] && current < lab.thresholds[1]) {
          alerts.push({ level: 'critical', text: `${lab.label} = ${current} ${lab.unit} ⚠️ 严重低下` });
        } else if (lab.thresholds[0] && current < lab.thresholds[0]) {
          alerts.push({ level: 'warn', text: `${lab.label} = ${current} ${lab.unit} ↓` });
        }
      }
    }
  }

  // Drug safety alerts based on Cr
  const lastCr = parseFloat(p.records[dates[dates.length-1]]?.labs?.cr);
  const meds = p.records[dates[dates.length-1]]?.medications || [];
  if (lastCr > 133) {
    for (const m of meds) {
      const name = (m.name || '').toLowerCase();
      if (name.includes('万古') || name.includes('vanco')) {
        alerts.push({ level: 'warn', text: `⚠️ ${m.name}: Cr升高(${lastCr})，建议监测万古霉素谷浓度` });
      }
      if (name.includes('氨基糖') || name.includes('庆大') || name.includes('阿米卡星') || name.includes('amikacin') || name.includes('gentam')) {
        alerts.push({ level: 'warn', text: `⚠️ ${m.name}: 肾功能下降，氨基糖苷类需调整剂量` });
      }
      if (name.includes('二甲双胍') || name.includes('metformin')) {
        alerts.push({ level: 'warn', text: `⚠️ 二甲双胍: Cr${lastCr}，eGFR<30时禁用` });
      }
      if (name.includes('呋塞米') || name.includes('furosemide')) {
        alerts.push({ level: 'info', text: `ℹ️ 呋塞米: Cr${lastCr}，利尿效果可能减弱` });
      }
    }
  }

  return alerts;
}

function getHistoricalValues(p, currentDate) {
  if (!p?.records) return {};
  const dates = Object.keys(p.records).sort();
  const idx = dates.indexOf(currentDate);
  if (idx <= 0) return {};
  const prevDate = dates[idx - 1];
  return { date: prevDate, record: p.records[prevDate] };
}

function renderTrendCharts(p) {
  if (!p?.records) return '<div class="text-sm text-secondary">暂无趋势数据</div>';
  const dates = Object.keys(p.records).sort();
  if (dates.length < 2) return '<div class="text-sm text-secondary">至少需要2天数据</div>';
  const labs = [
    { key: 'cr', label: 'Cr', unit: 'μmol/L', color: 'var(--danger)' },
    { key: 'lac', label: '乳酸', unit: 'mmol/L', color: 'var(--warning)' },
    { key: 'abg_lac', label: 'ABG乳酸', unit: 'mmol/L', color: 'var(--warning)' },
    { key: 'k', label: 'K⁺', unit: 'mmol/L', color: 'var(--primary)' },
    { key: 'na', label: 'Na⁺', unit: 'mmol/L', color: 'var(--primary)' },
    { key: 'wbc', label: 'WBC', unit: '×10⁹/L', color: 'var(--success)' },
    { key: 'plt', label: 'PLT', unit: '×10⁹/L', color: 'var(--primary)' },
    { key: 'crp', label: 'CRP', unit: 'mg/L', color: 'var(--danger)' },
    { key: 'pct', label: 'PCT', unit: 'ng/mL', color: 'var(--danger)' },
    { key: 'hgb', label: 'Hb', unit: 'g/L', color: 'var(--danger)' },
    { key: 'bun', label: 'BUN', unit: 'mmol/L', color: 'var(--text2)' },
    { key: 'abg_ph', label: 'pH', unit: '', color: 'var(--primary)' }
  ];
  let charts = '';
  for (const lab of labs) {
    const data = [];
    const dateLabels = [];
    for (const d of dates.slice(-7)) {
      const v = parseFloat(p.records[d]?.labs?.[lab.key]);
      if (!isNaN(v)) { data.push(v); dateLabels.push(d.slice(5)); }
    }
    if (data.length < 2) continue;
    const min = Math.min(...data), max = Math.max(...data);
    const range = max - min || 1;
    const w = 120, h = 24;
    const step = w / (data.length - 1);
    let path = `M0,${h - (data[0]-min)/range*h}`;
    for (let i = 1; i < data.length; i++) {
      path += ` L${(i*step).toFixed(1)},${(h - (data[i]-min)/range*h).toFixed(1)}`;
    }
    const trend = data[data.length-1] > data[0] ? '↑' : data[data.length-1] < data[0] ? '↓' : '→';
    const trendColor = data[data.length-1] > data[0] ? 'var(--danger)' : 'var(--success)';
    charts += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.82rem">
      <span style="width:60px;font-weight:500">${lab.label}</span>
      <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="flex-shrink:0">
        <path d="${path}" fill="none" stroke="${lab.color}" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span style="width:60px;text-align:right">${data[data.length-1]}${lab.unit}</span>
      <span style="color:${trendColor};width:16px">${trend}</span>
    </div>`;
  }
  return charts || '<div class="text-sm text-secondary">暂无趋势数据</div>';
}

function getDrugSafetyAlerts(p, rec) {
  const cr = parseFloat(rec?.labs?.cr);
  const eGFRStr = calcEgfrForPatient(p, rec);
  const eGFRMatch = eGFRStr.match(/eGFR\s*=\s*([\d.]+)/);
  const eGFR = eGFRMatch ? parseFloat(eGFRMatch[1]) : null;
  const meds = rec?.medications || [];
  if (!meds.length || (isNaN(cr) && !eGFR)) return '';
  const alerts = [];
  // Check medications against renal function
  for (const m of meds) {
    const name = (m.name || '').toLowerCase();
    if (eGFR && eGFR < 30) {
      if (name.includes('二甲双胍') || name.includes('metformin')) alerts.push(`⚠️ 二甲双胍: eGFR ${eGFR} mL/min < 30，禁用`);
      if (name.includes('地高辛') || name.includes('digoxin')) alerts.push(`⚠️ 地高辛: eGFR ${eGFR}，需减量并监测血药浓度`);
    }
    if (cr > 133 || (eGFR && eGFR < 60)) {
      if (name.includes('万古') || name.includes('vanco')) alerts.push(`⚠️ 万古霉素: Cr${cr}，建议监测谷浓度，调整剂量`);
      if (name.includes('庆大') || name.includes('gentam') || name.includes('阿米卡') || name.includes('amikacin') || name.includes('妥布') || name.includes('tobra')) alerts.push(`⚠️ 氨基糖苷类: 肾功能下降，需调整剂量`);
      if ((name.includes('肝素') || name.includes('heparin')) && !name.includes('低分子')) alerts.push(`ℹ️ 普通肝素: Cr${cr}，如HIT风险考虑换用`);
    }
    if (cr > 100) {
      if (name.includes('nsaid') || name.includes('布洛芬') || name.includes('双氯芬') || name.includes('美洛昔康') || name.includes('塞来昔布')) alerts.push(`⚠️ NSAIDs: Cr${cr}，避免使用或密切监测`);
    }
  }
  if (!alerts.length) return '';
  return `<div class="alerts-panel" style="border-color:var(--warning);background:var(--warning-bg);margin-bottom:10px">
    <div class="alerts-panel-title" style="color:var(--warning)">💊 药物安全提醒</div>
    ${alerts.map(a => `<div class="alerts-panel-item">${a}</div>`).join('')}
  </div>`;
}

function SeverityDot(level) {

function PatientCard(p) {
  const rec = State.getPatientRecord(p, State.currentDate);
  const sv = getSeverity(p);
  const sexAge = (p.sex === '男' ? 'M' : p.sex === '女' ? 'F' : '') + (p.age || '');
  const vitalStr = [];
  if (rec?.vitals) {
    const v = rec.vitals;
    if (v.temp) vitalStr.push(`T${v.temp}`);
    if (v.hr) vitalStr.push(`HR${v.hr}`);
    if (v.sbp && v.dbp) vitalStr.push(`BP${v.sbp}/${v.dbp}`);
    if (v.spo2) vitalStr.push(`SpO₂${v.spo2}`);
  }
  const abnorms = getAbnormals(rec);
  const sparkItems = getSparkItems(p);
  return `<div class="pt-card severity-${sv}" onclick="openPatientDetail('${p.id}')">
    <div class="pt-card-header">
      ${SeverityDot(sv)}<span class="pt-card-name">${p.name}</span>
      <span class="pt-card-bed">${p.bed || ''}</span>
      <span class="pt-card-demo">${sexAge}</span>
    </div>
    ${p.diagnosis ? `<div class="pt-card-dx">${p.diagnosis}</div>` : ''}
    ${vitalStr.length ? `<div class="pt-card-vitals">${vitalStr.map(s => `<span>${s}</span>`).join('')}</div>` : ''}
    ${abnorms.length ? `<div class="pt-card-labs">${abnorms.map(a => `<span class="${a.level}">${a.label}</span>`).join('')}</div>` : ''}
    ${sparkItems.length ? `<div class="pt-card-spark">${sparkItems.join(' ')}</div>` : ''}
  </div>`;
}

function getAbnormals(rec) {
  if (!rec?.labs) return [];
  const out = [];
  const checks = [
    ['cr','Cr',44,133,'μmol/L'], ['k','K⁺',3.5,5.0,'mmol/L'], ['na','Na⁺',135,145,'mmol/L'],
    ['plt','PLT',125,350,'×10⁹/L'], ['wbc','WBC',4,10,'×10⁹/L'], ['hgb','Hb',[120,110],[160,150],'g/L'],
    ['lac','乳酸',null,2.0,'mmol/L'], ['crp','CRP',null,10,'mg/L'], ['pct','PCT',null,0.05,'ng/mL'],
    ['abg_ph','pH',7.35,7.45,''], ['abg_lac','ABG乳酸',null,2.0,'mmol/L'],
    ['abg_k','ABG K⁺',3.5,5.0,'mmol/L'], ['abg_na','ABG Na⁺',135,145,'mmol/L']
  ];
  for (const [key, label, lo, hi] of checks) {
    const val = parseFloat(rec.labs[key]);
    if (isNaN(val)) continue;
    const isCrit = (lo !== null && val < (Array.isArray(lo) ? lo[0] : lo)) || (hi !== null && val > (Array.isArray(hi) ? hi[0] : hi));
    const isWarn = !isCrit && ((lo !== null && val < (Array.isArray(lo) ? lo[1] : (typeof lo === 'number' ? lo : null))) || (hi !== null && val > (Array.isArray(hi) ? hi[1] : (typeof hi === 'number' ? hi : null))));
    if (isCrit) out.push({ label: `${label} ${val}`, level: 'abnormal' });
    else if (isWarn) out.push({ label: `${label} ${val}`, level: 'warning' });
  }
  return out.slice(0, 5);
}

function getSparkItems(p) {
  const items = [];
  const sparkKeys = [
    ['cr','Cr','var(--danger)'], ['lac','乳酸','var(--warning)'], ['wbc','WBC','var(--primary)'],
    ['k','K⁺','var(--warning)'], ['na','Na⁺','var(--primary)']
  ];
  for (const [key, label] of sparkKeys) {
    const vals = getSparkData(p, key);
    if (vals.length >= 2) {
      items.push(`${label} ${SparklineCanvas(vals)}`);
    }
  }
  return items.slice(0, 3);
}

function getSparkData(p, labKey) {
  if (!p?.records) return [];
  const dates = Object.keys(p.records).sort();
  const vals = [];
  for (const d of dates) {
    const v = parseFloat(p.records[d]?.labs?.[labKey]);
    if (!isNaN(v)) vals.push(v);
  }
  return vals;
}

function getAllAnomalies() {
  const anomalies = [];
  for (const p of State.patients) {
    const rec = State.getPatientRecord(p, State.currentDate);
    const abnorms = getAbnormals(rec);
    if (abnorms.length) {
      anomalies.push({ name: p.name, items: abnorms.map(a => a.label) });
    }
  }
  return anomalies;
}

function getSeverity(p) {
  const rec = State.getPatientRecord(p, State.currentDate);
  if (!rec) return 'stable';
  const v = rec.vitals || {};
  const l = rec.labs || {};
  // Critical
  if (v.spo2 && v.spo2 < 90) return 'critical';
  if (v.sbp && v.sbp < 90) return 'critical';
  if (l.plt && l.plt < 50) return 'critical';
  if (l.k && (l.k > 6.0 || l.k < 2.5)) return 'critical';
  if (l.na && (l.na < 120 || l.na > 160)) return 'critical';
  if (l.abg_ph && (l.abg_ph < 7.2 || l.abg_ph > 7.6)) return 'critical';
  if (l.lac && l.lac > 4) return 'critical';
  if (l.abg_lac && l.abg_lac > 4) return 'critical';
  // Warning
  if (v.hr && (v.hr > 120 || v.hr < 50)) return 'warning';
  if (v.temp && (v.temp > 39 || v.temp < 36)) return 'warning';
  if (v.sbp && v.sbp < 100) return 'warning';
  if (v.spo2 && v.spo2 < 95) return 'warning';
  if (l.cr && l.cr > 200) return 'warning';
  if (l.k && (l.k > 5.5 || l.k < 3.0)) return 'warning';
  if (l.na && (l.na < 130 || l.na > 150)) return 'warning';
  if (l.plt && l.plt < 100) return 'warning';
  if (l.wbc && (l.wbc > 15 || l.wbc < 3)) return 'warning';
  if (l.lac && l.lac > 2) return 'warning';
  if (l.abg_lac && l.abg_lac > 2) return 'warning';
  return 'stable';
}

      }
    }

function switchPatientSubTab(pid, tab) {
  _currentSubTab = tab;
  document.querySelectorAll('#patientSubTabs .sub-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.sub-tab-panel').forEach(p => p.classList.toggle('hidden', !p.id.endsWith(tab)));
  // AI sub-tab: restructure layout so input sticks to bottom
  const slidePg = $('slidePage');
  const slideBd = $('slideBody');
  if (slidePg && slideBd) {
    if (tab === 'ai') {
      // slidePage: no scroll, flex column
      slidePg.style.overflow = 'hidden';
      slidePg.style.display = 'flex';
      slidePg.style.flexDirection = 'column';
      // slideBody: fill remaining space, flex column, no scroll
      slideBd.style.flex = '1';
      slideBd.style.overflow = 'hidden';
      slideBd.style.display = 'flex';
      slideBd.style.flexDirection = 'column';
      slideBd.style.minHeight = '0';
      slideBd.style.paddingBottom = '0';
      // Hide non-AI panels
      slideBd.querySelectorAll('.sub-tab-panel:not(#subtab-ai)').forEach(el => el.style.display = 'none');
      // Sub-tabs nav: fixed height
      const nav = slideBd.querySelector('.sub-tabs');
      if (nav) nav.style.flexShrink = '0';
      // AI panel: fill remaining, flex column
      const aiPanel = document.getElementById('subtab-ai');
      if (aiPanel) { aiPanel.style.flex = '1'; aiPanel.style.minHeight = '0'; }
    } else {
      // Restore defaults
      slidePg.style.overflow = '';
      slidePg.style.display = '';
      slidePg.style.flexDirection = '';
      slideBd.style.flex = '';
      slideBd.style.overflow = '';
      slideBd.style.display = '';
      slideBd.style.flexDirection = '';
      slideBd.style.minHeight = '';
      slideBd.style.paddingBottom = '';
      slideBd.querySelectorAll('.sub-tab-panel').forEach(el => el.style.display = '');
      const nav = slideBd.querySelector('.sub-tabs');
      if (nav) nav.style.flexShrink = '';
      const aiPanel = document.getElementById('subtab-ai');
      if (aiPanel) { aiPanel.style.flex = ''; aiPanel.style.minHeight = ''; }
    }
  }
  // Auto-scroll AI history to bottom
  if (tab === 'ai') {
    const histEl = document.getElementById(`patient-ai-history-${pid}`);
    if (histEl) histEl.scrollTop = histEl.scrollHeight;
  }
}

function navPatientDate(pid, delta) {
  const d = new Date(State.currentDate);
  d.setDate(d.getDate() + delta);
  State.currentDate = d.toISOString().slice(0, 10);
  const p = State.patients.find(x => x.id === pid);
  if (p) renderPatientDetail(p, true);
}

/* ===== Auto-save ===== */
let _autoSaveDebounceTimer = null;
function _handleAutoSaveDebounced(e) {
  clearTimeout(_autoSaveDebounceTimer);
  _autoSaveDebounceTimer = setTimeout(() => _handleAutoSave(e), 300);
}
function bindAutoSave() {
  document.querySelectorAll('.pt-input').forEach(el => {
    el.removeEventListener('blur', _handleAutoSave);
    el.addEventListener('blur', _handleAutoSave);
    el.removeEventListener('change', _handleAutoSave);
    el.addEventListener('change', _handleAutoSave);
    // V3.4: also save on every input (debounced 300ms) to prevent loss before blur
    el.removeEventListener('input', _handleAutoSaveDebounced);
    el.addEventListener('input', _handleAutoSaveDebounced);
  });
  document.querySelectorAll('.pt-check').forEach(el => {
    el.removeEventListener('change', _handleCheckSave);
    el.addEventListener('change', _handleCheckSave);
  });
  // MAP live update
  document.querySelectorAll('[data-field="vitals.sbp"], [data-field="vitals.dbp"]').forEach(el => {
    el.addEventListener('input', updateMAPDisplay);
  });
  // IO balance live update
  document.querySelectorAll('.pt-io').forEach(el => {
    el.addEventListener('input', updateIODisplay);
  });
}

function _handleAutoSave(e) {
  const el = e.target;
  const pid = el.dataset.pid;
  const field = el.dataset.field;
  if (!pid || !field) return;
  const p = State.patients.find(x => x.id === pid);
  if (!p) return;
  if (!p.records) p.records = {};
  if (!p.records[State.currentDate]) p.records[State.currentDate] = {};
  const rec = p.records[State.currentDate];
  const val = el.value;
  // Support nested fields like "vitals.resp.fio2" or "io.intake"
  const parts = field.split('.');
  let obj = rec;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = val;
  State.savePatients();
  showSaveIndicator();
}

function _handleCheckSave(e) {
  const el = e.target;
  const pid = el.dataset.pid;
  const field = el.dataset.field;
  if (!pid || !field) return;
  const p = State.patients.find(x => x.id === pid);
  if (!p) return;
  if (!p.records) p.records = {};
  if (!p.records[State.currentDate]) p.records[State.currentDate] = {};
  const rec = p.records[State.currentDate];
  const parts = field.split('.');
  let obj = rec;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = el.checked;
  State.savePatients();
  showSaveIndicator();
}

function updateMAPDisplay() {
  const sbp = parseFloat(document.querySelector('[data-field="vitals.sbp"]')?.value);
  const dbp = parseFloat(document.querySelector('[data-field="vitals.dbp"]')?.value);
  const el = document.getElementById('map-display');
  if (!el) return;
  if (isNaN(sbp) || isNaN(dbp)) { el.innerHTML = ''; return; }
  const map = Math.round((sbp + 2 * dbp) / 3);
  const cls = map > 105 ? 'danger' : map < 65 ? 'danger' : map < 70 ? 'warn' : '';
  el.innerHTML = `<div class="crit-inline ${cls}" style="font-weight:600">MAP: ${map} mmHg</div>`;
}

function updateIODisplay() {
  const intake = parseFloat(document.querySelector('[data-field="io.intake"]')?.value) || 0;
  const totalOut = parseFloat(document.querySelector('[data-field="io.totalOut"]')?.value) || 0;
  const urine = parseFloat(document.querySelector('[data-field="io.urine"]')?.value) || 0;
  const drain = parseFloat(document.querySelector('[data-field="io.drain"]')?.value) || 0;
  const stool = parseFloat(document.querySelector('[data-field="io.stool"]')?.value) || 0;
  const otherOut = totalOut - urine - drain - stool;
  const balance = intake - totalOut;
  // Update 其他出量 readonly field
  const otherEl = document.getElementById('io-other-out');
  if (otherEl) otherEl.value = otherOut > 0 ? otherOut : '';
  // Update balance bar
  const el = document.getElementById('io-balance-display');
  if (!el) return;
  const hasData = intake || totalOut;
  const bgColor = hasData ? (balance > 500 ? 'var(--danger-bg)' : balance < -500 ? 'var(--warning-bg)' : 'var(--success-bg)') : 'var(--bg)';
  const fgColor = hasData ? (balance > 500 ? 'var(--danger)' : balance < -500 ? 'var(--warning)' : 'var(--success)') : 'var(--text2)';
  el.style.background = bgColor;
  el.style.color = fgColor;
  el.textContent = `平衡 ${balance > 0 ? '+' : ''}${balance} mL`;
}

/* ===== Report / Handoff ===== */
function genHandoff(p, rec) {
  const lines = [];
  const v = rec?.vitals || {};
  const l = rec?.labs || {};
  const admitDays = getAdmitDays(p);
  const surgDays = getSurgDays(p);

  lines.push(`【${p.name}】${p.bed || ''} ${p.sex || ''}${p.age || ''}岁`);
  if (p.diagnosis) lines.push(`诊断: ${p.diagnosis}`);
  if (admitDays !== '?') {
    let dayInfo = `入院D${admitDays}`;
    if (surgDays !== '') dayInfo += ` 术后D${surgDays}`;
    lines.push(dayInfo);
  }

  // Vitals
  const vitalParts = [];
  if (v.temp) vitalParts.push(`T${v.temp}`);
  if (v.hr) vitalParts.push(`HR${v.hr}`);
  if (v.sbp && v.dbp) vitalParts.push(`BP${v.sbp}/${v.dbp}`);
  if (v.rr) vitalParts.push(`RR${v.rr}`);
  if (v.spo2) vitalParts.push(`SpO₂${v.spo2}%`);
  if (v.conscious) vitalParts.push(v.conscious);
  if (vitalParts.length) lines.push(`生命体征: ${vitalParts.join(' ')}`);

  // Resp support
  if (v.resp?.type && v.resp.type !== 'none' && v.resp.type !== '') {
    let resp = `呼吸支持: ${v.resp.type}`;
    if (v.resp.mode) resp += ` ${v.resp.mode}`;
    if (v.resp.fio2) resp += ` FiO₂${v.resp.fio2}%`;
    if (v.resp.peep) resp += ` PEEP${v.resp.peep}`;
    lines.push(resp);
  }

  // IO
  const io = rec?.io || {};
  const intake = parseFloat(io.intake) || 0;
  const totalOut = parseFloat(io.totalOut) || 0;
  const urine = parseFloat(io.urine) || 0;
  const drain = parseFloat(io.drain) || 0;
  const stool = parseFloat(io.stool) || 0;
  const otherOut = totalOut - urine - drain - stool;
  if (intake || totalOut) {
    const parts = [];
    if (urine) parts.push(`尿${urine}`);
    if (drain) parts.push(`引流${drain}`);
    if (stool) parts.push(`便${stool}`);
    if (otherOut > 0) parts.push(`其他${otherOut}`);
    lines.push(`出入量: 入${intake} 出${totalOut}(${parts.join(' ')}) 平衡${intake-totalOut > 0 ? '+' : ''}${intake-totalOut}`);
  }

  // Key labs
  const labParts = [];
  if (l.wbc) labParts.push(`WBC ${l.wbc}`);
  if (l.hgb) labParts.push(`Hb ${l.hgb}`);
  if (l.plt) labParts.push(`PLT ${l.plt}`);
  if (l.cr) labParts.push(`Cr ${l.cr}`);
  if (l.k) labParts.push(`K⁺ ${l.k}`);
  if (l.na) labParts.push(`Na⁺ ${l.na}`);
  if (l.lac || l.abg_lac) labParts.push(`乳酸 ${l.lac || l.abg_lac}`);
  if (l.pct) labParts.push(`PCT ${l.pct}`);
  if (l.crp) labParts.push(`CRP ${l.crp}`);
  if (labParts.length) lines.push(`关键化验: ${labParts.join(' ')}`);

  // Treatment
  if (rec?.medications?.length) {
    lines.push(`用药: ${rec.medications.map(m => `${m.name} ${m.dose} ${m.freq}`).join('; ')}`);
  }
  if (rec?.txChanges) lines.push(`治疗变更: ${rec.txChanges}`);
  if (rec?.notes) lines.push(`备注: ${rec.notes}`);
  if (rec?.plan) lines.push(`明日计划: ${rec.plan}`);

  return lines.join('<br>');
}

/* ===== Calculators for Report ===== */
function calcCGForPatient(p, rec) {
  if (!p.age || !p.weight) return '';
  const cr = parseFloat(rec?.labs?.cr);
  if (isNaN(cr)) return '';
  const crMg = cr / 88.4;
  let crcl = ((140 - p.age) * p.weight) / (72 * crMg);
  if (p.sex === '女') crcl *= 0.85;
  return `CrCl ≈ ${Math.round(crcl * 10) / 10} mL/min`;
}

function calcEgfrForPatient(p, rec) {
  const cr = parseFloat(rec?.labs?.cr);
  if (!cr || !p.age) return '';
  const scr = cr / 88.4;
  const k = p.sex === '女' ? 0.7 : 0.9;
  const alpha = p.sex === '女' ? -0.241 : -0.302;
  const sexFac = p.sex === '女' ? 1.012 : 1;
  let gfr;
  if (scr <= k) gfr = 142 * Math.pow(scr/k, alpha) * Math.pow(0.9938, p.age) * sexFac;
  else gfr = 142 * Math.pow(scr/k, -1.200) * Math.pow(0.9938, p.age) * sexFac;
  const stage = gfr >= 90 ? 'G1' : gfr >= 60 ? 'G2' : gfr >= 45 ? 'G3a' : gfr >= 30 ? 'G3b' : gfr >= 15 ? 'G4' : 'G5';
  return `eGFR = ${Math.round(gfr)} mL/min/1.73m² (${stage})`;
}

function calcABGForPatient(rec) {
  const l = rec?.labs || {};
  const ph = parseFloat(l.abg_ph), pco2 = parseFloat(l.abg_pco2), hco3 = parseFloat(l.abg_hco3);
  if (!ph || !pco2 || !hco3) return '';
  let result = '';
  if (ph < 7.35) result = '酸血症';
  else if (ph > 7.45) result = '碱血症';
  else result = 'pH正常';
  // AG
  const na = parseFloat(l.abg_na), cl = parseFloat(l.abg_cl);
  if (na && cl) {
    const ag = Math.round((na - cl - hco3) * 10) / 10;
    result += ` · AG=${ag}`;
  }
  // Lactate
  const lac = parseFloat(l.abg_lac);
  if (lac) result += ` · 乳酸${lac}`;
  return result;
}

/* ===== 4f. Calculator Engine ===== */
const Calc = {
  round(n, d=1) { return n == null || isNaN(n) ? '' : Math.round(n * 10**d) / 10**d; },

  abg(ph, pco2, hco3, na, cl, k, lac, alb) {
    if (!ph || !pco2 || !hco3) return null;
    ph = +ph; pco2 = +pco2; hco3 = +hco3; na = +na; cl = +cl;
    let state = ph < 7.35 ? '酸血症' : ph > 7.45 ? '碱血症' : 'pH正常';
    let primary = '', primaryDetail = '';
    if (ph < 7.35) {
      if (pco2 > 45) { primary = '呼吸性酸中毒'; primaryDetail = `PaCO₂ ${pco2}>45`; }
      if (hco3 < 22) { primary += (primary?' + ':'') + '代谢性酸中毒'; primaryDetail += (primaryDetail?'；':'') + `HCO₃⁻ ${hco3}<22`; }
    } else if (ph > 7.45) {
      if (pco2 < 35) { primary = '呼吸性碱中毒'; primaryDetail = `PaCO₂ ${pco2}<35`; }
      if (hco3 > 26) { primary += (primary?' + ':'') + '代谢性碱中毒'; primaryDetail += (primaryDetail?'；':'') + `HCO₃⁻ ${hco3}>26`; }
    } else {
      if (pco2 > 45 && hco3 > 26) primary = '混合性紊乱（待定）';
      else if (pco2 < 35 && hco3 < 22) primary = '混合性紊乱（待定）';
      else primary = '无明显原发紊乱';
    }
    let lines = [`<b>① ${state}</b>（pH ${ph}）`, `<b>② 原发紊乱</b>: ${primary}`];
    // Compensation + acute/chronic distinction
    const hasMetAcid = primary.includes('代谢性酸中毒'), hasMetAlk = primary.includes('代谢性碱中毒');
    const hasRespAcid = primary.includes('呼吸性酸中毒'), hasRespAlk = primary.includes('呼吸性碱中毒');
    if (hasMetAcid && !hasRespAcid && !hasRespAlk) {
      const exp = 1.5 * hco3 + 8, lo = this.round(exp-2,1), hi = this.round(exp+2,1);
      const msg = pco2 < lo ? '合并呼碱' : pco2 > hi ? '合并呼酸' : '代偿适当';
      lines.push(`<b>③ 代偿</b>: 预计PaCO₂ ${this.round(exp,1)}（${lo}-${hi}）→ ${msg}`);
    } else if (hasMetAlk && !hasRespAcid && !hasRespAlk) {
      const exp = 0.7 * hco3 + 21, lo = this.round(exp-2,1), hi = this.round(exp+2,1);
      const msg = pco2 < lo ? '合并呼碱' : pco2 > hi ? '合并呼酸' : '代偿适当';
      lines.push(`<b>③ 代偿</b>: 预计PaCO₂ ${this.round(exp,1)}（${lo}-${hi}）→ ${msg}`);
    } else if (hasRespAcid && !hasMetAcid && !hasMetAlk) {
      const dc = pco2 - 40;
      const ac = this.round(24 + dc*0.1,1), chr = this.round(24 + dc*0.35,1);
      const chronic = Math.abs(hco3-chr) <= Math.abs(hco3-ac);
      lines.push(`<b>③ 急/慢</b>: 急性HCO₃⁻ ${ac}，慢性 ${chr}，实测 ${hco3} → ${chronic?'慢性':'急性'}呼酸`);
    } else if (hasRespAlk && !hasMetAcid && !hasMetAlk) {
      const dc = 40 - pco2;
      const ac = this.round(24 - dc*0.2,1), chr = this.round(24 - dc*0.5,1);
      const chronic = Math.abs(hco3-chr) <= Math.abs(hco3-ac);
      lines.push(`<b>③ 急/慢</b>: 急性HCO₃⁻ ${ac}，慢性 ${chr}，实测 ${hco3} → ${chronic?'慢性':'急性'}呼碱`);
    } else {
      lines.push('<b>③ 代偿</b>: 混合紊乱，公式不适用');
    }
    // AG with albumin correction
    let warnMsg = '';
    if (na && cl) {
      const ag = this.round(na - cl - hco3, 1);
      let effAG = ag, agStr = `AG = ${ag}`;
      if (alb) { const cAG = this.round(ag + 2.5*(4 - alb/10),1); effAG = cAG; agStr += ` → 校正AG = ${cAG}`; }
      agStr += effAG > 16 ? ' ⬆️' : effAG < 8 ? ' ⬇️' : ' ✓';
      lines.push(`<b>④ 阴离子间隙</b>: ${agStr}`);
      // Delta-Delta
      if (effAG > 16 && hco3 < 24) {
        const dd = this.round((effAG-12)/(24-hco3),2);
        if (dd && dd > 0) {

  nadeficit(na, wt, sex) {

  mainchild(wt) {

    let mlh = wt<=10?wt*4:wt<=20?40+(wt-10)*2:60+(wt-20)*1;
    const mld = Math.round(mlh*24);
    return { main: `${Math.round(mlh)} mL/h`, detail: `每日总量≈${mld}mL`, warn: mld>2400?'总量>2400mL,注意监测':'' };
  },
  dehydration(wt, na, k, rateMode) {
    if (!wt || !na) return null; wt=+wt; na=+na; rateMode=rateMode||'safe';
    const deficit = this.round(wt*0.6*(na/140-1),2);
    const isHypo = na < 140;
    const rates = {safe:{h:72,max:0.5},slow:{h:48,max:0.5},fast:{h:24,max:1.0}};
    const rm = rates[rateMode]; const hr = Math.round(Math.abs(deficit)*1000/rm.h);
    const fluid = na>150?'5%GS':na<120?'3%高渗盐水':'5%GNS';
    return { main: `缺水≈${Math.abs(deficit)}L（${isHypo?'低钠':'高钠'}纠正）`, detail: `${rm.h}h纠正，${hr}mL/h<br>液体：${fluid}<br>目标下降速度≤${rm.max}mmol/L/h`, warn: na<120?'严重低钠！渗透性脱髓鞘风险':'' };
  },

  // === Emergency ===
  dka(wt, degree, glucose, k) {
    if (!wt || !degree) return null; wt=+wt; degree=+degree;
    const total = Math.round(wt*degree*1000);
    const p1 = Math.round(wt*20), p2 = Math.round((total-p1)*0.5), p3 = total-p1-p2;
    const insR = this.round(wt*0.1,2);
    let kGuide = k ? (+k>5?'暂不补钾':+k>3.5?'KCl 15mL/袋':'KCl 30mL/袋,心电监护') : '查血钾后决定';
    return { main: `DKA/HHS 补液 ${total}mL`, detail: `①NS ${p1}mL@${p1}mL/h(1h) ②NS ${p2}mL@${Math.round(p2/7)}mL/h(2-8h) ③5%GNS ${p3}mL@${Math.round(p3/16)}mL/h(8-24h)<br>RI ${insR}U/h(0.1U/kg/h)<br>补钾：${kGuide}<br>血糖13.9后换5%GS+RI减量` };
  },
  insulintdd(type, wt) {
    if (!wt) return null;
    const lo = +type===1?0.3:0.2, hi = +type===1?0.6:0.4;
    return { main: `TDD: ${Math.round(+wt*lo)}-${Math.round(+wt*hi)} U/d`, detail: `基础: ${Math.round(+wt*lo/2)}-${Math.round(+wt*hi/2)}U<br>餐时: ${Math.round(+wt*lo/2)}-${Math.round(+wt*hi/2)}U` };
  },
  isf(tdd) {
    if (!tdd) return null;
    return { main: `ISF = ${this.round(100/+tdd,1)} mmol/L/U`, detail: `1800法则: ${Math.round(1800/+tdd)} mg/dL/U<br>100法则: ${this.round(100/+tdd,1)} mmol/L/U` };
  },
  icr(tdd) {
    if (!tdd) return null;
    return { main: `ICR = ${this.round(28/+tdd,1)} g碳水/U`, detail: `500法则: ${Math.round(500/+tdd)} g/U<br>28法则: ${this.round(28/+tdd,1)} g/U` };
  },

  // === Pharmacy ===
  dilution(c1, c2, v2, v1) {
    if (!c1 || !c2) return null;
    if (v2) { const r = this.round(+c2*+v2/+c1,2); return { main: `V₁ = ${r} mL`, detail: `取${r}mL原液定容至${v2}mL` }; }
    if (v1) { const r = this.round(+c1*+v1/+c2,2); return { main: `V₂ = ${r} mL`, detail: `移取${v1}mL原液定容至${r}mL` }; }
    return null;
  },
  solution(mass, vol) {
    if (!mass || !vol) return null;
    return { main: `${this.round(+mass/+vol,2)} mg/mL`, detail: `${mass}mg / ${vol}mL` };
  },
  kclconc(type, amount, totalVol) {
    if (!amount || !totalVol) return null;
    const mg = type==='ml'?+amount*100:+amount;
    const pct = this.round(mg/+totalVol*100,2), mmol = this.round(mg/74.55/+totalVol*1000,1);
    return { main: `${pct}%（${mmol} mmol/L）`, detail: `${mg}mg KCl / ${totalVol}mL`, warn: pct>0.3?'外周静脉禁用！必须CVC':pct>0.2?'建议CVC':'' };
  },

  // === OB ===
  edd(lmpStr) {
    if (!lmpStr) return null;
    const lmp = new Date(lmpStr), edd = new Date(lmp); edd.setDate(edd.getDate()+280);
    const diff = Math.floor((Date.now()-lmp)/(864e5));
    return { main: `预产期: ${edd.toLocaleDateString('zh-CN')}`, detail: `当前孕周: ${Math.floor(diff/7)}周${diff%7}天` };
  },
  fetalweight(fh, ac) {
    if (!fh || !ac) return null;
    const est = Math.max(Math.round((+fh-11)*155*(1+(+ac-30)*0.015)),100);
    return { main: `≈${est} g`, detail: 'Johnson公式修正，以超声为准' };
  },

  // === Scoring ===
  gcs(eye, verbal, motor) {
    const total = +eye + +verbal + +motor;
    return { main: `GCS = ${total}（E${eye}V${verbal}M${motor}）`, detail: total>=13?'轻度':total>=9?'中度':'重度昏迷', warn: total<9?'GCS<8考虑插管保护气道':'' };
  },
  apgar(color, hr, reflex, tone, resp) {
    const total = +color + +hr + +reflex + +tone + +resp;
    return { main: `Apgar = ${total}/10`, detail: total>=7?'正常':total>=4?'轻度窒息':'重度窒息', warn: total<4?'需立即复苏':'' };
  },
  insulinPrep() {
    return { main: '50U RI + 49.5mL NS', detail: '浓度 1U/mL<br>起始 0.1U/kg/h' };
  },

  // === Unit Converters ===
  convGluc(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*18.02)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/18.02,1)} mmol/L`,detail:''}; },
  convCr(val, from) { return from==='umol' ? {main:`${val} μmol/L = ${this.round(val/88.4,2)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${Math.round(val*88.4)} μmol/L`,detail:''}; },
  convCa(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${this.round(val*4.008,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/4.008,2)} mmol/L`,detail:''}; },
  convMg(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${this.round(val*2.43,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/2.43,2)} mmol/L`,detail:''}; },
  convBili(val, from) { return from==='umol' ? {main:`${val} μmol/L = ${this.round(val/17.1,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${Math.round(val*17.1)} μmol/L`,detail:''}; },
  convChol(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*38.67)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/38.67,2)} mmol/L`,detail:''}; },
  convTG(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*88.57)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/88.57,2)} mmol/L`,detail:''}; },
  convPres(val, from) {
    let mmhg = from==='mmhg'?+val : from==='kpa'?+val/0.1333 : +val/1.36;
    return { main: `${Math.round(mmhg)} mmHg = ${this.round(mmhg*0.1333,2)} kPa = ${this.round(mmhg*1.36,1)} cmH₂O`, detail: '' };
  },
  convTemp(val, from) {
    return from==='c' ? { main: `${val}°C = ${this.round(val*9/5+32,1)}°F`, detail: '' }
      : { main: `${val}°F = ${this.round((val-32)*5/9,1)}°C`, detail: '' };
  }
};

3. 涉及数值时注明单位和参考范围
4. 存在危险值时用⚠️醒目标注
5. 不确定的判断标注"需确认"

## 八项汇报模板（查房/交班时使用）
按以下八项逐条汇报，每项1-2句话：

5. **感染**：体温、WBC/PCT/CRP、当前抗感染方案

## 数据纪律

- 如数据不足，明确指出"数据不足，无法判断"

/* ===== Toolbox Rendering ===== */
function renderToolbox() {
  const page = $('page-toolbox');
  if (!page) return;

  const savedQuickIds = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  const quickTools = CalcRegistry.filter(c => c.quick && savedQuickIds.includes(c.id));
  const categories = [...new Set(CalcRegistry.filter(c => !c.quick).map(c => c.cat))];
  const favs = State.favorites || [];

  let html = `
    <div class="search-bar" style="margin-bottom:10px">
      <input type="text" class="form-input" id="toolboxSearch" placeholder="🔍 搜索计算器..." oninput="filterToolbox(this.value)">
    </div>`;

  // Favorites
  if (favs.length) {
    html += `<div class="flex-between mb-8"><span class="text-sm text-secondary">⭐ 收藏</span></div>
    <div class="quick-tools" id="toolbox-favs">${favs.map(id => {
      const c = CalcRegistry.find(x => x.id === id);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('')}</div>`;
  }

  // Quick tools
  html += `<div class="flex-between mb-8 mt-12"><span class="text-sm text-secondary">⚡ 急算工具</span></div>
  <div class="quick-tools" id="toolbox-quick">${quickTools.map(c =>
    `<button class="qt-btn qt-trigger" data-qt-id="${c.id}" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>`
  ).join('')}</div>
  <div id="quick-calc-container" style="margin-top:8px"></div>`;

  // Category accordions
  html += '<div class="mt-12" id="toolbox-cats">';
  for (const cat of categories) {
    const tools = CalcRegistry.filter(c => c.cat === cat && !c.quick);
    const icon = cat === '肾脏' ? '🫘' : cat === '营养' ? '🥗' : cat === '补液' ? '💧' : cat === '胰岛素' ? '💊' : cat === '配药' ? '💉' : cat === '评分' ? '📊' : cat === '换算' ? '🔄' : cat === 'TPN' ? '🧬' : cat === '产科' ? '🤰' : '🧮';
    html += `<div class="accordion-item" data-cat="${cat}">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="acc-icon">${icon}</span>
        <span>${cat}</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        ${tools.map(c => `<div class="calc-card" data-calc-id="${c.id}" data-keywords="${c.keywords||''}">
          <div class="flex-between mb-8">
            <span style="font-weight:600;font-size:.9rem">${c.icon} ${c.name}</span>
            <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="toggleFavCalc('${c.id}',this)">${favs.includes(c.id) ? '★' : '☆'}</button>
          </div>
          ${renderCalcInputs(c)}
          <div class="result-box" id="res-${c.id}" style="display:none">
            <div class="res-value" id="res-main-${c.id}"></div>
            <div id="res-detail-${c.id}" style="font-size:.82rem;margin-top:4px"></div>
          </div>
        </div>`).join('')}
      </div></div>
    </div>`;
  }
  html += '</div>';

  // Reset button
  html += `<div class="text-center mt-12"><button class="btn btn-secondary btn-sm" onclick="resetAllCalcs()">🔄 重置所有计算器</button></div>`;

  page.innerHTML = html;
}

function renderCalcInputs(calc) {
  return `<div style="display:flex;flex-wrap:wrap;gap:6px">${calc.inputs.map(inp => {
    if (inp.type === 'check') {
      return `<label style="font-size:.82rem;display:flex;align-items:center;gap:4px;background:var(--bg);padding:4px 8px;border-radius:6px"><input type="checkbox" class="calc-input" data-calc="${calc.id}" data-key="${inp.k}"> ${inp.l}</label>`;
    }
    if (inp.type === 'select') {
      return `<select class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" style="width:auto;min-width:80px;padding:6px 8px;font-size:.82rem">${inp.opts.map(o => `<option value="${o.v}">${o.t}</option>`).join('')}</select>`;
    }
    if (inp.type === 'date') {
      return `<input type="date" class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" style="width:auto;min-width:100px;padding:6px 8px;font-size:.82rem">`;
    }
    return `<input type="number" class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" placeholder="${inp.l}" step="${inp.s||1}" style="width:auto;min-width:80px;padding:6px 8px;font-size:.82rem">`;
  }).join('')}
  <button class="btn btn-primary btn-sm" onclick="runCalc('${calc.id}')" style="padding:6px 12px">=</button></div>`;
}

function toggleAccordion(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}

function toggleFavCalc(id, btn) {
  const idx = State.favorites.indexOf(id);
  if (idx >= 0) { State.favorites.splice(idx, 1); btn.textContent = '☆'; }
  else { State.favorites.push(id); btn.textContent = '★'; }
  State.saveFavorites();
  // Update favs section
  const favsEl = document.getElementById('toolbox-favs');
  if (favsEl) {
    const parent = favsEl.parentElement;
    const newFavs = State.favorites.map(fid => {
      const c = CalcRegistry.find(x => x.id === fid);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('');
    if (State.favorites.length) {
      if (favsEl) favsEl.innerHTML = newFavs;
    }
  }
}

function runCalc(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  const values = {};
  document.querySelectorAll(`.calc-input[data-calc="${id}"]`).forEach(el => {
    if (el.type === 'checkbox') values[el.dataset.key] = el.checked;
    else if (el.type === 'number') values[el.dataset.key] = el.value ? parseFloat(el.value) : null;
    else values[el.dataset.key] = el.value;
  });
  const result = calc.compute(values);
  const resBox = document.getElementById('res-' + id);
  const mainEl = document.getElementById('res-main-' + id);
  const detailEl = document.getElementById('res-detail-' + id);
  if (!resBox || !mainEl || !detailEl) return;
  if (!result) { resBox.style.display = 'none'; return; }
  mainEl.innerHTML = result.main;
  detailEl.innerHTML = result.detail || '';
  resBox.style.display = '';
  resBox.className = 'result-box' + (result.warn ? ' result-danger' : ' result-ok');
  haptic();
}

function openCalcCard(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  // Check accordion card first
  const card = document.querySelector(`.accordion-item [data-calc-id="${id}"]`);
  if (card) {
    const accordion = card.closest('.accordion-item');
    if (accordion && !accordion.classList.contains('open')) accordion.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
    return;
  }
  // Quick tool — toggle card in quick-calc-container
  const container = document.getElementById('quick-calc-container');
  if (!container) return;
  const existing = container.querySelector(`[data-calc-id="${id}"]`);
  if (existing) {
    existing.remove();
    document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.remove('active'));
    return;
  }
  const favs = State.favorites || [];
  const cardHtml = `<div class="calc-card" data-calc-id="${id}" style="border:2px solid var(--primary);border-radius:12px;padding:12px;background:var(--card);margin-top:8px">
    <div class="flex-between mb-8">
      <span style="font-weight:600;font-size:.95rem">${calc.icon} ${calc.name}</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="toggleFavCalc('${calc.id}',this)">${favs.includes(calc.id) ? '★' : '☆'}</button>
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="openCalcCard('${calc.id}')">✕</button>
      </div>
    </div>
    ${renderCalcInputs(calc)}
    <div class="result-box" id="res-${calc.id}" style="display:none">
      <div class="res-value" id="res-main-${calc.id}"></div>
      <div id="res-detail-${calc.id}" style="font-size:.82rem;margin-top:4px"></div>
    </div>
  </div>`;
  container.insertAdjacentHTML('beforeend', cardHtml);
  document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.add('active'));
  setTimeout(() => container.querySelector(`[data-calc-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function filterToolbox(q) {
  const ql = q.toLowerCase().trim();
  // Filter accordion calc cards
  document.querySelectorAll('.calc-card').forEach(card => {
    const kw = (card.dataset.keywords || '').toLowerCase();
    const name = card.querySelector('.flex-between span')?.textContent?.toLowerCase() || '';
    card.style.display = (!ql || kw.includes(ql) || name.includes(ql)) ? '' : 'none';
  });
  // Filter quick tool buttons
  document.querySelectorAll('#toolbox-quick .qt-btn, #toolbox-favs .qt-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!ql || text.includes(ql)) ? '' : 'none';
  });
  // Auto-open matching accordions
  if (ql) {
    document.querySelectorAll('.accordion-item').forEach(item => {
      const hasVisible = item.querySelector('.calc-card:not([style*="display: none"])');
      if (hasVisible) item.classList.add('open');
    });
  }
}

function resetAllCalcs() {
  document.querySelectorAll('.calc-input').forEach(el => {
    if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  document.querySelectorAll('[id^="res-"]').forEach(el => el.style.display = 'none');
  showToast('已重置');
}

/* ===== AI Module ===== */
let _aiAbortController = null;
let _aiStartTime = 0;
let _aiFirstContent = true;
let _pendingAIImage = null; // { base64, mimeType }

function renderAI() {
  const page = $('page-ai');
  if (!page) return;

    `<div class="text-center text-secondary text-sm" style="padding:40px 16px">
      <div style="font-size:2rem;margin-bottom:8px">🤖</div>
      <div>粘贴化验结果、输入问题或选择快捷指令开始</div>
    </div>` :

      content = content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
      content = content.replace(/^- (.+)$/gm, '&bull; $1');
      content = content.replace(/\n/g, '<br>');
      let thinkHtml = '';
      if (m.role === 'assistant') {
        if (m.thinkingTime) thinkHtml = `<div class="ai-thinking">已深度思考 · ${m.thinkingTime}s</div>`;
        else if (i === State.aiHistory.length - 1 && !m.content) thinkHtml = `<div class="ai-thinking"><span class="spin"></span> 思考中...</div>`;
      }
      return `${thinkHtml}<div class="ai-msg ${m.role === 'user' ? 'ai-msg-user' : 'ai-msg-assistant'}">${content}</div>`;
    }).join('');

  const statusDot = connected ? '<span class="ai-status-dot connected"></span> 已连接' : '<span class="ai-status-dot disconnected"></span> 未配置';

    </div>
    <div id="aiChatBody" style="flex:1;overflow-y:auto;padding:8px 0;min-height:0">${chatHtml}</div>
    <div id="aiImagePreview" style="display:none;padding:4px 12px;flex-shrink:0"></div>
    <div class="ai-input-bar" style="flex-shrink:0">
      <button class="btn btn-sm btn-secondary" onclick="startVoiceInput()" id="voiceBtn" style="border-radius:50%;width:36px;height:36px;padding:0">🎤</button>
      <button class="btn btn-sm btn-secondary" onclick="document.getElementById('aiImageInput').click()" style="border-radius:50%;width:36px;height:36px;padding:0">📷</button>
      <input type="file" id="aiImageInput" accept="image/*" style="display:none" onchange="handleAIImageUpload(this)">
      <input type="text" id="aiInput" placeholder="输入问题..." onkeydown="if(event.key==='Enter')sendAIMessage()">
