<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0077b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%230077b6' width='512' height='512' rx='96'/%3E%3Ctext x='256' y='320' font-size='240' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%230077b6' width='512' height='512' rx='96'/%3E%3Ctext x='256' y='320' font-size='240' font-family='Arial' font-weight='bold' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
<title>医学计算器</title>
<style>
/* ===== 1. CSS Variables ===== */
:root {
  --primary: #0077b6;
  --primary-dark: #005a8a;
  --primary-light: #e6f3fa;
  --danger: #e63946;
  --danger-bg: #ffebee;
  --warning: #f4a261;
  --warning-bg: #fff8e1;
  --success: #2a9d8f;
  --success-bg: #e8f5f3;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #5c6b73;
  --border: #e1e5e9;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-h: 44px;
  --tabbar-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --primary: #4dabf7;
  --primary-dark: #339af0;
  --primary-light: #1a3a5c;
  --danger: #ff6b6b;
  --danger-bg: #3a1a1a;
  --warning: #ffd43b;
  --warning-bg: #3a3310;
  --success: #51cf66;
  --success-bg: #1a3a1a;
  --bg: #0f1419;
  --card: #1a1f2e;
  --text: #e9ecef;
  --text2: #adb5bd;
  --border: #2d3748;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

/* ===== 2. Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:15px;
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  transition:background .3s,color .3s;
}
input,select,textarea,button{font:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-user-select:none;user-select:none}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ===== 3. Header ===== */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:100;
  display:flex;align-items:center;padding:0 12px;gap:8px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:.95rem;font-weight:600;
  box-shadow:0 1px 8px rgba(0,0,0,.12);
}
.app-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.15);font-size:.9rem;transition:background .2s;
}
.header-btn:active{background:rgba(255,255,255,.3)}

/* ===== 4. Bottom Tab Bar ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-h);
  padding-bottom:var(--safe-bottom);
  display:flex;background:var(--card);border-top:1px solid var(--border);
  z-index:100;box-shadow:0 -1px 8px rgba(0,0,0,.06);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:.65rem;color:var(--text2);transition:color .2s;position:relative;
}
.tab-item .tab-icon{font-size:1.2rem;line-height:1}
.tab-item.active{color:var(--primary)}
.tab-item.active::after{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;
  background:var(--primary);border-radius:0 0 2px 2px;
}

/* ===== 5. Page Container ===== */
.page{
  position:absolute;top:var(--header-h);bottom:var(--tabbar-h);left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px;padding-bottom:calc(12px + var(--safe-bottom));
  display:none;
}
.page.active{display:block}

/* ===== 6. Cards ===== */
.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;margin-bottom:10px;
}
.card-title{font-weight:600;font-size:.9rem;margin-bottom:8px}

/* ===== 10. Quick Tools ===== */
.quick-tools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.qt-btn{
  padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid var(--border);
  transition:all .15s;
}
.qt-btn:active{background:var(--primary);color:#fff}
.qt-trigger.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 11. Forms ===== */
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-input,.pt-input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--card);font-size:.9rem;transition:border-color .2s;
}
.form-input:focus,.pt-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 15%,transparent)}
.pt-input{background:var(--bg);border-color:color-mix(in srgb,var(--border) 80%,var(--text2))}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
textarea.form-input{min-height:80px;resize:vertical;line-height:1.6}

/* ===== 12. Buttons ===== */
.btn{
  padding:10px 16px;border-radius:8px;font-size:.85rem;font-weight:500;
  transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:4px;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-secondary.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 10px;font-size:.78rem}
.btn-block{width:100%}

/* ===== 14. Accordion ===== */
.accordion-item{margin-bottom:6px}
.accordion-header{
  display:flex;align-items:center;gap:8px;padding:12px 14px;
  background:var(--card);border-radius:var(--radius);cursor:pointer;
  font-weight:600;font-size:.88rem;transition:background .15s;
  box-shadow:var(--shadow);
}
.accordion-header:active{background:var(--primary-light)}
.accordion-header .acc-icon{font-size:1rem}
.accordion-header .acc-arrow{
  margin-left:auto;font-size:.7rem;color:var(--text2);
  transition:transform .2s;
}
.accordion-item.open .acc-arrow{transform:rotate(90deg)}
.accordion-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  padding:0 4px;
}
.accordion-item.open .accordion-body{max-height:3000px}
.accordion-body-inner{padding:8px 0}

/* ===== 15. Result Display ===== */
.result-box{
  padding:10px 12px;border-radius:8px;margin:8px 0;font-size:.85rem;
  line-height:1.7;background:var(--bg);border:1px solid var(--border);
}
.result-box .res-label{color:var(--text2);font-size:.78rem}
.result-box .res-value{font-weight:600;font-size:1rem}
.result-ok{border-color:var(--success);background:var(--success-bg)}
.result-warn{border-color:var(--warning);background:var(--warning-bg)}
.result-danger{border-color:var(--danger);background:var(--danger-bg)}

/* ===== 16. Toast ===== */
.toast{
  position:fixed;top:calc(var(--header-h) + 8px);left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;
  background:rgba(0,0,0,.8);color:#fff;z-index:999;
  transition:transform .3s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== 17. Bottom Sheet ===== */
.bottom-sheet-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.bottom-sheet-mask.show{opacity:1;pointer-events:auto}
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;max-height:70vh;
  background:var(--card);border-radius:16px 16px 0 0;z-index:201;
  transform:translateY(100%);transition:transform .3s ease;
  overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bottom));
}
.bottom-sheet.show{transform:translateY(0)}
.bottom-sheet-handle{
  width:36px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 16px;
}

/* ===== 20. Settings ===== */
.settings-group{margin-bottom:16px}
.settings-group-title{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:14px;
  background:var(--card);border-radius:var(--radius);margin-bottom:2px;cursor:pointer;
}
.settings-item:first-of-type{border-radius:var(--radius) var(--radius) 4px 4px}
.settings-item:last-of-type{border-radius:4px 4px var(--radius) var(--radius)}
.settings-item:only-of-type{border-radius:var(--radius)}
.settings-item+.settings-item{margin-top:-2px}
.settings-icon{font-size:1.2rem;width:28px;text-align:center}
.settings-text{flex:1}
.settings-label{font-size:.9rem;font-weight:500}
.settings-desc{font-size:.75rem;color:var(--text2)}
.settings-arrow{color:var(--text2);font-size:.8rem}
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border);
  position:relative;transition:background .2s;cursor:pointer;
}
.toggle.on{background:var(--primary)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(20px)}

/* ===== 21. Search Overlay ===== */
.search-overlay{
  position:fixed;inset:0;z-index:180;background:var(--bg);
  transform:translateY(-100%);transition:transform .25s ease;
  padding:12px;overflow-y:auto;
}
.search-overlay.show{transform:translateY(0)}
.search-bar{
  display:flex;gap:8px;align-items:center;margin-bottom:12px;
}
.search-bar input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);font-size:.9rem;
}
.search-bar input:focus{border-color:var(--primary)}

/* ===== 22. Utility ===== */
.hidden{display:none!important}
.text-center{text-align:center}
.text-sm{font-size:.78rem}
.text-secondary{color:var(--text2)}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-6{gap:6px}.gap-8{gap:8px}
.overflow-auto{overflow-x:auto}

/* ===== 27. Sparkline ===== */
.sparkline{display:inline-block;vertical-align:middle}

/* ===== 31. Calc Cards ===== */
.calc-card{
  background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px;
  border:1px solid var(--border);
}

/* ===== 28. Crit Inline ===== */
.crit-inline{font-size:.72rem;padding:2px 0;min-height:16px}
.crit-inline.danger{color:var(--danger);font-weight:600}
.crit-inline.warn{color:var(--warning)}

/* ===== 30. Responsive ===== */
@media(min-width:768px){
  body{max-width:500px;margin:0 auto;box-shadow:-1px 0 0 var(--border),1px 0 0 var(--border)}
  .app-header,.tabbar{max-width:500px;left:50%;right:auto;transform:translateX(-50%)}
  .slide-page{max-width:500px;left:50%;right:auto}
  .slide-page.slide-page{transform:translateX(100%)}
  .slide-page.slide-page.show{transform:translateX(-50%)}
  .search-overlay{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100%)}
  .search-overlay.show{transform:translateX(-50%) translateY(0)}
  .toast{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100px)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .bottom-sheet{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(100%)}
  .bottom-sheet.show{transform:translateX(-50%) translateY(0)}
}
</style>
</head>
<body>
<div id="db-debug" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;padding:8px 12px;font-size:.8rem;color:#fff;text-align:center;font-weight:600"></div>

<header class="app-header" id="appHeader">
  <span class="app-title" id="headerTitle">医学计算器</span>
  <button class="header-btn" onclick="openSearch()" title="搜索">🔍</button>
  <button class="header-btn" onclick="toggleTheme()" title="主题">🌙</button>
</header>

<div class="page active" id="page-toolbox"></div>
<div class="page" id="page-settings"></div>

<nav class="tabbar" id="tabbar">
  <button class="tab-item active" data-page="toolbox" onclick="Router.switch('toolbox')">
    <span class="tab-icon">🦮</span><span>工具箱</span>
  </button>
  <button class="tab-item" data-page="settings" onclick="Router.switch('settings')">
    <span class="tab-icon">⚙️</span><span>设置</span>
  </button>
</nav>

<div class="toast" id="toast"></div>
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索计算器..." oninput="handleSearch(this.value)">
    <button class="btn btn-secondary btn-sm" onclick="closeSearch()">取消</button>
  </div>
  <div id="searchResults"></div>
</div>
<div class="bottom-sheet-mask" id="sheetMask" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="bottom-sheet-handle"></div>
  <div id="sheetContent"></div>
</div>

<script>
/* ===== 4h. Utility Functions ===== */
const $ = id => document.getElementById(id);
const getVal = id => { const el = $(id); return el ? el.value?.trim() ?? '' : ''; };
const getNum = id => { const v = parseFloat(getVal(id)); return isNaN(v) ? null : v; };
const getSel = id => { const el = $(id); return el ? el.value ?? '' : ''; };
const getCheck = id => { const el = $(id); return el ? el.checked : false; };
const setVal = (id, v) => { const el = $(id); if (el) el.value = v ?? ''; };
const setSel = (id, v) => { const el = $(id); if (el) el.value = v ?? ''; };
const setCheck = (id, v) => { const el = $(id); if (el) el.checked = !!v; };
const dispatch = id => { const el = $(id); if (el) el.dispatchEvent(new Event('input', {bubbles:true})); };
const today = () => new Date().toISOString().slice(0,10);

function showToast(msg, dur=2000) {
  const el = $('toast'); if (!el) return;
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}


function openSheet(html) {
  $('sheetContent').innerHTML = html;
  $('bottomSheet').classList.add('show');
  $('sheetMask').classList.add('show');
}
function closeSheet() {
  $('bottomSheet').classList.remove('show');
  $('sheetMask').classList.remove('show');
}

function formatDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '/');
}



function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

/* ===== 4a. DB Storage Layer (IndexedDB primary + localStorage backup) ===== */
const DB = {
  _cache: {},
  _db: null,
  _idbReady: false,

  _showStatus(msg, type) {
    const el = document.getElementById('db-debug');
    if (el) { el.textContent = msg; el.style.background = type === 'error' ? 'var(--danger)' : type === 'warn' ? 'var(--warning)' : 'var(--success)'; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
  },

  async init() {
    // Step 1: Load localStorage into cache (instant, for fast startup)
    let lsCount = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith('mc_') || k === 'app_page')) {
        try { this._cache[k] = JSON.parse(localStorage.getItem(k)); lsCount++; } catch { this._cache[k] = localStorage.getItem(k); lsCount++; }
      }
    }

    // Step 2: Open IndexedDB (primary storage, survives browser cleanup)
    await new Promise((resolve) => {
      const req = indexedDB.open('clinic-db', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
      };
      req.onsuccess = (e) => {
        this._db = e.target.result;
        // Load all IDB data into cache (overwrites localStorage with fresh IDB data)
        const tx = this._db.transaction('kv', 'readonly');
        const store = tx.objectStore('kv');
        const cursorReq = store.openCursor();
        let idbCount = 0;
        cursorReq.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            this._cache[cursor.key] = cursor.value;
            idbCount++;
            cursor.continue();
          } else {
            this._idbReady = true;
            // Migrate any localStorage-only keys into IDB
            this._syncAllToIDB();
            // Show status
            this._showStatus(`V5.0 已加载: IDB=${idbCount}项, LS=${lsCount}项`, 'ok');
            resolve();
          }
        };
        cursorReq.onerror = () => { this._idbReady = true; resolve(); };
      };
      req.onerror = () => {
        this._idbReady = false;
        this._showStatus(`IDB不可用, 仅用LS: ${lsCount}项`, 'warn');
        resolve();
      };
    });

    // Step 3: Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update();
        // Auto-reload when new SW takes over (avoids stale cache)
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) nw.addEventListener('statechange', () => {
            if (nw.state === 'activated' && navigator.serviceWorker.controller) {
              location.reload();
            }
          });
        });
      }).catch(() => {});
    }

    // Step 4: Request persistent storage (prevents browser from auto-clearing data)
    const isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
    if (navigator.storage && navigator.storage.persist) {
      try {
        const isPersisted = await navigator.storage.persisted();
        if (!isPersisted) {
          const granted = await navigator.storage.persist();
          this._persistGranted = granted;
          setTimeout(() => {
            if (granted) {
              this._showStatus('✅ 持久存储已授权(数据安全)', 'ok');
            } else if (isPWA) {
              this._showStatus('⚠️ 持久存储未授权,请重新添加到主屏幕', 'warn');
            } else {
              this._showStatus('💡 请从主屏幕打开以启用持久存储', 'warn');
            }
          }, 2000);
        } else {
          this._persistGranted = true;
          setTimeout(() => this._showStatus('✅ 持久存储已生效', 'ok'), 2000);
        }
      } catch(e) {}
    } else if (!isPWA) {
      setTimeout(() => this._showStatus('💡 请添加到主屏幕以获得最佳体验', 'warn'), 2000);
    }
  },

  // Sync all cached keys to IDB (for migration from localStorage)
  _syncAllToIDB() {
    if (!this._db) return;
    try {
      const tx = this._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      for (const [k, v] of Object.entries(this._cache)) {
        store.put(v, k);
      }
    } catch(e) {}
  },

  get(key, def) {
    const v = this._cache[key];
    return v !== undefined ? v : def;
  },

  set(key, val) {
    this._cache[key] = val;
    // Write to IndexedDB (primary)
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(val, key);
      } catch(e) {}
    }
    // Also write to localStorage (backup)
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  },

  remove(key) {
    delete this._cache[key];
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').delete(key);
      } catch(e) {}
    }
    try { localStorage.removeItem(key); } catch(e) {}
  }
};

// V3.4: Flush all state before page closes/hides (mobile Chrome may not fire pagehide reliably)
function _flushAllStorage(reason) {
  try {
    // Force-save any unsaved input value (even without blur)
    document.querySelectorAll('.pt-input').forEach(el => {
      try {
        if (el.dataset.pid && el.dataset.field) {
          _handleAutoSave({ target: el });
        }
      } catch(e) {}
    });
    // Flush full cache to localStorage as backup
    for (const [k, v] of Object.entries(DB._cache)) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
    }
  } catch(e) {}
}
window.addEventListener('pagehide', () => _flushAllStorage('pagehide'));
window.addEventListener('beforeunload', () => _flushAllStorage('beforeunload'));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') _flushAllStorage('visibilitychange');
});


/* ===== State ===== */
const State = {
  favorites: [],
  theme: 'light',

  load() {
    this.favorites = DB.get('mc_favorites', []);
    this.theme = DB.get('mc_theme', 'light');
  },

  saveFavorites() { DB.set('mc_favorites', this.favorites); }
};

/* ===== Search ===== */
function openSearch() {
  $('searchOverlay').classList.add('show');
  $('searchInput').focus();
}
function closeSearch() {
  $('searchOverlay').classList.remove('show');
  $('searchInput').value = '';
  $('searchResults').innerHTML = '';
}
function handleSearch(q) {
  const el = $('searchResults');
  if (!q.trim()) { el.innerHTML = ''; return; }
  const ql = q.toLowerCase();
  let html = '';
  CalcRegistry.forEach(c => {
    const kw = (c.keywords || '').toLowerCase();
    const name = c.name.toLowerCase();
    if (kw.includes(ql) || name.includes(ql)) {
      html += `<div class="settings-item" onclick="closeSearch();setTimeout(()=>openCalcCard('${c.id}'),100)">`
        + `<span class="settings-icon">${c.icon}</span>`
        + `<div class="settings-text"><div class="settings-label">${c.name}</div>`
        + `<div class="settings-desc">${c.keywords || ''}</div></div></div>`;
    }
  });
  el.innerHTML = html || '<div class="text-center text-secondary text-sm" style="padding:20px">未找到</div>';
}
function toggleTheme() {
  State.theme = State.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', State.theme);
  DB.set('mc_theme', State.theme);
}
function applyTheme() {
  if (State.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
}

/* ===== Router ===== */
const Router = {
  current: 'toolbox',

  switch(page) {
    this.current = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = $('page-' + page);
    if (el) el.classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.page === page));
    const titles = {toolbox:'工具箱', settings:'设置'};
    $('headerTitle').textContent = titles[page] || '医学计算器';
    DB.set('app_page', page);
    haptic();
    Pages.render(page);
  },

  init() {
    const saved = DB.get('app_page', 'toolbox');
    this.current = saved;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = $('page-' + saved);
    if (el) el.classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.page === saved));
    const titles = {toolbox:'工具箱', settings:'设置'};
    $('headerTitle').textContent = titles[saved] || '医学计算器';
  }
};
async function init() {
  await DB.init();
  State.load();
  applyTheme();
  Router.init();
  Pages.render(Router.current);
}
/* ===== Page Rendering ===== */
const Pages = {
  render(page) {
    switch(page) {
      case 'toolbox': renderToolbox(); break;
      case 'settings': renderSettings(); break;
    }
  }
};
function renderToolbox() {
  const page = $('page-toolbox');
  if (!page) return;

  const savedQuickIds = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  const quickTools = CalcRegistry.filter(c => c.quick && savedQuickIds.includes(c.id));
  const categories = [...new Set(CalcRegistry.filter(c => !c.quick).map(c => c.cat))];
  const favs = State.favorites || [];

  let html = `
    <div class="search-bar" style="margin-bottom:10px">
      <input type="text" class="form-input" id="toolboxSearch" placeholder="🔍 搜索计算器..." oninput="filterToolbox(this.value)">
    </div>`;

  // Favorites
  if (favs.length) {
    html += `<div class="flex-between mb-8"><span class="text-sm text-secondary">⭐ 收藏</span></div>
    <div class="quick-tools" id="toolbox-favs">${favs.map(id => {
      const c = CalcRegistry.find(x => x.id === id);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('')}</div>`;
  }

  // Quick tools
  html += `<div class="flex-between mb-8 mt-12"><span class="text-sm text-secondary">⚡ 急算工具</span></div>
  <div class="quick-tools" id="toolbox-quick">${quickTools.map(c =>
    `<button class="qt-btn qt-trigger" data-qt-id="${c.id}" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>`
  ).join('')}</div>
  <div id="quick-calc-container" style="margin-top:8px"></div>`;

  // Category accordions
  html += '<div class="mt-12" id="toolbox-cats">';
  for (const cat of categories) {
    const tools = CalcRegistry.filter(c => c.cat === cat && !c.quick);
    const icon = cat === '肾脏' ? '🫘' : cat === '营养' ? '🥗' : cat === '补液' ? '💧' : cat === '胰岛素' ? '💊' : cat === '配药' ? '💉' : cat === '评分' ? '📊' : cat === '换算' ? '🔄' : cat === 'TPN' ? '🧬' : cat === '产科' ? '🤰' : '🧮';
    html += `<div class="accordion-item" data-cat="${cat}">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="acc-icon">${icon}</span>
        <span>${cat}</span>
        <span class="acc-arrow">▶</span>
      </div>
      <div class="accordion-body"><div class="accordion-body-inner">
        ${tools.map(c => `<div class="calc-card" data-calc-id="${c.id}" data-keywords="${c.keywords||''}">
          <div class="flex-between mb-8">
            <span style="font-weight:600;font-size:.9rem">${c.icon} ${c.name}</span>
            <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="toggleFavCalc('${c.id}',this)">${favs.includes(c.id) ? '★' : '☆'}</button>
          </div>
          ${renderCalcInputs(c)}
          <div class="result-box" id="res-${c.id}" style="display:none">
            <div class="res-value" id="res-main-${c.id}"></div>
            <div id="res-detail-${c.id}" style="font-size:.82rem;margin-top:4px"></div>
          </div>
        </div>`).join('')}
      </div></div>
    </div>`;
  }
  html += '</div>';

  // Reset button
  html += `<div class="text-center mt-12"><button class="btn btn-secondary btn-sm" onclick="resetAllCalcs()">🔄 重置所有计算器</button></div>`;

  page.innerHTML = html;
}
function renderCalcInputs(calc) {
  return `<div style="display:flex;flex-wrap:wrap;gap:6px">${calc.inputs.map(inp => {
    if (inp.type === 'check') {
      return `<label style="font-size:.82rem;display:flex;align-items:center;gap:4px;background:var(--bg);padding:4px 8px;border-radius:6px"><input type="checkbox" class="calc-input" data-calc="${calc.id}" data-key="${inp.k}"> ${inp.l}</label>`;
    }
    if (inp.type === 'select') {
      return `<select class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" style="width:auto;min-width:80px;padding:6px 8px;font-size:.82rem">${inp.opts.map(o => `<option value="${o.v}">${o.t}</option>`).join('')}</select>`;
    }
    if (inp.type === 'date') {
      return `<input type="date" class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" style="width:auto;min-width:100px;padding:6px 8px;font-size:.82rem">`;
    }
    return `<input type="number" class="form-input calc-input" data-calc="${calc.id}" data-key="${inp.k}" placeholder="${inp.l}" step="${inp.s||1}" style="width:auto;min-width:80px;padding:6px 8px;font-size:.82rem">`;
  }).join('')}
  <button class="btn btn-primary btn-sm" onclick="runCalc('${calc.id}')" style="padding:6px 12px">=</button></div>`;
}
function toggleAccordion(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}
function toggleFavCalc(id, btn) {
  const idx = State.favorites.indexOf(id);
  if (idx >= 0) { State.favorites.splice(idx, 1); btn.textContent = '☆'; }
  else { State.favorites.push(id); btn.textContent = '★'; }
  State.saveFavorites();
  // Update favs section
  const favsEl = document.getElementById('toolbox-favs');
  if (favsEl) {
    const parent = favsEl.parentElement;
    const newFavs = State.favorites.map(fid => {
      const c = CalcRegistry.find(x => x.id === fid);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('');
    if (State.favorites.length) {
      if (favsEl) favsEl.innerHTML = newFavs;
    }
  }
}
function runCalc(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  const values = {};
  document.querySelectorAll(`.calc-input[data-calc="${id}"]`).forEach(el => {
    if (el.type === 'checkbox') values[el.dataset.key] = el.checked;
    else if (el.type === 'number') values[el.dataset.key] = el.value ? parseFloat(el.value) : null;
    else values[el.dataset.key] = el.value;
  });
  const result = calc.compute(values);
  const resBox = document.getElementById('res-' + id);
  const mainEl = document.getElementById('res-main-' + id);
  const detailEl = document.getElementById('res-detail-' + id);
  if (!resBox || !mainEl || !detailEl) return;
  if (!result) { resBox.style.display = 'none'; return; }
  mainEl.innerHTML = result.main;
  detailEl.innerHTML = result.detail || '';
  resBox.style.display = '';
  resBox.className = 'result-box' + (result.warn ? ' result-danger' : ' result-ok');
  haptic();
}
function openCalcCard(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  // Check accordion card first
  const card = document.querySelector(`.accordion-item [data-calc-id="${id}"]`);
  if (card) {
    const accordion = card.closest('.accordion-item');
    if (accordion && !accordion.classList.contains('open')) accordion.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
    return;
  }
  // Quick tool — toggle card in quick-calc-container
  const container = document.getElementById('quick-calc-container');
  if (!container) return;
  const existing = container.querySelector(`[data-calc-id="${id}"]`);
  if (existing) {
    existing.remove();
    document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.remove('active'));
    return;
  }
  const favs = State.favorites || [];
  const cardHtml = `<div class="calc-card" data-calc-id="${id}" style="border:2px solid var(--primary);border-radius:12px;padding:12px;background:var(--card);margin-top:8px">
    <div class="flex-between mb-8">
      <span style="font-weight:600;font-size:.95rem">${calc.icon} ${calc.name}</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="toggleFavCalc('${calc.id}',this)">${favs.includes(calc.id) ? '★' : '☆'}</button>
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="openCalcCard('${calc.id}')">✕</button>
      </div>
    </div>
    ${renderCalcInputs(calc)}
    <div class="result-box" id="res-${calc.id}" style="display:none">
      <div class="res-value" id="res-main-${calc.id}"></div>
      <div id="res-detail-${calc.id}" style="font-size:.82rem;margin-top:4px"></div>
    </div>
  </div>`;
  container.insertAdjacentHTML('beforeend', cardHtml);
  document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.add('active'));
  setTimeout(() => container.querySelector(`[data-calc-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}
function filterToolbox(q) {
  const ql = q.toLowerCase().trim();
  // Filter accordion calc cards
  document.querySelectorAll('.calc-card').forEach(card => {
    const kw = (card.dataset.keywords || '').toLowerCase();
    const name = card.querySelector('.flex-between span')?.textContent?.toLowerCase() || '';
    card.style.display = (!ql || kw.includes(ql) || name.includes(ql)) ? '' : 'none';
  });
  // Filter quick tool buttons
  document.querySelectorAll('#toolbox-quick .qt-btn, #toolbox-favs .qt-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!ql || text.includes(ql)) ? '' : 'none';
  });
  // Auto-open matching accordions
  if (ql) {
    document.querySelectorAll('.accordion-item').forEach(item => {
      const hasVisible = item.querySelector('.calc-card:not([style*="display: none"])');
      if (hasVisible) item.classList.add('open');
    });
  }
}
function resetAllCalcs() {
  document.querySelectorAll('.calc-input').forEach(el => {
    if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  document.querySelectorAll('[id^="res-"]').forEach(el => el.style.display = 'none');
  showToast('已重置');
}

const DEFAULT_QUICK_IDS = ['abg','nadeficit','pumprate','lactate','map','hyperk','insulin_drip','correctedca','nacorr'];
const Calc = {
  round(n, d=1) { return n == null || isNaN(n) ? '' : Math.round(n * 10**d) / 10**d; },

  abg(ph, pco2, hco3, na, cl, k, lac, alb) {
    if (!ph || !pco2 || !hco3) return null;
    ph = +ph; pco2 = +pco2; hco3 = +hco3; na = +na; cl = +cl;
    let state = ph < 7.35 ? '酸血症' : ph > 7.45 ? '碱血症' : 'pH正常';
    let primary = '', primaryDetail = '';
    if (ph < 7.35) {
      if (pco2 > 45) { primary = '呼吸性酸中毒'; primaryDetail = `PaCO₂ ${pco2}>45`; }
      if (hco3 < 22) { primary += (primary?' + ':'') + '代谢性酸中毒'; primaryDetail += (primaryDetail?'；':'') + `HCO₃⁻ ${hco3}<22`; }
    } else if (ph > 7.45) {
      if (pco2 < 35) { primary = '呼吸性碱中毒'; primaryDetail = `PaCO₂ ${pco2}<35`; }
      if (hco3 > 26) { primary += (primary?' + ':'') + '代谢性碱中毒'; primaryDetail += (primaryDetail?'；':'') + `HCO₃⁻ ${hco3}>26`; }
    } else {
      if (pco2 > 45 && hco3 > 26) primary = '混合性紊乱（待定）';
      else if (pco2 < 35 && hco3 < 22) primary = '混合性紊乱（待定）';
      else primary = '无明显原发紊乱';
    }
    let lines = [`<b>① ${state}</b>（pH ${ph}）`, `<b>② 原发紊乱</b>: ${primary}`];
    // Compensation + acute/chronic distinction
    const hasMetAcid = primary.includes('代谢性酸中毒'), hasMetAlk = primary.includes('代谢性碱中毒');
    const hasRespAcid = primary.includes('呼吸性酸中毒'), hasRespAlk = primary.includes('呼吸性碱中毒');
    if (hasMetAcid && !hasRespAcid && !hasRespAlk) {
      const exp = 1.5 * hco3 + 8, lo = this.round(exp-2,1), hi = this.round(exp+2,1);
      const msg = pco2 < lo ? '合并呼碱' : pco2 > hi ? '合并呼酸' : '代偿适当';
      lines.push(`<b>③ 代偿</b>: 预计PaCO₂ ${this.round(exp,1)}（${lo}-${hi}）→ ${msg}`);
    } else if (hasMetAlk && !hasRespAcid && !hasRespAlk) {
      const exp = 0.7 * hco3 + 21, lo = this.round(exp-2,1), hi = this.round(exp+2,1);
      const msg = pco2 < lo ? '合并呼碱' : pco2 > hi ? '合并呼酸' : '代偿适当';
      lines.push(`<b>③ 代偿</b>: 预计PaCO₂ ${this.round(exp,1)}（${lo}-${hi}）→ ${msg}`);
    } else if (hasRespAcid && !hasMetAcid && !hasMetAlk) {
      const dc = pco2 - 40;
      const ac = this.round(24 + dc*0.1,1), chr = this.round(24 + dc*0.35,1);
      const chronic = Math.abs(hco3-chr) <= Math.abs(hco3-ac);
      lines.push(`<b>③ 急/慢</b>: 急性HCO₃⁻ ${ac}，慢性 ${chr}，实测 ${hco3} → ${chronic?'慢性':'急性'}呼酸`);
    } else if (hasRespAlk && !hasMetAcid && !hasMetAlk) {
      const dc = 40 - pco2;
      const ac = this.round(24 - dc*0.2,1), chr = this.round(24 - dc*0.5,1);
      const chronic = Math.abs(hco3-chr) <= Math.abs(hco3-ac);
      lines.push(`<b>③ 急/慢</b>: 急性HCO₃⁻ ${ac}，慢性 ${chr}，实测 ${hco3} → ${chronic?'慢性':'急性'}呼碱`);
    } else {
      lines.push('<b>③ 代偿</b>: 混合紊乱，公式不适用');
    }
    // AG with albumin correction
    let warnMsg = '';
    if (na && cl) {
      const ag = this.round(na - cl - hco3, 1);
      let effAG = ag, agStr = `AG = ${ag}`;
      if (alb) { const cAG = this.round(ag + 2.5*(4 - alb/10),1); effAG = cAG; agStr += ` → 校正AG = ${cAG}`; }
      agStr += effAG > 16 ? ' ⬆️' : effAG < 8 ? ' ⬇️' : ' ✓';
      lines.push(`<b>④ 阴离子间隙</b>: ${agStr}`);
      // Delta-Delta
      if (effAG > 16 && hco3 < 24) {
        const dd = this.round((effAG-12)/(24-hco3),2);
        if (dd && dd > 0) {
          const ddMsg = dd < 1 ? '合并正常AG代酸' : dd <= 2 ? '单纯高AG代酸' : '合并代碱';
          lines.push(`<b>⑤ Δ-Δ</b> = ${dd} → ${ddMsg}`);
        }
      }
    }
    if (lac && lac > 2) { lines.push(`<b>⑥ 乳酸</b>: ${lac} ⬆️`); if (lac > 4) warnMsg = '乳酸>4, 严重乳酸酸中毒'; }
    if (k && k < 3.5) lines.push(`<b>⑦ K⁺</b>: ${k} 低钾`);
    if (k && k > 5.0) lines.push(`<b>⑦ K⁺</b>: ${k} 高钾`);
    return { main: `${state} · ${primary}`, detail: lines.join('<br>'), warn: warnMsg };
  },

  nadeficit(na, wt, sex) {
    if (!na || !wt) return null;
    na = +na; wt = +wt;
    const factor = sex === '女' ? 0.5 : 0.6;
    const deficit = Math.round((140 - na) * wt * factor);
    const rate = Math.round(deficit / 72);
    return { main: `缺钠量 ≈ ${deficit} mmol`, detail: `TBW系数 ${factor}（${sex||'男'}）<br>按72h纠正: 约${rate} mmol/h<br>纠正速度 ≤ 0.5 mmol/L/h` };
  },

  naCorrection(na, glu) {
    if (!na || !glu) return null;
    na = +na; glu = +glu;
    const corrected = this.round(na + 0.024 * (glu - 5.5), 1);
    return { main: `校正Na⁺ = ${corrected} mmol/L`, detail: `${na} + 0.024×(${glu}-5.5)` };
  },

  kdeficit(k, wt) {
    if (!k || !wt) return null;
    k = +k; wt = +wt;
    const deficit = Math.round((3.5 - k) / 0.3 * 100);
    const maxRate = Math.min(Math.round(wt * 0.5), 20);
    let warn = '';
    if (k < 2.5) warn = '严重低钾！需心电监护，中心静脉高浓度补钾';
    else if (k < 3.0) warn = '中重度低钾，建议静脉补钾';
    return { main: `缺钾 ≈ ${deficit} mmol`, detail: `安全补钾上限: ${maxRate} mmol/h(外周)${warn ? '<br>⚠️ ' + warn : ''}`, warn };
  },

  hyperK(k) {
    if (!k) return null;
    k = +k;
    let lines = [], level = '';
    if (k >= 7.0) { level = '危急'; lines.push('⚠️ 立即心电监护！准备紧急处理'); }
    else if (k >= 6.0) { level = '严重'; lines.push('⚠️ 需紧急处理'); }
    else if (k >= 5.5) { level = '中度'; lines.push('需积极处理'); }
    else { level = '轻度'; }
    lines.push('1. 10%葡萄糖酸钙 10mL iv (稳定心肌)');
    if (k >= 6.0) lines.push('2. RI 10U + 50%GS 50mL iv (促K⁺内移)');
    lines.push(`${k >= 6.0 ? '3' : '2'}. 聚苯乙烯磺酸钠 15-30g po (排K⁺)`);
    lines.push(`${k >= 6.0 ? '4' : '3'}. 呋塞米 20-40mg iv (利尿排K⁺)`);
    if (k >= 7.0) lines.push('5. 碳酸氢钠 150mL iv (纠酸促K⁺内移)');
    lines.push('6. 排查原因（药物、肾功能、溶血等）');
    return { main: `K⁺ ${k} mmol/L — ${level}高钾血症`, detail: lines.join('<br>'), warn: level === '危急' || level === '严重' };
  },

  correctedCa(ca, alb) {
    if (!ca || !alb) return null;
    ca = +ca; alb = +alb;
    const corrected = this.round(ca + 0.02 * (40 - alb), 2);
    return { main: `校正钙 = ${corrected} mmol/L`, detail: `${ca} + 0.02×(40-${alb})` };
  },

  cg(age, wt, cr, sex, useIBW, ht) {
    if (!age || !wt || !cr) return null;
    age = +age; wt = +wt; cr = +cr;
    let w = wt, note = '';
    if (useIBW && ht) {
      const ibw = sex === '女' ? 45.5 + 0.91*(+ht-152.4) : 50 + 0.91*(+ht-152.4);
      w = Math.min(wt, ibw); note = '已用去脂体重校正';
    }
    const crMg = cr / 88.4;
    let crcl = ((140 - age) * w) / (72 * crMg);
    if (sex === '女') crcl *= 0.85;
    crcl = this.round(crcl, 1);
    return { main: `CrCl = ${crcl} mL/min`, detail: `Cockcroft-Gault${note ? ' · ' + note : ''}` };
  },

  egfr(cr, age, sex) {
    if (!cr || !age) return null;
    cr = +cr; age = +age;
    const scr = cr / 88.4;
    const k = sex === '女' ? 0.7 : 0.9;
    const alpha = sex === '女' ? -0.241 : -0.302;
    const sexFac = sex === '女' ? 1.012 : 1;
    let gfr;

  gcs(eye, verbal, motor) {
    const total = +eye + +verbal + +motor;
    return { main: `GCS = ${total}（E${eye}V${verbal}M${motor}）`, detail: total>=13?'轻度':total>=9?'中度':'重度昏迷', warn: total<9?'GCS<8考虑插管保护气道':'' };
  },
  apgar(color, hr, reflex, tone, resp) {
    const total = +color + +hr + +reflex + +tone + +resp;
    return { main: `Apgar = ${total}/10`, detail: total>=7?'正常':total>=4?'轻度窒息':'重度窒息', warn: total<4?'需立即复苏':'' };
  },
  insulinPrep() {
    return { main: '50U RI + 49.5mL NS', detail: '浓度 1U/mL<br>起始 0.1U/kg/h' };
  },

  // === Unit Converters ===
  convGluc(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*18.02)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/18.02,1)} mmol/L`,detail:''}; },
  convCr(val, from) { return from==='umol' ? {main:`${val} μmol/L = ${this.round(val/88.4,2)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${Math.round(val*88.4)} μmol/L`,detail:''}; },
  convCa(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${this.round(val*4.008,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/4.008,2)} mmol/L`,detail:''}; },
  convMg(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${this.round(val*2.43,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/2.43,2)} mmol/L`,detail:''}; },
  convBili(val, from) { return from==='umol' ? {main:`${val} μmol/L = ${this.round(val/17.1,1)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${Math.round(val*17.1)} μmol/L`,detail:''}; },
  convChol(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*38.67)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/38.67,2)} mmol/L`,detail:''}; },
  convTG(val, from) { return from==='mmol' ? {main:`${val} mmol/L = ${Math.round(val*88.57)} mg/dL`,detail:''} : {main:`${val} mg/dL = ${this.round(val/88.57,2)} mmol/L`,detail:''}; },
  convPres(val, from) {
    let mmhg = from==='mmhg'?+val : from==='kpa'?+val/0.1333 : +val/1.36;
    return { main: `${Math.round(mmhg)} mmHg = ${this.round(mmhg*0.1333,2)} kPa = ${this.round(mmhg*1.36,1)} cmH₂O`, detail: '' };
  },
  convTemp(val, from) {
    return from==='c' ? { main: `${val}°C = ${this.round(val*9/5+32,1)}°F`, detail: '' }
      : { main: `${val}°F = ${this.round((val-32)*5/9,1)}°C`, detail: '' };
  }
};

function renderQuickCalcToggles() {
  const saved = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  const allQuick = CalcRegistry.filter(c => c.quick);
  return allQuick.map(c =>
    `<label style="display:inline-flex;align-items:center;gap:6px;margin:4px 8px 4px 0;padding:6px 10px;background:var(--bg);border-radius:8px;font-size:.85rem;cursor:pointer">
      <input type="checkbox" ${saved.includes(c.id)?'checked':''} onchange="saveQuickCalcSetting('${c.id}',this.checked)">
      ${c.icon} ${c.name}
    </label>`
  ).join('');
}
function saveQuickCalcSetting(id, on) {
  let saved = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  if (on && !saved.includes(id)) saved.push(id);
  if (!on) saved = saved.filter(x => x !== id);
  DB.set('mc_quick_calcs', saved);
}

function exportAllData() {
  const data = {
    favorites: State.favorites,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `calc-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('数据已导出');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.favorites) { State.favorites = data.favorites; State.saveFavorites(); }
        Pages.render('toolbox');
        showToast('数据已导入');
      } catch(err) { showToast('导入失败: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData() {
  if (!confirm('确认清除所有数据？此操作不可恢复！')) return;
  State.favorites = []; State.saveFavorites();
  showToast('所有数据已清除');
  Pages.render('toolbox');
}

// Flush cache to localStorage as backup on page close
function _flushAllStorage() {
  try {
    for (const [k, v] of Object.entries(DB._cache)) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
    }
  } catch(e) {}
}
window.addEventListener('pagehide', _flushAllStorage);
window.addEventListener('beforeunload', _flushAllStorage);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') _flushAllStorage();
});

/* ===== Start ===== */
init();
