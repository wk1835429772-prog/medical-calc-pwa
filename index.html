<title>дЄіеЇКеК©жЙЛ</title>
<style>
/* ===== 1. CSS Variables ===== */
:root {
  --primary: #0077b6;
  --primary-dark: #005a8a;
  --primary-light: #e6f3fa;
  --danger: #e63946;
  --danger-bg: #ffebee;
  --warning: #f4a261;
  --warning-bg: #fff8e1;
  --success: #2a9d8f;
  --success-bg: #e8f5f3;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #5c6b73;
  --border: #e1e5e9;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --header-h: 44px;
  --tabbar-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --primary: #4dabf7;
  --primary-dark: #339af0;
  --primary-light: #1a3a5c;
  --danger: #ff6b6b;
  --danger-bg: #3a1a1a;
  --warning: #ffd43b;
  --warning-bg: #3a3310;
  --success: #51cf66;
  --success-bg: #1a3a1a;
  --bg: #0f1419;
  --card: #1a1f2e;
  --text: #e9ecef;
  --text2: #adb5bd;
  --border: #2d3748;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

/* ===== 2. Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:15px;
  -webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  transition:background .3s,color .3s;
}
input,select,textarea,button{font:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-user-select:none;user-select:none}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ===== 3. Header ===== */
.app-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:100;
  display:flex;align-items:center;padding:0 12px;gap:8px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:.95rem;font-weight:600;
  box-shadow:0 1px 8px rgba(0,0,0,.12);
}
.app-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.15);font-size:.9rem;transition:background .2s;
}
.header-btn:active{background:rgba(255,255,255,.3)}

/* ===== 4. Bottom Tab Bar ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tabbar-h);
  padding-bottom:var(--safe-bottom);
  display:flex;background:var(--card);border-top:1px solid var(--border);
  z-index:100;box-shadow:0 -1px 8px rgba(0,0,0,.06);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:.65rem;color:var(--text2);transition:color .2s;position:relative;
}
.tab-item .tab-icon{font-size:1.2rem;line-height:1}
.tab-item.active{color:var(--primary)}
.tab-item.active::after{
  content:'';position:absolute;top:0;left:25%;right:25%;height:2px;
  background:var(--primary);border-radius:0 0 2px 2px;
}

/* ===== 5. Page Container ===== */
.page{
  position:absolute;top:var(--header-h);bottom:var(--tabbar-h);left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px;padding-bottom:calc(12px + var(--safe-bottom));
  display:none;
}
.page.active{display:block}
.page-ai.active{display:flex;flex-direction:column;padding-bottom:0}
.page-ai #aiChatBody{flex:1;overflow-y:auto;min-height:0}

/* ===== 6. Cards ===== */
.card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;margin-bottom:10px;
}
.card-title{font-weight:600;font-size:.9rem;margin-bottom:8px}

/* ===== 7. Patient Cards ===== */
.pt-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:12px 14px;margin-bottom:10px;
  border-left:4px solid var(--success);cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.pt-card:active{transform:scale(.98);box-shadow:0 1px 6px rgba(0,0,0,.08)}
.pt-card.severity-critical{border-left-color:var(--danger)}
.pt-card.severity-warning{border-left-color:var(--warning)}
.pt-card.severity-stable{border-left-color:var(--success)}
.pt-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pt-card-name{font-weight:700;font-size:.95rem}
.pt-card-bed{
  font-size:.72rem;padding:1px 6px;border-radius:4px;
  background:var(--primary-light);color:var(--primary);font-weight:500;
}
.pt-card-demo{font-size:.75rem;color:var(--text2);margin-left:auto}
.pt-card-dx{font-size:.78rem;color:var(--text2);margin-bottom:4px}
.pt-card-vitals{font-size:.78rem;display:flex;flex-wrap:wrap;gap:6px 12px}
.pt-card-vitals span{white-space:nowrap}
.pt-card-labs{font-size:.75rem;margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 8px}
.pt-card-labs .abnormal{color:var(--danger);font-weight:600}
.pt-card-labs .warning{color:var(--warning)}
.pt-card-spark{margin-top:4px}

/* ===== 8. Severity Badge ===== */
.severity-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  display:inline-block;
}
.severity-dot.critical{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.severity-dot.warning{background:var(--warning)}
.severity-dot.stable{background:var(--success)}

/* ===== 9. Alerts Panel ===== */
.alerts-panel{
  background:var(--danger-bg);border:1px solid rgba(230,57,70,.2);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;
}
.alerts-panel-title{font-size:.82rem;font-weight:600;color:var(--danger);margin-bottom:6px}
.alerts-panel-item{font-size:.78rem;padding:2px 0;display:flex;gap:6px;align-items:center}
.alerts-panel-item .alert-name{font-weight:500}
.alerts-panel-item .alert-value{color:var(--danger)}

/* ===== 10. Quick Tools ===== */
.quick-tools{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.qt-btn{
  padding:8px 14px;border-radius:8px;font-size:.78rem;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid var(--border);
  transition:all .15s;
}
.qt-btn:active{background:var(--primary);color:#fff}
.qt-trigger.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 11. Forms ===== */
.form-group{margin-bottom:8px}
.form-group label{display:block;font-size:.78rem;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-input,.pt-input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--card);font-size:.9rem;transition:border-color .2s;
}
.form-input:focus,.pt-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 15%,transparent)}
.pt-input{background:var(--bg);border-color:color-mix(in srgb,var(--border) 80%,var(--text2))}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
textarea.form-input{min-height:80px;resize:vertical;line-height:1.6}

/* ===== 12. Buttons ===== */
.btn{
  padding:10px 16px;border-radius:8px;font-size:.85rem;font-weight:500;
  transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:4px;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-secondary.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 10px;font-size:.78rem}
.btn-block{width:100%}

/* ===== 13. Sub Tabs ===== */
.sub-tabs{
  display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;
  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{
  flex-shrink:0;padding:10px 14px;font-size:.82rem;font-weight:500;
  color:var(--text2);border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.sub-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ===== 14. Accordion ===== */
.accordion-item{margin-bottom:6px}
.accordion-header{
  display:flex;align-items:center;gap:8px;padding:12px 14px;
  background:var(--card);border-radius:var(--radius);cursor:pointer;
  font-weight:600;font-size:.88rem;transition:background .15s;
  box-shadow:var(--shadow);
}
.accordion-header:active{background:var(--primary-light)}
.accordion-header .acc-icon{font-size:1rem}
.accordion-header .acc-arrow{
  margin-left:auto;font-size:.7rem;color:var(--text2);
  transition:transform .2s;
}
.accordion-item.open .acc-arrow{transform:rotate(90deg)}
.accordion-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  padding:0 4px;
}
.accordion-item.open .accordion-body{max-height:3000px}
.accordion-body-inner{padding:8px 0}

/* ===== 15. Result Display ===== */
.result-box{
  padding:10px 12px;border-radius:8px;margin:8px 0;font-size:.85rem;
  line-height:1.7;background:var(--bg);border:1px solid var(--border);
}
.result-box .res-label{color:var(--text2);font-size:.78rem}
.result-box .res-value{font-weight:600;font-size:1rem}
.result-ok{border-color:var(--success);background:var(--success-bg)}
.result-warn{border-color:var(--warning);background:var(--warning-bg)}
.result-danger{border-color:var(--danger);background:var(--danger-bg)}

/* ===== 16. Toast ===== */
.toast{
  position:fixed;top:calc(var(--header-h) + 8px);left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:8px;font-size:.85rem;font-weight:500;
  background:rgba(0,0,0,.8);color:#fff;z-index:999;
  transition:transform .3s ease;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== 17. Bottom Sheet ===== */
.bottom-sheet-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.bottom-sheet-mask.show{opacity:1;pointer-events:auto}
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;max-height:70vh;
  background:var(--card);border-radius:16px 16px 0 0;z-index:201;
  transform:translateY(100%);transition:transform .3s ease;
  overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bottom));
}
.bottom-sheet.show{transform:translateY(0)}
.bottom-sheet-handle{
  width:36px;height:4px;border-radius:2px;background:var(--border);
  margin:0 auto 16px;
}

/* ===== 18. Slide Page ===== */
.slide-page{
  position:fixed;top:0;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg);transform:translateX(100%);
  transition:transform .3s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.slide-page.show{transform:translateX(0)}
.slide-header{
  position:sticky;top:0;z-index:10;height:var(--header-h);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  background:var(--card);border-bottom:1px solid var(--border);
}
.slide-back{font-size:1.2rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.slide-title{flex:1;font-weight:600;font-size:.95rem}
.slide-actions{display:flex;gap:6px}
.slide-body{padding:12px;padding-bottom:calc(80px + var(--safe-bottom))}

/* ===== 19. AI Chat ===== */
.ai-msg{
  padding:10px 14px;border-radius:12px;margin-bottom:8px;
  font-size:.88rem;line-height:1.7;max-width:88%;word-break:break-word;
}
.ai-msg-user{background:var(--primary);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.ai-msg-assistant{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.ai-thinking{font-size:.72rem;color:var(--text2);padding:2px 0 4px;opacity:.7}
.ai-thinking .spin{
  display:inline-block;width:12px;height:12px;
  border:2px solid var(--primary);border-top-color:transparent;
  border-radius:50%;animation:spin .8s linear infinite;margin-right:4px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-quick-cmds{
  display:flex;gap:6px;overflow-x:auto;padding:8px 0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.ai-quick-cmds::-webkit-scrollbar{display:none}
.ai-cmd-btn{
  flex-shrink:0;padding:6px 12px;border-radius:16px;font-size:.78rem;
  background:var(--primary-light);color:var(--primary);border:1px solid var(--border);
}
.ai-cmd-btn:active{background:var(--primary);color:#fff}
.ai-input-bar{
  display:flex;gap:6px;padding:10px 12px;
  background:var(--bg);border-top:1px solid var(--border);
}
.ai-input-bar input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;
  background:var(--card);font-size:.9rem;
}
.ai-input-bar input:focus{border-color:var(--primary)}
.ai-input-bar .send-btn{
  width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
}
.ai-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ai-status-dot.connected{background:var(--success)}
.ai-status-dot.disconnected{background:var(--danger)}

/* ===== 20. Settings ===== */
.settings-group{margin-bottom:16px}
.settings-group-title{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:14px;
  background:var(--card);border-radius:var(--radius);margin-bottom:2px;cursor:pointer;
}
.settings-item:first-of-type{border-radius:var(--radius) var(--radius) 4px 4px}
.settings-item:last-of-type{border-radius:4px 4px var(--radius) var(--radius)}
.settings-item:only-of-type{border-radius:var(--radius)}
.settings-item+.settings-item{margin-top:-2px}
.settings-icon{font-size:1.2rem;width:28px;text-align:center}
.settings-text{flex:1}
.settings-label{font-size:.9rem;font-weight:500}
.settings-desc{font-size:.75rem;color:var(--text2)}
.settings-arrow{color:var(--text2);font-size:.8rem}
.toggle{
  width:44px;height:24px;border-radius:12px;background:var(--border);
  position:relative;transition:background .2s;cursor:pointer;
}
.toggle.on{background:var(--primary)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(20px)}

/* ===== 21. Search Overlay ===== */
.search-overlay{
  position:fixed;inset:0;z-index:180;background:var(--bg);
  transform:translateY(-100%);transition:transform .25s ease;
  padding:12px;overflow-y:auto;
}
.search-overlay.show{transform:translateY(0)}
.search-bar{
  display:flex;gap:8px;align-items:center;margin-bottom:12px;
}
.search-bar input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);font-size:.9rem;
}
.search-bar input:focus{border-color:var(--primary)}

/* ===== 22. Utility ===== */
.hidden{display:none!important}
.text-center{text-align:center}
.text-sm{font-size:.78rem}
.text-secondary{color:var(--text2)}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-6{gap:6px}.gap-8{gap:8px}
.overflow-auto{overflow-x:auto}

/* ===== 23. Date Nav ===== */
.date-nav{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:8px 0;margin-bottom:8px;
}
.date-nav button{
  width:32px;height:32px;border-radius:50%;background:var(--bg);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
}
.date-nav button:active{background:var(--primary-light)}
.date-nav .date-display{font-size:.88rem;font-weight:600;min-width:120px;text-align:center}

/* ===== 24. Event Log ===== */
.event-tag{
  display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:4px;font-size:.72rem;font-weight:500;margin:2px;
}
.event-tag.critical{background:var(--danger-bg);color:var(--danger)}
.event-tag.procedure{background:var(--primary-light);color:var(--primary)}
.event-tag.info{background:var(--bg);color:var(--text2)}

/* ===== 25. Med List ===== */
.med-item{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--bg);border-radius:8px;margin-bottom:4px;font-size:.85rem;
}
.med-item .med-name{font-weight:600;flex:1}
.med-item .med-dose{color:var(--text2)}
.med-item .med-del{color:var(--danger);font-size:.9rem;padding:4px}

/* ===== 26. Lab Mode Toggle ===== */
.lab-mode-toggle{display:flex;gap:0;margin-bottom:10px}
.lab-mode-toggle button{
  flex:1;padding:8px;border:1px solid var(--border);background:var(--bg);
  color:var(--text);font-size:.82rem;transition:all .15s;
}
.lab-mode-toggle button:first-child{border-radius:6px 0 0 6px}
.lab-mode-toggle button:last-child{border-radius:0 6px 6px 0}
.lab-mode-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== 27. Sparkline ===== */
.sparkline{display:inline-block;vertical-align:middle}

/* ===== 31. Calc Cards ===== */
.calc-card{
  background:var(--card);border-radius:8px;padding:12px;margin-bottom:8px;
  border:1px solid var(--border);
}

/* ===== 28. Crit Inline ===== */
.crit-inline{font-size:.72rem;padding:2px 0;min-height:16px}
.crit-inline.danger{color:var(--danger);font-weight:600}
.crit-inline.warn{color:var(--warning)}

/* ===== 29. Save Indicator ===== */
.save-indicator{
  position:fixed;bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 8px);
  right:12px;padding:4px 10px;border-radius:12px;font-size:.72rem;
  background:var(--success-bg);color:var(--success);opacity:0;
  transition:opacity .3s;pointer-events:none;z-index:50;
}
.save-indicator.show{opacity:1}

/* ===== 30. Responsive ===== */
@media(min-width:768px){
  body{max-width:500px;margin:0 auto;box-shadow:-1px 0 0 var(--border),1px 0 0 var(--border)}
  .app-header,.tabbar{max-width:500px;left:50%;right:auto;transform:translateX(-50%)}
  .slide-page{max-width:500px;left:50%;right:auto}
  .slide-page.slide-page{transform:translateX(100%)}
  .slide-page.slide-page.show{transform:translateX(-50%)}
  .search-overlay{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100%)}
  .search-overlay.show{transform:translateX(-50%) translateY(0)}
  .toast{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(-100px)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .bottom-sheet{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(100%)}
  .bottom-sheet.show{transform:translateX(-50%) translateY(0)}
}

/* ===== 4a. DB Storage Layer (IndexedDB primary + localStorage backup) ===== */
const DB = {
  _cache: {},
  _db: null,
  _idbReady: false,

  _showStatus(msg, type) {
    const el = document.getElementById('db-debug');
    if (el) { el.textContent = msg; el.style.background = type === 'error' ? 'var(--danger)' : type === 'warn' ? 'var(--warning)' : 'var(--success)'; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
  },

  async init() {
    // Step 1: Load localStorage into cache (instant, for fast startup)
    let lsCount = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith('mc_') || k === 'app_page')) {
        try { this._cache[k] = JSON.parse(localStorage.getItem(k)); lsCount++; } catch { this._cache[k] = localStorage.getItem(k); lsCount++; }
      }
    }

    // Step 2: Open IndexedDB (primary storage, survives browser cleanup)
    await new Promise((resolve) => {
      const req = indexedDB.open('clinic-db', 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
      };
      req.onsuccess = (e) => {
        this._db = e.target.result;
        // Load all IDB data into cache (overwrites localStorage with fresh IDB data)
        const tx = this._db.transaction('kv', 'readonly');
        const store = tx.objectStore('kv');
        const cursorReq = store.openCursor();
        let idbCount = 0;
        cursorReq.onsuccess = (ev) => {
          const cursor = ev.target.result;
          if (cursor) {
            this._cache[cursor.key] = cursor.value;
            idbCount++;
            cursor.continue();
          } else {
            this._idbReady = true;
            // Migrate any localStorage-only keys into IDB
            this._syncAllToIDB();
            // Show status
            const pts = this._cache['mc_patients'];
            const ptCount = Array.isArray(pts) ? pts.length : 0;
            this._showStatus(`V3.3 еЈ≤еК†иљљ: IDB=${idbCount}й°є, LS=${lsCount}й°є, ${ptCount}дљНжВ£иАЕ`, 'ok');
            resolve();
          }
        };
        cursorReq.onerror = () => { this._idbReady = true; resolve(); };
      };
      req.onerror = () => {
        this._idbReady = false;
        this._showStatus(`IDBдЄНеПѓзФ®, дїЕзФ®LS: ${lsCount}й°є`, 'warn');
        resolve();
      };
    });

    // Step 3: Clean up old Service Worker (one-time)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        if (regs.length === 0) return;
        // Only register self-destruct SW if old SW exists
        navigator.serviceWorker.register('sw.js').then(r => r.update()).catch(() => {});
      }).catch(() => {});
    }
  },

  // Sync all cached keys to IDB (for migration from localStorage)
  _syncAllToIDB() {
    if (!this._db) return;
    try {
      const tx = this._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      for (const [k, v] of Object.entries(this._cache)) {
        store.put(v, k);
      }
    } catch(e) {}
  },

  get(key, def) {
    const v = this._cache[key];
    return v !== undefined ? v : def;
  },

  set(key, val) {
    this._cache[key] = val;
    // Write to IndexedDB (primary)
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(val, key);
      } catch(e) {}
    }
    // Also write to localStorage (backup)
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  },

  remove(key) {
    delete this._cache[key];
    if (this._db) {
      try {
        const tx = this._db.transaction('kv', 'readwrite');
        tx.objectStore('kv').delete(key);
      } catch(e) {}
    }
    try { localStorage.removeItem(key); } catch(e) {}
  }
};

function SparklineCanvas(data, w=80, h=20) {
  if (!data || data.length < 2) return '';
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  let path = `M0,${h - (data[0]-min)/range*h}`;
  for (let i = 1; i < data.length; i++) {
    path += ` L${(i*step).toFixed(1)},${(h - (data[i]-min)/range*h).toFixed(1)}`;
  }
  const lastVal = data[data.length - 1];
  const prevVal = data[data.length - 2];
  const color = lastVal > prevVal ? 'var(--danger)' : lastVal < prevVal ? 'var(--success)' : 'var(--text2)';
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

function getLabTrends(p) {

  const alerts = [];
  const labsToCheck = [

    { key: 'k', label: 'KвБЇ', unit: 'mmol/L', riseAlert: 'KвБЇжМБзї≠еНЗйЂШпЉМж≥®жДПењГеЊЛ', thresholds: [5.5, 6.0] },
    { key: 'plt', label: 'PLT', unit: '√Ч10вБє/L', dropAlert: 'PLTжМБзї≠дЄЛйЩНпЉМи≠¶жГХDIC/еЗЇи°А', thresholds: [100, 50] },
    { key: 'hgb', label: 'Hb', unit: 'g/L', dropAlert: 'HbжМБзї≠дЄЛйЩНпЉМж≥®жДПеЗЇи°А', thresholds: [90, 70] },
    { key: 'wbc', label: 'WBC', unit: '√Ч10вБє/L', riseAlert: 'WBCжМБзї≠еНЗйЂШпЉМжДЯжЯУжБґеМЦ', thresholds: [15, 20] },
    { key: 'crp', label: 'CRP', unit: 'mg/L', riseAlert: 'CRPжМБзї≠еНЗйЂШ', thresholds: [50, 100] },
    { key: 'pct', label: 'PCT', unit: 'ng/mL', riseAlert: 'PCTеНЗйЂШпЉМзїЖиПМжДЯжЯУ', thresholds: [0.5, 2] },
    { key: 'bun', label: 'BUN', unit: 'mmol/L', riseAlert: 'BUNдЄКеНЗ', thresholds: [15, 30] },
    { key: 'na', label: 'NaвБЇ', unit: 'mmol/L', dropAlert: 'NaвБЇдЄЛйЩН', riseAlert: 'NaвБЇеНЗйЂШ', thresholds: [130, 150] }
  ];

  for (const lab of labsToCheck) {
    const vals = [];
    for (const d of dates.slice(-5)) {
      const v = parseFloat(p.records[d]?.labs?.[lab.key]);
      if (!isNaN(v)) vals.push({ date: d, value: v });
    }
    if (vals.length < 2) continue;
    const last3 = vals.slice(-3);
    // Check for continuous rise
    if (lab.riseAlert && last3.length >= 3 && last3[2].value > last3[1].value && last3[1].value > last3[0].value) {
      const change = last3[2].value - last3[0].value;
      alerts.push({ level: 'danger', text: `${lab.label}: ${last3[0].value}вЖТ${last3[1].value}вЖТ${last3[2].value} вЖС ${lab.riseAlert}` });
    }
    // Check for continuous drop
    if (lab.dropAlert && last3.length >= 3 && last3[2].value < last3[1].value && last3[1].value < last3[0].value) {
      alerts.push({ level: 'danger', text: `${lab.label}: ${last3[0].value}вЖТ${last3[1].value}вЖТ${last3[2].value} вЖУ ${lab.dropAlert}` });
    }
    // Check current against thresholds
    const current = vals[vals.length - 1].value;
    if (lab.thresholds) {
      if (lab.thresholds[1] && current > lab.thresholds[1]) {
        alerts.push({ level: 'critical', text: `${lab.label} = ${current} ${lab.unit} вЪ†пЄП дЄ•йЗНеЉВеЄЄ` });
      } else if (lab.thresholds[0] && current > lab.thresholds[0] && lab.riseAlert) {
        alerts.push({ level: 'warn', text: `${lab.label} = ${current} ${lab.unit} вЖС` });
      }
      if (lab.dropAlert) {
        if (lab.thresholds[1] && current < lab.thresholds[1]) {
          alerts.push({ level: 'critical', text: `${lab.label} = ${current} ${lab.unit} вЪ†пЄП дЄ•йЗНдљОдЄЛ` });
        } else if (lab.thresholds[0] && current < lab.thresholds[0]) {
          alerts.push({ level: 'warn', text: `${lab.label} = ${current} ${lab.unit} вЖУ` });
        }
      }
    }
  }

  // Drug safety alerts based on Cr
  const lastCr = parseFloat(p.records[dates[dates.length-1]]?.labs?.cr);
  const meds = p.records[dates[dates.length-1]]?.medications || [];
  if (lastCr > 133) {
    for (const m of meds) {
      const name = (m.name || '').toLowerCase();
      if (name.includes('дЄЗеП§') || name.includes('vanco')) {
        alerts.push({ level: 'warn', text: `вЪ†пЄП ${m.name}: CrеНЗйЂШ(${lastCr})пЉМеїЇиЃЃзЫСжµЛдЄЗеП§йЬЙзі†и∞ЈжµУеЇ¶` });
      }
      if (name.includes('ж∞®еЯЇз≥Ц') || name.includes('еЇЖе§І') || name.includes('йШњз±≥еН°жШЯ') || name.includes('amikacin') || name.includes('gentam')) {
        alerts.push({ level: 'warn', text: `вЪ†пЄП ${m.name}: иВЊеКЯиГљдЄЛйЩНпЉМж∞®еЯЇз≥ЦиЛЈз±їйЬАи∞ГжХіеЙВйЗП` });
      }
      if (name.includes('дЇМзФ≤еПМиГН') || name.includes('metformin')) {
        alerts.push({ level: 'warn', text: `вЪ†пЄП дЇМзФ≤еПМиГН: Cr${lastCr}пЉМeGFR<30жЧґз¶БзФ®` });
      }
      if (name.includes('еСЛе°Юз±≥') || name.includes('furosemide')) {
        alerts.push({ level: 'info', text: `вДєпЄП еСЛе°Юз±≥: Cr${lastCr}пЉМеИ©е∞њжХИжЮЬеПѓиГљеЗПеЉ±` });
      }
    }
  }

  return alerts;
}

function getHistoricalValues(p, currentDate) {
  if (!p?.records) return {};
  const dates = Object.keys(p.records).sort();
  const idx = dates.indexOf(currentDate);
  if (idx <= 0) return {};
  const prevDate = dates[idx - 1];
  return { date: prevDate, record: p.records[prevDate] };
}

function renderTrendCharts(p) {
  if (!p?.records) return '<div class="text-sm text-secondary">жЪВжЧ†иґЛеКњжХ∞жНЃ</div>';
  const dates = Object.keys(p.records).sort();
  if (dates.length < 2) return '<div class="text-sm text-secondary">иЗ≥е∞СйЬАи¶Б2е§©жХ∞жНЃ</div>';
  const labs = [
    { key: 'cr', label: 'Cr', unit: 'ќЉmol/L', color: 'var(--danger)' },
    { key: 'lac', label: 'дє≥йЕЄ', unit: 'mmol/L', color: 'var(--warning)' },
    { key: 'abg_lac', label: 'ABGдє≥йЕЄ', unit: 'mmol/L', color: 'var(--warning)' },
    { key: 'k', label: 'KвБЇ', unit: 'mmol/L', color: 'var(--primary)' },
    { key: 'na', label: 'NaвБЇ', unit: 'mmol/L', color: 'var(--primary)' },
    { key: 'wbc', label: 'WBC', unit: '√Ч10вБє/L', color: 'var(--success)' },
    { key: 'plt', label: 'PLT', unit: '√Ч10вБє/L', color: 'var(--primary)' },
    { key: 'crp', label: 'CRP', unit: 'mg/L', color: 'var(--danger)' },
    { key: 'pct', label: 'PCT', unit: 'ng/mL', color: 'var(--danger)' },
    { key: 'hgb', label: 'Hb', unit: 'g/L', color: 'var(--danger)' },
    { key: 'bun', label: 'BUN', unit: 'mmol/L', color: 'var(--text2)' },
    { key: 'abg_ph', label: 'pH', unit: '', color: 'var(--primary)' }
  ];
  let charts = '';
  for (const lab of labs) {
    const data = [];
    const dateLabels = [];
    for (const d of dates.slice(-7)) {
      const v = parseFloat(p.records[d]?.labs?.[lab.key]);
      if (!isNaN(v)) { data.push(v); dateLabels.push(d.slice(5)); }
    }
    if (data.length < 2) continue;
    const min = Math.min(...data), max = Math.max(...data);
    const range = max - min || 1;
    const w = 120, h = 24;
    const step = w / (data.length - 1);
    let path = `M0,${h - (data[0]-min)/range*h}`;
    for (let i = 1; i < data.length; i++) {
      path += ` L${(i*step).toFixed(1)},${(h - (data[i]-min)/range*h).toFixed(1)}`;
    }
    const trend = data[data.length-1] > data[0] ? 'вЖС' : data[data.length-1] < data[0] ? 'вЖУ' : 'вЖТ';
    const trendColor = data[data.length-1] > data[0] ? 'var(--danger)' : 'var(--success)';
    charts += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.82rem">
      <span style="width:60px;font-weight:500">${lab.label}</span>
      <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="flex-shrink:0">
        <path d="${path}" fill="none" stroke="${lab.color}" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span style="width:60px;text-align:right">${data[data.length-1]}${lab.unit}</span>
      <span style="color:${trendColor};width:16px">${trend}</span>
    </div>`;
  }
  return charts || '<div class="text-sm text-secondary">жЪВжЧ†иґЛеКњжХ∞жНЃ</div>';
}

function getDrugSafetyAlerts(p, rec) {
  const cr = parseFloat(rec?.labs?.cr);
  const eGFRStr = calcEgfrForPatient(p, rec);
  const eGFRMatch = eGFRStr.match(/eGFR\s*=\s*([\d.]+)/);
  const eGFR = eGFRMatch ? parseFloat(eGFRMatch[1]) : null;
  const meds = rec?.medications || [];
  if (!meds.length || (isNaN(cr) && !eGFR)) return '';
  const alerts = [];
  // Check medications against renal function
  for (const m of meds) {
    const name = (m.name || '').toLowerCase();
    if (eGFR && eGFR < 30) {
      if (name.includes('дЇМзФ≤еПМиГН') || name.includes('metformin')) alerts.push(`вЪ†пЄП дЇМзФ≤еПМиГН: eGFR ${eGFR} mL/min < 30пЉМз¶БзФ®`);
      if (name.includes('еЬ∞йЂШиЊЫ') || name.includes('digoxin')) alerts.push(`вЪ†пЄП еЬ∞йЂШиЊЫ: eGFR ${eGFR}пЉМйЬАеЗПйЗПеєґзЫСжµЛи°АиНѓжµУеЇ¶`);
    }
    if (cr > 133 || (eGFR && eGFR < 60)) {
      if (name.includes('дЄЗеП§') || name.includes('vanco')) alerts.push(`вЪ†пЄП дЄЗеП§йЬЙзі†: Cr${cr}пЉМеїЇиЃЃзЫСжµЛи∞ЈжµУеЇ¶пЉМи∞ГжХіеЙВйЗП`);
      if (name.includes('еЇЖе§І') || name.includes('gentam') || name.includes('йШњз±≥еН°') || name.includes('amikacin') || name.includes('е¶•еЄГ') || name.includes('tobra')) alerts.push(`вЪ†пЄП ж∞®еЯЇз≥ЦиЛЈз±ї: иВЊеКЯиГљдЄЛйЩНпЉМйЬАи∞ГжХіеЙВйЗП`);
      if ((name.includes('иВЭзі†') || name.includes('heparin')) && !name.includes('дљОеИЖе≠Р')) alerts.push(`вДєпЄП жЩЃйАЪиВЭзі†: Cr${cr}пЉМе¶ВHITй£ОйЩ©иАГиЩСжНҐзФ®`);
    }
    if (cr > 100) {
      if (name.includes('nsaid') || name.includes('еЄГжіЫиКђ') || name.includes('еПМж∞ѓиКђ') || name.includes('зЊОжіЫжШФеЇЈ') || name.includes('е°ЮжЭ•жШФеЄГ')) alerts.push(`вЪ†пЄП NSAIDs: Cr${cr}пЉМйБњеЕНдљњзФ®жИЦеѓЖеИЗзЫСжµЛ`);
    }
  }
  if (!alerts.length) return '';
  return `<div class="alerts-panel" style="border-color:var(--warning);background:var(--warning-bg);margin-bottom:10px">
    <div class="alerts-panel-title" style="color:var(--warning)">рЯТК иНѓзЙ©еЃЙеЕ®жПРйЖТ</div>
    ${alerts.map(a => `<div class="alerts-panel-item">${a}</div>`).join('')}
  </div>`;
}

function getAbnormals(rec) {
  if (!rec?.labs) return [];
  const out = [];
  const checks = [
    ['cr','Cr',44,133,'ќЉmol/L'], ['k','KвБЇ',3.5,5.0,'mmol/L'], ['na','NaвБЇ',135,145,'mmol/L'],
    ['plt','PLT',125,350,'√Ч10вБє/L'], ['wbc','WBC',4,10,'√Ч10вБє/L'], ['hgb','Hb',[120,110],[160,150],'g/L'],
    ['lac','дє≥йЕЄ',null,2.0,'mmol/L'], ['crp','CRP',null,10,'mg/L'], ['pct','PCT',null,0.05,'ng/mL'],
    ['abg_ph','pH',7.35,7.45,''], ['abg_lac','ABGдє≥йЕЄ',null,2.0,'mmol/L'],
    ['abg_k','ABG KвБЇ',3.5,5.0,'mmol/L'], ['abg_na','ABG NaвБЇ',135,145,'mmol/L']
  ];
  for (const [key, label, lo, hi] of checks) {
    const val = parseFloat(rec.labs[key]);
    if (isNaN(val)) continue;
    const isCrit = (lo !== null && val < (Array.isArray(lo) ? lo[0] : lo)) || (hi !== null && val > (Array.isArray(hi) ? hi[0] : hi));
    const isWarn = !isCrit && ((lo !== null && val < (Array.isArray(lo) ? lo[1] : (typeof lo === 'number' ? lo : null))) || (hi !== null && val > (Array.isArray(hi) ? hi[1] : (typeof hi === 'number' ? hi : null))));
    if (isCrit) out.push({ label: `${label} ${val}`, level: 'abnormal' });
    else if (isWarn) out.push({ label: `${label} ${val}`, level: 'warning' });
  }
  return out.slice(0, 5);
}

function getSparkItems(p) {
  const items = [];
  const sparkKeys = [
    ['cr','Cr','var(--danger)'], ['lac','дє≥йЕЄ','var(--warning)'], ['wbc','WBC','var(--primary)'],
    ['k','KвБЇ','var(--warning)'], ['na','NaвБЇ','var(--primary)']
  ];
  for (const [key, label] of sparkKeys) {
    const vals = getSparkData(p, key);
    if (vals.length >= 2) {
      items.push(`${label} ${SparklineCanvas(vals)}`);
    }
  }
  return items.slice(0, 3);
}

function getSparkData(p, labKey) {
  if (!p?.records) return [];
  const dates = Object.keys(p.records).sort();
  const vals = [];
  for (const d of dates) {
    const v = parseFloat(p.records[d]?.labs?.[labKey]);
    if (!isNaN(v)) vals.push(v);
  }
  return vals;
}

function getAllAnomalies() {
  const anomalies = [];
  for (const p of State.patients) {
    const rec = State.getPatientRecord(p, State.currentDate);
    const abnorms = getAbnormals(rec);
    if (abnorms.length) {
      anomalies.push({ name: p.name, items: abnorms.map(a => a.label) });
    }
  }
  return anomalies;
}

function getSeverity(p) {
  const rec = State.getPatientRecord(p, State.currentDate);
  if (!rec) return 'stable';
  const v = rec.vitals || {};
  const l = rec.labs || {};
  // Critical
  if (v.spo2 && v.spo2 < 90) return 'critical';
  if (v.sbp && v.sbp < 90) return 'critical';
  if (l.plt && l.plt < 50) return 'critical';
  if (l.k && (l.k > 6.0 || l.k < 2.5)) return 'critical';
  if (l.na && (l.na < 120 || l.na > 160)) return 'critical';
  if (l.abg_ph && (l.abg_ph < 7.2 || l.abg_ph > 7.6)) return 'critical';
  if (l.lac && l.lac > 4) return 'critical';
  if (l.abg_lac && l.abg_lac > 4) return 'critical';
  // Warning
  if (v.hr && (v.hr > 120 || v.hr < 50)) return 'warning';
  if (v.temp && (v.temp > 39 || v.temp < 36)) return 'warning';
  if (v.sbp && v.sbp < 100) return 'warning';
  if (v.spo2 && v.spo2 < 95) return 'warning';
  if (l.cr && l.cr > 200) return 'warning';
  if (l.k && (l.k > 5.5 || l.k < 3.0)) return 'warning';
  if (l.na && (l.na < 130 || l.na > 150)) return 'warning';
  if (l.plt && l.plt < 100) return 'warning';
  if (l.wbc && (l.wbc > 15 || l.wbc < 3)) return 'warning';
  if (l.lac && l.lac > 2) return 'warning';
  if (l.abg_lac && l.abg_lac > 2) return 'warning';
  return 'stable';
}

function switchPatientSubTab(pid, tab) {
  _currentSubTab = tab;
  document.querySelectorAll('#patientSubTabs .sub-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.sub-tab-panel').forEach(p => p.classList.toggle('hidden', !p.id.endsWith(tab)));
  // AI sub-tab: restructure layout so input sticks to bottom
  const slidePg = $('slidePage');
  const slideBd = $('slideBody');
  if (slidePg && slideBd) {
    if (tab === 'ai') {
      // slidePage: no scroll, flex column
      slidePg.style.overflow = 'hidden';
      slidePg.style.display = 'flex';
      slidePg.style.flexDirection = 'column';
      // slideBody: fill remaining space, flex column, no scroll
      slideBd.style.flex = '1';
      slideBd.style.overflow = 'hidden';
      slideBd.style.display = 'flex';
      slideBd.style.flexDirection = 'column';
      slideBd.style.minHeight = '0';
      slideBd.style.paddingBottom = '0';
      // Hide non-AI panels
      slideBd.querySelectorAll('.sub-tab-panel:not(#subtab-ai)').forEach(el => el.style.display = 'none');
      // Sub-tabs nav: fixed height
      const nav = slideBd.querySelector('.sub-tabs');
      if (nav) nav.style.flexShrink = '0';
      // AI panel: fill remaining, flex column
      const aiPanel = document.getElementById('subtab-ai');
      if (aiPanel) { aiPanel.style.flex = '1'; aiPanel.style.minHeight = '0'; }
    } else {
      // Restore defaults
      slidePg.style.overflow = '';
      slidePg.style.display = '';
      slidePg.style.flexDirection = '';
      slideBd.style.flex = '';
      slideBd.style.overflow = '';
      slideBd.style.display = '';
      slideBd.style.flexDirection = '';
      slideBd.style.minHeight = '';
      slideBd.style.paddingBottom = '';
      slideBd.querySelectorAll('.sub-tab-panel').forEach(el => el.style.display = '');

  if (tab === 'ai') {

    if (histEl) histEl.scrollTop = histEl.scrollHeight;
  }
}

/* ===== Auto-save ===== */
function bindAutoSave() {
  document.querySelectorAll('.pt-input').forEach(el => {
    el.removeEventListener('blur', _handleAutoSave);
    el.addEventListener('blur', _handleAutoSave);
    el.removeEventListener('change', _handleAutoSave);
    el.addEventListener('change', _handleAutoSave);
  });
  document.querySelectorAll('.pt-check').forEach(el => {
    el.removeEventListener('change', _handleCheckSave);
    el.addEventListener('change', _handleCheckSave);
  });
  // MAP live update
  document.querySelectorAll('[data-field="vitals.sbp"], [data-field="vitals.dbp"]').forEach(el => {
    el.addEventListener('input', updateMAPDisplay);
  });
  // IO balance live update
  document.querySelectorAll('.pt-io').forEach(el => {
    el.addEventListener('input', updateIODisplay);
  });
}

function _handleAutoSave(e) {
  const el = e.target;
  const pid = el.dataset.pid;
  const field = el.dataset.field;
  if (!pid || !field) return;
  const p = State.patients.find(x => x.id === pid);
  if (!p) return;
  if (!p.records) p.records = {};
  if (!p.records[State.currentDate]) p.records[State.currentDate] = {};
  const rec = p.records[State.currentDate];
  const val = el.value;
  // Support nested fields like "vitals.resp.fio2" or "io.intake"
  const parts = field.split('.');
  let obj = rec;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = val;
  State.savePatients();
  showSaveIndicator();
}

function _handleCheckSave(e) {
  const el = e.target;
  const pid = el.dataset.pid;
  const field = el.dataset.field;
  if (!pid || !field) return;
  const p = State.patients.find(x => x.id === pid);
  if (!p) return;
  if (!p.records) p.records = {};
  if (!p.records[State.currentDate]) p.records[State.currentDate] = {};
  const rec = p.records[State.currentDate];
  const parts = field.split('.');
  let obj = rec;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = el.checked;
  State.savePatients();
  showSaveIndicator();
}

function updateMAPDisplay() {
  const sbp = parseFloat(document.querySelector('[data-field="vitals.sbp"]')?.value);
  const dbp = parseFloat(document.querySelector('[data-field="vitals.dbp"]')?.value);
  const el = document.getElementById('map-display');
  if (!el) return;
  if (isNaN(sbp) || isNaN(dbp)) { el.innerHTML = ''; return; }
  const map = Math.round((sbp + 2 * dbp) / 3);
  const cls = map > 105 ? 'danger' : map < 65 ? 'danger' : map < 70 ? 'warn' : '';
  el.innerHTML = `<div class="crit-inline ${cls}" style="font-weight:600">MAP: ${map} mmHg</div>`;
}

function updateIODisplay() {
  const intake = parseFloat(document.querySelector('[data-field="io.intake"]')?.value) || 0;
  const totalOut = parseFloat(document.querySelector('[data-field="io.totalOut"]')?.value) || 0;
  const urine = parseFloat(document.querySelector('[data-field="io.urine"]')?.value) || 0;
  const drain = parseFloat(document.querySelector('[data-field="io.drain"]')?.value) || 0;
  const stool = parseFloat(document.querySelector('[data-field="io.stool"]')?.value) || 0;
  const otherOut = totalOut - urine - drain - stool;
  const balance = intake - totalOut;
  // Update еЕґдїЦеЗЇйЗП readonly field
  const otherEl = document.getElementById('io-other-out');
  if (otherEl) otherEl.value = otherOut > 0 ? otherOut : '';
  // Update balance bar
  const el = document.getElementById('io-balance-display');
  if (!el) return;
  const hasData = intake || totalOut;
  const bgColor = hasData ? (balance > 500 ? 'var(--danger-bg)' : balance < -500 ? 'var(--warning-bg)' : 'var(--success-bg)') : 'var(--bg)';
  const fgColor = hasData ? (balance > 500 ? 'var(--danger)' : balance < -500 ? 'var(--warning)' : 'var(--success)') : 'var(--text2)';
  el.style.background = bgColor;
  el.style.color = fgColor;
  el.textContent = `еє≥и°° ${balance > 0 ? '+' : ''}${balance} mL`;
}

/* ===== Report / Handoff ===== */
function genHandoff(p, rec) {
  const lines = [];
  const v = rec?.vitals || {};
  const l = rec?.labs || {};
  const admitDays = getAdmitDays(p);
  const surgDays = getSurgDays(p);

  lines.push(`гАР${p.name}гАС${p.bed || ''} ${p.sex || ''}${p.age || ''}е≤Б`);
  if (p.diagnosis) lines.push(`иѓКжЦ≠: ${p.diagnosis}`);
  if (admitDays !== '?') {
    let dayInfo = `еЕ•йЩҐD${admitDays}`;
    if (surgDays !== '') dayInfo += ` жЬѓеРОD${surgDays}`;
    lines.push(dayInfo);
  }

  // Vitals
  const vitalParts = [];
  if (v.temp) vitalParts.push(`T${v.temp}`);
  if (v.hr) vitalParts.push(`HR${v.hr}`);
  if (v.sbp && v.dbp) vitalParts.push(`BP${v.sbp}/${v.dbp}`);
  if (v.rr) vitalParts.push(`RR${v.rr}`);
  if (v.spo2) vitalParts.push(`SpOвВВ${v.spo2}%`);
  if (v.conscious) vitalParts.push(v.conscious);
  if (vitalParts.length) lines.push(`зФЯеСљдљУеЊБ: ${vitalParts.join(' ')}`);

  // Resp support
  if (v.resp?.type && v.resp.type !== 'none' && v.resp.type !== '') {
    let resp = `еСЉеРЄжФѓжМБ: ${v.resp.type}`;
    if (v.resp.mode) resp += ` ${v.resp.mode}`;
    if (v.resp.fio2) resp += ` FiOвВВ${v.resp.fio2}%`;
    if (v.resp.peep) resp += ` PEEP${v.resp.peep}`;
    lines.push(resp);
  }

  // IO
  const io = rec?.io || {};
  const intake = parseFloat(io.intake) || 0;
  const totalOut = parseFloat(io.totalOut) || 0;
  const urine = parseFloat(io.urine) || 0;
  const drain = parseFloat(io.drain) || 0;
  const stool = parseFloat(io.stool) || 0;
  const otherOut = totalOut - urine - drain - stool;
  if (intake || totalOut) {
    const parts = [];
    if (urine) parts.push(`е∞њ${urine}`);
    if (drain) parts.push(`еЉХжµБ${drain}`);
    if (stool) parts.push(`дЊњ${stool}`);
    if (otherOut > 0) parts.push(`еЕґдїЦ${otherOut}`);
    lines.push(`еЗЇеЕ•йЗП: еЕ•${intake} еЗЇ${totalOut}(${parts.join(' ')}) еє≥и°°${intake-totalOut > 0 ? '+' : ''}${intake-totalOut}`);
  }

  // Key labs
  const labParts = [];
  if (l.wbc) labParts.push(`WBC ${l.wbc}`);
  if (l.hgb) labParts.push(`Hb ${l.hgb}`);
  if (l.plt) labParts.push(`PLT ${l.plt}`);

/* ===== Calculators for Report ===== */
function calcCGForPatient(p, rec) {
  if (!p.age || !p.weight) return '';
  const cr = parseFloat(rec?.labs?.cr);
  if (isNaN(cr)) return '';
  const crMg = cr / 88.4;
  let crcl = ((140 - p.age) * p.weight) / (72 * crMg);
  if (p.sex === 'е•≥') crcl *= 0.85;
  return `CrCl вЙИ ${Math.round(crcl * 10) / 10} mL/min`;
}

function calcEgfrForPatient(p, rec) {
  const cr = parseFloat(rec?.labs?.cr);
  if (!cr || !p.age) return '';
  const scr = cr / 88.4;
  const k = p.sex === 'е•≥' ? 0.7 : 0.9;
  const alpha = p.sex === 'е•≥' ? -0.241 : -0.302;
  const sexFac = p.sex === 'е•≥' ? 1.012 : 1;
  let gfr;
  if (scr <= k) gfr = 142 * Math.pow(scr/k, alpha) * Math.pow(0.9938, p.age) * sexFac;
  else gfr = 142 * Math.pow(scr/k, -1.200) * Math.pow(0.9938, p.age) * sexFac;
  const stage = gfr >= 90 ? 'G1' : gfr >= 60 ? 'G2' : gfr >= 45 ? 'G3a' : gfr >= 30 ? 'G3b' : gfr >= 15 ? 'G4' : 'G5';
  return `eGFR = ${Math.round(gfr)} mL/min/1.73m¬≤ (${stage})`;
}

function calcABGForPatient(rec) {
  const l = rec?.labs || {};
  const ph = parseFloat(l.abg_ph), pco2 = parseFloat(l.abg_pco2), hco3 = parseFloat(l.abg_hco3);
  if (!ph || !pco2 || !hco3) return '';
  let result = '';
  if (ph < 7.35) result = 'йЕЄи°АзЧЗ';
  else if (ph > 7.45) result = 'зҐ±и°АзЧЗ';
  else result = 'pHж≠£еЄЄ';
  // AG
  const na = parseFloat(l.abg_na), cl = parseFloat(l.abg_cl);
  if (na && cl) {
    const ag = Math.round((na - cl - hco3) * 10) / 10;
    result += ` ¬Ј AG=${ag}`;
  }
  // Lactate
  const lac = parseFloat(l.abg_lac);
  if (lac) result += ` ¬Ј дє≥йЕЄ${lac}`;
  return result;
}

/* ===== Toolbox Rendering ===== */
function renderToolbox() {
  const page = $('page-toolbox');
  if (!page) return;

  const savedQuickIds = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  const quickTools = CalcRegistry.filter(c => c.quick && savedQuickIds.includes(c.id));
  const categories = [...new Set(CalcRegistry.filter(c => !c.quick).map(c => c.cat))];
  const favs = State.favorites || [];

  let html = `
    <div class="search-bar" style="margin-bottom:10px">
      <input type="text" class="form-input" id="toolboxSearch" placeholder="рЯФН жРЬзіҐиЃ°зЃЧеЩ®..." oninput="filterToolbox(this.value)">
    </div>`;

  // Favorites
  if (favs.length) {
    html += `<div class="flex-between mb-8"><span class="text-sm text-secondary">в≠Р жФґиЧП</span></div>
    <div class="quick-tools" id="toolbox-favs">${favs.map(id => {
      const c = CalcRegistry.find(x => x.id === id);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('')}</div>`;
  }

  // Quick tools
  html += `<div class="flex-between mb-8 mt-12"><span class="text-sm text-secondary">вЪ° жА•зЃЧеЈ•еЕЈ</span></div>
  <div class="quick-tools" id="toolbox-quick">${quickTools.map(c =>
    `<button class="qt-btn qt-trigger" data-qt-id="${c.id}" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>`
  ).join('')}</div>
  <div id="quick-calc-container" style="margin-top:8px"></div>`;

  // Category accordions
  html += '<div class="mt-12" id="toolbox-cats">';
  for (const cat of categories) {

function renderCalcInputs(calc) {
  return `<div style="display:flex;flex-wrap:wrap;gap:6px">${calc.inputs.map(inp => {

      return `<label style="font-size:.82rem;display:flex;align-items:center;gap:4px;background:var(--bg);padding:4px 8px;border-radius:6px"><input type="checkbox" class="calc-input" data-calc="${calc.id}" data-key="${inp.k}"> ${inp.l}</label>`;

function toggleAccordion(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}

function toggleFavCalc(id, btn) {
  const idx = State.favorites.indexOf(id);
  if (idx >= 0) { State.favorites.splice(idx, 1); btn.textContent = 'вШЖ'; }
  else { State.favorites.push(id); btn.textContent = 'вШЕ'; }
  State.saveFavorites();
  // Update favs section
  const favsEl = document.getElementById('toolbox-favs');
  if (favsEl) {
    const parent = favsEl.parentElement;
    const newFavs = State.favorites.map(fid => {
      const c = CalcRegistry.find(x => x.id === fid);
      return c ? `<button class="qt-btn" onclick="openCalcCard('${c.id}')">${c.icon} ${c.name}</button>` : '';
    }).join('');
    if (State.favorites.length) {
      if (favsEl) favsEl.innerHTML = newFavs;
    }
  }
}

function runCalc(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  const values = {};
  document.querySelectorAll(`.calc-input[data-calc="${id}"]`).forEach(el => {
    if (el.type === 'checkbox') values[el.dataset.key] = el.checked;
    else if (el.type === 'number') values[el.dataset.key] = el.value ? parseFloat(el.value) : null;
    else values[el.dataset.key] = el.value;
  });
  const result = calc.compute(values);
  const resBox = document.getElementById('res-' + id);
  const mainEl = document.getElementById('res-main-' + id);
  const detailEl = document.getElementById('res-detail-' + id);
  if (!resBox || !mainEl || !detailEl) return;
  if (!result) { resBox.style.display = 'none'; return; }
  mainEl.innerHTML = result.main;
  detailEl.innerHTML = result.detail || '';
  resBox.style.display = '';
  resBox.className = 'result-box' + (result.warn ? ' result-danger' : ' result-ok');
  haptic();
}

function openCalcCard(id) {
  const calc = CalcRegistry.find(c => c.id === id);
  if (!calc) return;
  // Check accordion card first
  const card = document.querySelector(`.accordion-item [data-calc-id="${id}"]`);
  if (card) {
    const accordion = card.closest('.accordion-item');
    if (accordion && !accordion.classList.contains('open')) accordion.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
    return;
  }
  // Quick tool вАФ toggle card in quick-calc-container
  const container = document.getElementById('quick-calc-container');
  if (!container) return;
  const existing = container.querySelector(`[data-calc-id="${id}"]`);
  if (existing) {
    existing.remove();
    document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.remove('active'));
    return;
  }
  const favs = State.favorites || [];
  const cardHtml = `<div class="calc-card" data-calc-id="${id}" style="border:2px solid var(--primary);border-radius:12px;padding:12px;background:var(--card);margin-top:8px">
    <div class="flex-between mb-8">
      <span style="font-weight:600;font-size:.95rem">${calc.icon} ${calc.name}</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="toggleFavCalc('${calc.id}',this)">${favs.includes(calc.id) ? 'вШЕ' : 'вШЖ'}</button>
        <button class="qt-btn" style="padding:4px 8px;font-size:.7rem" onclick="openCalcCard('${calc.id}')">вЬХ</button>
      </div>
    </div>
    ${renderCalcInputs(calc)}
    <div class="result-box" id="res-${calc.id}" style="display:none">
      <div class="res-value" id="res-main-${calc.id}"></div>
      <div id="res-detail-${calc.id}" style="font-size:.82rem;margin-top:4px"></div>
    </div>
  </div>`;
  container.insertAdjacentHTML('beforeend', cardHtml);
  document.querySelectorAll(`.qt-trigger[data-qt-id="${id}"]`).forEach(b => b.classList.add('active'));
  setTimeout(() => container.querySelector(`[data-calc-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function filterToolbox(q) {
  const ql = q.toLowerCase().trim();
  // Filter accordion calc cards
  document.querySelectorAll('.calc-card').forEach(card => {
    const kw = (card.dataset.keywords || '').toLowerCase();
    const name = card.querySelector('.flex-between span')?.textContent?.toLowerCase() || '';
    card.style.display = (!ql || kw.includes(ql) || name.includes(ql)) ? '' : 'none';
  });
  // Filter quick tool buttons
  document.querySelectorAll('#toolbox-quick .qt-btn, #toolbox-favs .qt-btn').forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!ql || text.includes(ql)) ? '' : 'none';
  });
  // Auto-open matching accordions
  if (ql) {
    document.querySelectorAll('.accordion-item').forEach(item => {
      const hasVisible = item.querySelector('.calc-card:not([style*="display: none"])');
      if (hasVisible) item.classList.add('open');
    });
  }
}

function resetAllCalcs() {
  document.querySelectorAll('.calc-input').forEach(el => {
    if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  document.querySelectorAll('[id^="res-"]').forEach(el => el.style.display = 'none');
  showToast('еЈ≤йЗНзљЃ');
}

function sendAIMessage() {

function handleAIImageUpload(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Resize to max 800px width to reduce token usage
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = img.width > maxW ? maxW / img.width : 1;
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.8);
      const mimeType = 'image/jpeg';
      _pendingAIImage = { base64, mimeType };
      // Show preview
      const preview = $('aiImagePreview');
      if (preview) {
        preview.style.display = 'block';
        preview.innerHTML = `<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg);border-radius:8px">
          <img src="${base64}" style="max-height:60px;border-radius:4px">
          <button class="btn btn-sm btn-secondary" onclick="clearAIImage()" style="padding:2px 6px;font-size:.75rem">вЬХ</button>
        </div>`;
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
}

function clearAIImage() {
  _pendingAIImage = null;
  const preview = $('aiImagePreview');

function runQuickCmd(id) {
  const cmd = State.quickCmds.find(c => c.id === id);

  if (cmd.id === 'qc7' || cmd.label.includes('еЕ®йГ®')) {
    Router.switch('ai');
    setTimeout(() => sendAllPatientReports(), 200);
    return;
  }
  let prompt = cmd.prompt;
  // Attach current patient context if available
  if (State.currentPatientId) {
    const p = State.getCurrentPatient();
    const rec = State.getCurrentRecord();
    if (p && rec) {
      const ctx = buildPatientContext(p, rec);
      prompt = `${ctx}\n\n${prompt}`;
    }
  }
  appendAI('user', `[${cmd.label}] ${cmd.prompt}`);
  _callAI([{ role: 'system', content: getSystemPrompt() }, ...State.aiHistory.map(m => ({ role: m.role, content: m.content }))]);

function sendAllPatientReports() {
  let context = 'дї•дЄЛжШѓдїКжЧ•жЙАжЬЙжВ£иАЕзЪДжГЕеЖµжСШи¶БпЉЪ\n\n';
  for (const p of State.patients) {
    const rec = State.getPatientRecord(p, State.currentDate);
    if (rec) context += buildPatientContext(p, rec) + '\n\n';
  }
  context += 'иѓЈеИЖжЮРжЙАжЬЙжВ£иАЕзЪДзЧЕжГЕпЉМжМЗеЗЇйЬАи¶БеЕ≥ж≥®зЪДйЧЃйҐШеТМеїЇиЃЃгАВ';
  appendAI('user', 'еИЖжЮРеЕ®йГ®жВ£иАЕ');
  _callAI([{ role: 'system', content: getSystemPrompt() }, { role: 'user', content: context }]);
}

function buildPatientContext(p, rec) {
  const lines = [`жВ£иАЕ: ${p.name} ${p.bed||''} ${p.sex||''}${p.age||''}е≤Б`];
  if (p.diagnosis) lines.push(`иѓКжЦ≠: ${p.diagnosis}`);
  const v = rec.vitals || {};
  const vitalParts = [];
  if (v.temp) vitalParts.push(`T${v.temp}`);
  if (v.hr) vitalParts.push(`HR${v.hr}`);
  if (v.sbp && v.dbp) vitalParts.push(`BP${v.sbp}/${v.dbp}`);
  if (v.spo2) vitalParts.push(`SpOвВВ${v.spo2}`);
  if (v.conscious) vitalParts.push(v.conscious);
  if (vitalParts.length) lines.push(`дљУеЊБ: ${vitalParts.join(' ')}`);
  const l = rec.labs || {};
  const labParts = [];
  for (const [k, label] of [['abg_ph','pH'],['abg_pco2','PaCOвВВ'],['abg_hco3','HCOвВГвБї'],['abg_lac','дє≥йЕЄ'],['wbc','WBC'],['hgb','Hb'],['plt','PLT'],['cr','Cr'],['bun','BUN'],['k','KвБЇ'],['na','NaвБЇ'],['pct','PCT'],['crp','CRP']]) {
    if (l[k]) labParts.push(`${label}=${l[k]}`);
  }
  if (labParts.length) lines.push(`еМЦй™М: ${labParts.join(' ')}`);
  if (rec.medications?.length) lines.push(`зФ®иНѓ: ${rec.medications.map(m => `${m.name} ${m.dose} ${m.freq}`).join('; ')}`);
  if (rec.exam) lines.push(`жЯ•дљУ: ${rec.exam.slice(0, 200)}`);
  if (rec.txChanges) lines.push(`ж≤їзЦЧеПШжЫі: ${rec.txChanges}`);
  if (rec.notes) lines.push(`е§Зж≥®: ${rec.notes}`);
  return lines.join('\n');
}

function renderAIChatMessages() {

function _callAI(messages) {
  const url = DB.get('mc_ai_url', '');
  const key = DB.get('mc_ai_key', '');
  const model = DB.get('mc_ai_model', 'deepseek-chat');
  if (!url || !key) { showToast('иѓЈеЕИйЕНзљЃ AI жЬНеК°'); return; }

  if (_aiAbortController) try { _aiAbortController.abort(); } catch {}
  _aiAbortController = new AbortController();
  _aiStartTime = Date.now();
  _aiFirstContent = true;

  if (!messages) {
    messages = [{ role: 'system', content: getSystemPrompt() }];
    messages.push(...State.aiHistory.map(m => ({ role: m.role, content: m.content })));
  }

  // Support image in last user message
  if (_pendingAIImage) {
    const lastUserIdx = messages.map((m,i) => m.role==='user'?i:-1).filter(i=>i>=0).pop();
    if (lastUserIdx != null) {
      const text = messages[lastUserIdx].content || '';
      messages[lastUserIdx].content = [
        { type: 'text', text },
        { type: 'image_url', image_url: { url: _pendingAIImage.base64 } }
      ];
    }
    _pendingAIImage = null;
    const preview = $('aiImagePreview');
    if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
  }

  // Add placeholder for assistant response
  State.aiHistory.push({ role: 'assistant', content: '' });
  renderAIChatMessages();

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model, messages, stream: true }),
    signal: _aiAbortController.signal
  }).then(response => {
    if (!response.ok) { response.text().then(t => { _aiError(`HTTP ${response.status}: ${t.slice(0, 200)}`); }); return; }
    const ct = response.headers.get('content-type') || '';
    if (ct.includes('event-stream') || ct.includes('stream')) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const readChunk = () => {
        reader.read().then(({ done, value }) => {
          if (done) { _aiDone(); return; }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === 'data: [DONE]') continue;
            if (!trimmed.startsWith('data: ')) continue;
            try {
              const json = JSON.parse(trimmed.slice(6));
              const content = json.choices?.[0]?.delta?.content;
              if (content) _aiChunk(content);
            } catch {}
          }
          readChunk();
        }).catch(e => { if (e.name !== 'AbortError') _aiError(e.message); });
      };
      readChunk();
    } else {
      response.json().then(json => {
        const content = json.choices?.[0]?.message?.content;
        if (content) { _aiChunk(content); _aiDone(); }
        else _aiError('жЧ†ж≥ХиІ£жЮР AI еУНеЇФ');
      }).catch(e => _aiError(e.message));
    }
  }).catch(e => { if (e.name !== 'AbortError') _aiError(e.message); });
}

function _aiChunk(content) {
  if (_aiFirstContent) {
    _aiFirstContent = false;
    const elapsed = ((Date.now() - _aiStartTime) / 1000).toFixed(1);
    const last = State.aiHistory[State.aiHistory.length - 1];
    if (last?.role === 'assistant') last.thinkingTime = elapsed;
  }
  const last = State.aiHistory[State.aiHistory.length - 1];
  if (last?.role === 'assistant') last.content += content;
  renderAIChatMessages();
}

function _aiDone() {
  DB.set('mc_ai_history', State.aiHistory);
  _aiAbortController = null;
}

function _aiError(msg) {
  const last = State.aiHistory[State.aiHistory.length - 1];
  if (last?.role === 'assistant') last.content = `вЪ†пЄП ${msg}`;
  renderAIChatMessages();
  DB.set('mc_ai_history', State.aiHistory);

if (!State.patientAIHistory) State.patientAIHistory = {};

function renderPatientAIHistory(pid) {
  const hist = State.patientAIHistory[pid] || [];
  if (!hist.length) return '<div class="text-sm text-secondary text-center" style="padding:8px">зВєеЗїењЂжНЈжМЗдї§жИЦиЊУеЕ•йЧЃйҐШеЉАеІЛеИЖжЮР</div>';
  return hist.map(m => {
    let content = (m.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    content = content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
    return `<div class="ai-msg ${m.role==='user'?'ai-msg-user':'ai-msg-assistant'}" style="max-width:90%;font-size:.82rem;margin-bottom:6px">${content}</div>`;
  }).join('');
}

function sendPatientAI(pid, presetPrompt) {
  const url = DB.get('mc_ai_url', '');
  const key = DB.get('mc_ai_key', '');
  const model = DB.get('mc_ai_model', 'deepseek-chat');
  if (!url || !key) { showToast('иѓЈеЕИйЕНзљЃ AI жЬНеК°'); return; }

  const inputEl = document.getElementById(`patient-ai-input-${pid}`);
  const prompt = presetPrompt || inputEl?.value?.trim();
  if (!prompt) return;
  if (inputEl && !presetPrompt) inputEl.value = '';

  const p = State.patients.find(x => x.id === pid);
  const rec = p ? State.getPatientRecord(p, State.currentDate) : null;
  let context = '';
  if (p && rec) context = buildPatientContext(p, rec);

  if (!State.patientAIHistory[pid]) State.patientAIHistory[pid] = [];
  State.patientAIHistory[pid].push({ role: 'user', content: prompt });

  const messages = [
    { role: 'system', content: getSystemPrompt() },
    { role: 'user', content: `жВ£иАЕдњ°жБѓпЉЪ\n${context}\n\nйЧЃйҐШпЉЪ${prompt}` }
  ];

  State.patientAIHistory[pid].push({ role: 'assistant', content: '' });
  const histEl = document.getElementById(`patient-ai-history-${pid}`);
  if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model, messages, stream: true })
  }).then(response => {
    if (!response.ok) { response.text().then(t => { _patientAIError(pid, `HTTP ${response.status}`); }); return; }
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    const readChunk = () => {
      reader.read().then(({ done, value }) => {
        if (done) { _patientAIDone(pid); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') { _patientAIDone(pid); return; }
          try {
            const delta = JSON.parse(data).choices?.[0]?.delta;
            if (delta?.content) {
              const hist = State.patientAIHistory[pid];
              if (hist?.length) { hist[hist.length-1].content += delta.content; }
              if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);
              histEl.scrollTop = histEl.scrollHeight;
            }
          } catch {}
        }
        readChunk();
      });
    };
    readChunk();
  }).catch(e => _patientAIError(pid, e.message));
}

function _patientAIDone(pid) {
  DB.set('mc_patient_ai_' + pid, State.patientAIHistory[pid]);
}

function _patientAIError(pid, msg) {
  const hist = State.patientAIHistory[pid];
  if (hist?.length) hist[hist.length-1].content = `вЪ†пЄП ${msg}`;
  const histEl = document.getElementById(`patient-ai-history-${pid}`);
  if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);
}

  State.patientAIHistory[pid] = [];
  DB.set('mc_patient_ai_' + pid, []);
  const histEl = document.getElementById(`patient-ai-history-${pid}`);
  if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);
}

function testStorage() {
  const testKey = '_test_' + Date.now();
  const testVal = { ts: Date.now(), patients: State.patients.length };
  const results = [];

  // Test 1: localStorage
  try {
    localStorage.setItem(testKey, JSON.stringify(testVal));
    const readback = JSON.parse(localStorage.getItem(testKey));
    localStorage.removeItem(testKey);
    results.push(readback?.ts === testVal.ts ? 'вЬЕ localStorage: ж≠£еЄЄ' : 'вЭМ localStorage: жХ∞жНЃдЄНдЄАиЗі');
  } catch(e) {
    results.push('вЭМ localStorage: ' + e.message);
  }

  // Test 2: IndexedDB
  if (DB._db) {
    try {
      const tx = DB._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      store.put(testVal, testKey);
      tx.oncomplete = () => {
        const tx2 = DB._db.transaction('kv', 'readonly');
        const req = tx2.objectStore('kv').get(testKey);
        req.onsuccess = () => {
          const readback = req.result;
          // Clean up
          const tx3 = DB._db.transaction('kv', 'readwrite');
          tx3.objectStore('kv').delete(testKey);

          results.push(readback?.ts === testVal.ts ? 'вЬЕ IndexedDB: ж≠£еЄЄ' : 'вЭМ IndexedDB: жХ∞жНЃдЄНдЄАиЗі');
          showTestResult(results);
        };
        req.onerror = () => { results.push('вЭМ IndexedDB: иѓїеПЦе§±иі•'); showTestResult(results); };
      };
      tx.onerror = () => { results.push('вЭМ IndexedDB: еЖЩеЕ•е§±иі•'); showTestResult(results); };
      return; // Async IDB test will call showTestResult
    } catch(e) {
      results.push('вЭМ IndexedDB: ' + e.message);
    }
  } else {
    results.push('вЪ†пЄП IndexedDB: жЬ™еИЭеІЛеМЦ');
  }

  showTestResult(results);

  function showTestResult(r) {
    const mcKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('mc_')) mcKeys.push(k);
    }
    const idbReady = DB._idbReady ? 'еЈ≤е∞±зї™' : 'жЬ™е∞±зї™';
    alert(`${r.join('\n')}\n\nзЉУе≠Шй°є: ${Object.keys(DB._cache).length}\nlocalStorageй°є: ${mcKeys.length}\nIDBзКґжАБ: ${idbReady}\nжВ£иАЕжХ∞: ${State.patients.length}\n\nеЕ≥йЧ≠й°µйЭҐеЖНжЙУеЉАпЉМжХ∞жНЃеЇФдњЭзХЩгАВ\nе¶ВдїНдЄҐе§±пЉМиѓЈжИ™еЫЊеПСзїЩжИСгАВ`);
  }
}

function showChangelog() {

    CHANGELOG.map(c => `

function openSystemPromptEditor() {
  const current = DB.get('mc_system_prompt', DEFAULT_CLINICAL_PROMPT);
  openSheet(`
    <div class="card-title" style="margin-bottom:8px">з≥їзїЯжПРз§ЇиѓН</div>
    <p style="font-size:.82rem;color:var(--text2);margin-bottom:8px">иЗ™еЃЪдєЙAIеК©жЙЛзЪДиІТиЙ≤гАБиЊУеЗЇиІДиМГеТМи°МдЄЇзЇ¶жЭЯгАВдњЃжФєеРОжЙАжЬЙAIеѓєиѓЭе∞ЖдљњзФ®жЦ∞зЪДз≥їзїЯжПРз§ЇиѓНгАВ</p>
    <div class="form-group">
      <textarea id="sys-prompt-editor" class="form-input" rows="15" style="font-size:.82rem;font-family:monospace">${current.replace(/</g,'&lt;')}</textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary btn-block" onclick="saveSystemPrompt()">дњЭе≠Ш</button>
      <button class="btn btn-secondary" onclick="restoreDefaultPrompt()" style="white-space:nowrap">жБҐе§НйїШиЃ§</button>
    </div>
  `);
}

function saveSystemPrompt() {
  const text = document.getElementById('sys-prompt-editor')?.value?.trim();
  if (!text) { showToast('жПРз§ЇиѓНдЄНиГљдЄЇз©Ї'); return; }
  DB.set('mc_system_prompt', text);
  closeSheet();
  showToast('з≥їзїЯжПРз§ЇиѓНеЈ≤дњЭе≠Ш');
}

function restoreDefaultPrompt() {
  DB.set('mc_system_prompt', DEFAULT_CLINICAL_PROMPT);
  const el = document.getElementById('sys-prompt-editor');
  if (el) el.value = DEFAULT_CLINICAL_PROMPT;
  showToast('еЈ≤жБҐе§НйїШиЃ§жПРз§ЇиѓН');
}

function renderQuickCalcToggles() {
  const saved = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  const allQuick = CalcRegistry.filter(c => c.quick);
  return allQuick.map(c =>
    `<label style="display:inline-flex;align-items:center;gap:6px;margin:4px 8px 4px 0;padding:6px 10px;background:var(--bg);border-radius:8px;font-size:.85rem;cursor:pointer">
      <input type="checkbox" ${saved.includes(c.id)?'checked':''} onchange="saveQuickCalcSetting('${c.id}',this.checked)">
      ${c.icon} ${c.name}
    </label>`
  ).join('');
}

function saveQuickCalcSetting(id, on) {
  let saved = DB.get('mc_quick_calcs', DEFAULT_QUICK_IDS);
  if (on && !saved.includes(id)) saved.push(id);
  if (!on) saved = saved.filter(x => x !== id);
  DB.set('mc_quick_calcs', saved);
}

function openLabRangeSettings() {
  const saved = DB.get('mc_lab_ranges', {});
  const ranges = { ...Object.fromEntries(LAB_RANGE_DEFAULTS.map(d => [d.key, d])), ...saved };

  let html = `<div class="card-title" style="margin-bottom:12px">еМЦй™МеПВиАГиМГеЫі</div>
  <p class="text-sm text-secondary mb-12">дњЃжФєеРОе∞Жељ±еУНеЉВеЄЄеАЉеИ§жЦ≠еТМиґЛеКњйҐДи≠¶</p>
  <div style="max-height:60vh;overflow-y:auto">`;
  for (const def of LAB_RANGE_DEFAULTS) {
    const r = ranges[def.key] || def;
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.82rem">
      <span style="width:100px;flex-shrink:0;font-weight:500">${def.label}</span>
      <input type="number" class="form-input lr-lo" data-key="${def.key}" value="${r.lo ?? ''}" placeholder="дљО" style="width:70px;padding:4px 6px;font-size:.82rem">
      <span style="color:var(--text2)">-</span>
      <input type="number" class="form-input lr-hi" data-key="${def.key}" value="${r.hi ?? ''}" placeholder="йЂШ" style="width:70px;padding:4px 6px;font-size:.82rem">
    </div>`;
  }
  html += `</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-primary" style="flex:1" onclick="saveLabRanges()">дњЭе≠Ш</button>
    <button class="btn btn-secondary" onclick="resetLabRanges()">жБҐе§НйїШиЃ§</button>
  </div>`;
  openSheet(html);
}

function saveLabRanges() {
  const ranges = {};
  const defs = LAB_RANGE_DEFAULTS || [];
  document.querySelectorAll('.lr-lo').forEach(el => {
    const key = el.dataset.key;
    const lo = parseFloat(el.value);
    const hi = parseFloat(document.querySelector(`.lr-hi[data-key="${key}"]`)?.value);
    const def = defs.find(d => d.key === key);
    ranges[key] = { key, label: def?.label || '', lo: isNaN(lo) ? null : lo, hi: isNaN(hi) ? null : hi };
  });
  DB.set('mc_lab_ranges', ranges);
  State.labRanges = ranges;
  closeSheet();
  showToast('еПВиАГиМГеЫіеЈ≤дњЭе≠Ш');
}

function resetLabRanges() {
  DB.set('mc_lab_ranges', {});
  State.labRanges = {};
  closeSheet();
  showToast('еЈ≤жБҐе§НйїШиЃ§иМГеЫі');
}

function clearAllData() {
  if (!confirm('з°ЃиЃ§жЄЕйЩ§жЙАжЬЙжХ∞жНЃпЉЯж≠§жУНдљЬдЄНеПѓжБҐе§НпЉБ')) return;
  if (!confirm('еЖНжђ°з°ЃиЃ§пЉЪињЩе∞ЖеИ†йЩ§жЙАжЬЙжВ£иАЕиЃ∞ељХгАБиЃЊзљЃеТМAIеОЖеП≤гАВ')) return;
  State.patients = []; State.savePatients();
  State.favorites = []; State.saveFavorites();
  State.aiHistory = []; State.saveAIHistory();
  State.events = []; State.saveEvents();
  showToast('жЙАжЬЙжХ∞жНЃеЈ≤жЄЕйЩ§');
  Pages.render('workspace');
}

function exportAllData() {
  const data = {
    patients: State.patients,
    favorites: State.favorites,
    quickCmds: State.quickCmds,
    events: State.events,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `clinical-data-${today()}.json`;
  a.click();
  showToast('жХ∞жНЃеЈ≤еѓЉеЗЇ');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.patients) { State.patients = data.patients; State.savePatients(); }
        if (data.favorites) { State.favorites = data.favorites; State.saveFavorites(); }
        if (data.quickCmds) { State.quickCmds = data.quickCmds; State.saveQuickCmds(); }
        Pages.render('workspace');
        showToast('жХ∞жНЃеЈ≤еѓЉеЕ•');
      } catch(err) { showToast('еѓЉеЕ•е§±иі•: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function sendToAI(prompt) {
  Router.switch('ai');
  setTimeout(() => {
    appendAI('user', prompt);
    _callAI();
  }, 200);
}
