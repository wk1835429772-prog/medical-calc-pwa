}

function sendAIMessage() {
  const input = $('aiInput');
  const msg = input?.value?.trim();
  if (!msg && !_pendingAIImage) return;
  input.value = '';
  const displayMsg = _pendingAIImage ? (msg || '📷 图片') + ' [附图]' : msg;
  appendAI('user', displayMsg);
  _callAI();
}

function handleAIImageUpload(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Resize to max 800px width to reduce token usage
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = img.width > maxW ? maxW / img.width : 1;
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.8);
      const mimeType = 'image/jpeg';
      _pendingAIImage = { base64, mimeType };
      // Show preview
      const preview = $('aiImagePreview');
      if (preview) {
        preview.style.display = 'block';
        preview.innerHTML = `<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg);border-radius:8px">
          <img src="${base64}" style="max-height:60px;border-radius:4px">
          <button class="btn btn-sm btn-secondary" onclick="clearAIImage()" style="padding:2px 6px;font-size:.75rem">✕</button>
        </div>`;
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
}

function clearAIImage() {
  _pendingAIImage = null;
  const preview = $('aiImagePreview');
  if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
}

function runQuickCmd(id) {
  const cmd = State.quickCmds.find(c => c.id === id);
  if (!cmd) return;
  // "分析全部" commands use all-patient context
  if (cmd.id === 'qc7' || cmd.label.includes('全部')) {
    Router.switch('ai');
    setTimeout(() => sendAllPatientReports(), 200);
    return;
  }
  let prompt = cmd.prompt;
  // Attach current patient context if available
  if (State.currentPatientId) {
    const p = State.getCurrentPatient();
    const rec = State.getCurrentRecord();
    if (p && rec) {
      const ctx = buildPatientContext(p, rec);
      prompt = `${ctx}\n\n${prompt}`;
    }
  }
  appendAI('user', `[${cmd.label}] ${cmd.prompt}`);
  _callAI([{ role: 'system', content: getSystemPrompt() }, ...State.aiHistory.map(m => ({ role: m.role, content: m.content }))]);
}

function sendAllPatientReports() {
  let context = '以下是今日所有患者的情况摘要：\n\n';
  for (const p of State.patients) {
    const rec = State.getPatientRecord(p, State.currentDate);
    if (rec) context += buildPatientContext(p, rec) + '\n\n';
  }
  context += '请分析所有患者的病情，指出需要关注的问题和建议。';
  appendAI('user', '分析全部患者');
  _callAI([{ role: 'system', content: getSystemPrompt() }, { role: 'user', content: context }]);
}

function buildPatientContext(p, rec) {
  const lines = [`患者: ${p.name} ${p.bed||''} ${p.sex||''}${p.age||''}岁`];
  if (p.diagnosis) lines.push(`诊断: ${p.diagnosis}`);
  const v = rec.vitals || {};
  const vitalParts = [];
  if (v.temp) vitalParts.push(`T${v.temp}`);
  if (v.hr) vitalParts.push(`HR${v.hr}`);
  if (v.sbp && v.dbp) vitalParts.push(`BP${v.sbp}/${v.dbp}`);
  if (v.spo2) vitalParts.push(`SpO₂${v.spo2}`);
  if (v.conscious) vitalParts.push(v.conscious);
  if (vitalParts.length) lines.push(`体征: ${vitalParts.join(' ')}`);
  const l = rec.labs || {};
  const labParts = [];
  for (const [k, label] of [['abg_ph','pH'],['abg_pco2','PaCO₂'],['abg_hco3','HCO₃⁻'],['abg_lac','乳酸'],['wbc','WBC'],['hgb','Hb'],['plt','PLT'],['cr','Cr'],['bun','BUN'],['k','K⁺'],['na','Na⁺'],['pct','PCT'],['crp','CRP']]) {
    if (l[k]) labParts.push(`${label}=${l[k]}`);
  }
  if (labParts.length) lines.push(`化验: ${labParts.join(' ')}`);
  if (rec.medications?.length) lines.push(`用药: ${rec.medications.map(m => `${m.name} ${m.dose} ${m.freq}`).join('; ')}`);
  if (rec.exam) lines.push(`查体: ${rec.exam.slice(0, 200)}`);
  if (rec.txChanges) lines.push(`治疗变更: ${rec.txChanges}`);
  if (rec.notes) lines.push(`备注: ${rec.notes}`);
  return lines.join('\n');
}

function appendAI(role, content) {
  State.aiHistory.push({ role, content, time: Date.now() });
  DB.set('mc_ai_history', State.aiHistory);
  renderAIChatMessages();
}

function renderAIChatMessages() {
  const body = $('aiChatBody');
  if (!body) return;
  body.innerHTML = State.aiHistory.map((m, i) => {
    let content = m.content || '';
    content = content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    content = content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    content = content.replace(/^- (.+)$/gm, '&bull; $1');
    content = content.replace(/\n/g, '<br>');
    let thinkHtml = '';
    if (m.role === 'assistant') {
      if (m.thinkingTime) thinkHtml = `<div class="ai-thinking">已深度思考 · ${m.thinkingTime}s</div>`;
      else if (i === State.aiHistory.length - 1 && !m.content) thinkHtml = `<div class="ai-thinking"><span class="spin"></span> 思考中...</div>`;
    }
    return `${thinkHtml}<div class="ai-msg ${m.role === 'user' ? 'ai-msg-user' : 'ai-msg-assistant'}">${content}</div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}

function _callAI(messages) {
  const url = DB.get('mc_ai_url', '');
  const key = DB.get('mc_ai_key', '');
  const model = DB.get('mc_ai_model', 'deepseek-chat');
  if (!url || !key) { showToast('请先配置 AI 服务'); return; }

  if (_aiAbortController) try { _aiAbortController.abort(); } catch {}
  _aiAbortController = new AbortController();
  _aiStartTime = Date.now();
  _aiFirstContent = true;

  if (!messages) {
    messages = [{ role: 'system', content: getSystemPrompt() }];
    messages.push(...State.aiHistory.map(m => ({ role: m.role, content: m.content })));
  }

  // Support image in last user message
  if (_pendingAIImage) {
    const lastUserIdx = messages.map((m,i) => m.role==='user'?i:-1).filter(i=>i>=0).pop();
    if (lastUserIdx != null) {
      const text = messages[lastUserIdx].content || '';
      messages[lastUserIdx].content = [
        { type: 'text', text },
        { type: 'image_url', image_url: { url: _pendingAIImage.base64 } }
      ];
    }
    _pendingAIImage = null;
    const preview = $('aiImagePreview');
    if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
  }

  // Add placeholder for assistant response
  State.aiHistory.push({ role: 'assistant', content: '' });
  renderAIChatMessages();

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model, messages, stream: true }),
    signal: _aiAbortController.signal
  }).then(response => {
    if (!response.ok) { response.text().then(t => { _aiError(`HTTP ${response.status}: ${t.slice(0, 200)}`); }); return; }
    const ct = response.headers.get('content-type') || '';
    if (ct.includes('event-stream') || ct.includes('stream')) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const readChunk = () => {
        reader.read().then(({ done, value }) => {
          if (done) { _aiDone(); return; }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === 'data: [DONE]') continue;
            if (!trimmed.startsWith('data: ')) continue;
            try {
              const json = JSON.parse(trimmed.slice(6));
              const content = json.choices?.[0]?.delta?.content;
              if (content) _aiChunk(content);
            } catch {}
          }
          readChunk();
        }).catch(e => { if (e.name !== 'AbortError') _aiError(e.message); });
      };
      readChunk();
    } else {
      response.json().then(json => {
        const content = json.choices?.[0]?.message?.content;
        if (content) { _aiChunk(content); _aiDone(); }
        else _aiError('无法解析 AI 响应');
      }).catch(e => _aiError(e.message));
    }
  }).catch(e => { if (e.name !== 'AbortError') _aiError(e.message); });
}

let _aiStreamSaveTimer = null;
function _aiChunk(content) {
  if (_aiFirstContent) {
    _aiFirstContent = false;
    const elapsed = ((Date.now() - _aiStartTime) / 1000).toFixed(1);
    const last = State.aiHistory[State.aiHistory.length - 1];
    if (last?.role === 'assistant') last.thinkingTime = elapsed;
  }
  const last = State.aiHistory[State.aiHistory.length - 1];
  if (last?.role === 'assistant') last.content += content;
  renderAIChatMessages();
  // V3.4: debounce-save streaming progress (every 1s during stream)
  clearTimeout(_aiStreamSaveTimer);
  _aiStreamSaveTimer = setTimeout(() => {
    DB.set('mc_ai_history', State.aiHistory);
  }, 1000);
}

function _aiDone() {
  clearTimeout(_aiStreamSaveTimer);
  DB.set('mc_ai_history', State.aiHistory);
  _aiAbortController = null;
}

function _aiError(msg) {
  clearTimeout(_aiStreamSaveTimer);
  const last = State.aiHistory[State.aiHistory.length - 1];
  if (last?.role === 'assistant') last.content = `⚠️ ${msg}`;
  renderAIChatMessages();
  DB.set('mc_ai_history', State.aiHistory);
  _aiAbortController = null;
}

function stopAI() {
  if (_aiAbortController) { try { _aiAbortController.abort(); } catch {} _aiAbortController = null; }
  showToast('AI 请求已停止');
}

function clearAIChat() {
  State.aiHistory = [];
  DB.set('mc_ai_history', []);
  renderAI();
}

/* ===== Patient Sub-AI (Report Tab) ===== */
if (!State.patientAIHistory) State.patientAIHistory = {};

function renderPatientAIHistory(pid) {
  const hist = State.patientAIHistory[pid] || [];
  if (!hist.length) return '<div class="text-sm text-secondary text-center" style="padding:8px">点击快捷指令或输入问题开始分析</div>';
  return hist.map(m => {
    let content = (m.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    content = content.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
    return `<div class="ai-msg ${m.role==='user'?'ai-msg-user':'ai-msg-assistant'}" style="max-width:90%;font-size:.82rem;margin-bottom:6px">${content}</div>`;
  }).join('');
}

function sendPatientAI(pid, presetPrompt) {
  const url = DB.get('mc_ai_url', '');
  const key = DB.get('mc_ai_key', '');
  const model = DB.get('mc_ai_model', 'deepseek-chat');
  if (!url || !key) { showToast('请先配置 AI 服务'); return; }

  const inputEl = document.getElementById(`patient-ai-input-${pid}`);
  const prompt = presetPrompt || inputEl?.value?.trim();
  if (!prompt) return;
  if (inputEl && !presetPrompt) inputEl.value = '';

  const p = State.patients.find(x => x.id === pid);
  const rec = p ? State.getPatientRecord(p, State.currentDate) : null;
  let context = '';
  if (p && rec) context = buildPatientContext(p, rec);

  if (!State.patientAIHistory[pid]) State.patientAIHistory[pid] = [];
  State.patientAIHistory[pid].push({ role: 'user', content: prompt });
  // V3.4: persist user message immediately (don't wait for stream done)
  DB.set('mc_patient_ai_' + pid, State.patientAIHistory[pid]);

  const messages = [
    { role: 'system', content: getSystemPrompt() },
    { role: 'user', content: `患者信息：\n${context}\n\n问题：${prompt}` }
  ];

  State.patientAIHistory[pid].push({ role: 'assistant', content: '' });
  const histEl = document.getElementById(`patient-ai-history-${pid}`);
  if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);

  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model, messages, stream: true })
  }).then(response => {
    if (!response.ok) { response.text().then(t => { _patientAIError(pid, `HTTP ${response.status}`); }); return; }
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let _streamSaveTimer = null;
    const readChunk = () => {
      reader.read().then(({ done, value }) => {
        if (done) { _patientAIDone(pid); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') { _patientAIDone(pid); return; }
          try {
            const delta = JSON.parse(data).choices?.[0]?.delta;
            if (delta?.content) {
              const hist = State.patientAIHistory[pid];
              if (hist?.length) { hist[hist.length-1].content += delta.content; }
              if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);
              histEl.scrollTop = histEl.scrollHeight;
              // V3.4: debounce-save streaming progress (every 1s during stream)
              clearTimeout(_streamSaveTimer);
              _streamSaveTimer = setTimeout(() => {
                DB.set('mc_patient_ai_' + pid, State.patientAIHistory[pid]);
              }, 1000);
            }
          } catch {}
        }
        readChunk();
      });
    };
    readChunk();
  }).catch(e => _patientAIError(pid, e.message));
}

function _patientAIDone(pid) {
  DB.set('mc_patient_ai_' + pid, State.patientAIHistory[pid]);
}

function _patientAIError(pid, msg) {
  const hist = State.patientAIHistory[pid];
  if (hist?.length) hist[hist.length-1].content = `⚠️ ${msg}`;
  const histEl = document.getElementById(`patient-ai-history-${pid}`);
  if (histEl) histEl.innerHTML = renderPatientAIHistory(pid);
  // V3.4: persist error state
  DB.set('mc_patient_ai_' + pid, State.patientAIHistory[pid]);

function setAIPreset(preset, btn) {
  const presets = {
    deepseek: { url: 'https://api.deepseek.com/chat/completions', model: 'deepseek-chat' },

function testAI() {
  const url = document.querySelector('#sheetContent #ai-url')?.value?.trim();
  const key = document.querySelector('#sheetContent #ai-key')?.value?.trim();
  const model = document.querySelector('#sheetContent #ai-model')?.value?.trim() || 'deepseek-chat';
  if (!url || !key) { showToast('请填写 URL 和 Key'); return; }
  showToast('测试中...');
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({ model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5 })
  }).then(r => {
    if (r.ok) {
      DB.set('mc_ai_connected', true);
      DB.set('mc_ai_last_test', Date.now());
      showToast('✅ 连接成功');
      renderAI();
    } else {
      DB.set('mc_ai_connected', false);
      r.text().then(t => showToast(`❌ ${r.status}: ${t.slice(0,100)}`));
    }
  }).catch(e => {
    DB.set('mc_ai_connected', false);
    showToast('❌ ' + e.message);
  });
}

function startVoiceInput() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('浏览器不支持语音输入');
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = false;
  const btn = $('voiceBtn');
  if (btn) { btn.textContent = '🔴'; btn.disabled = true; }
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    const input = $('aiInput');
    if (input) input.value = text;
    if (btn) { btn.textContent = '🎤'; btn.disabled = false; }
  };
  recognition.onerror = () => { if (btn) { btn.textContent = '🎤'; btn.disabled = false; } showToast('语音识别失败'); };
  recognition.onend = () => { if (btn) { btn.textContent = '🎤'; btn.disabled = false; } };
  recognition.start();
}

async function testStorage() {
  const testKey = '_test_' + Date.now();
  const testVal = { ts: Date.now(), patients: State.patients.length };
  const results = [];

  // Test 1: localStorage
  try {
    localStorage.setItem(testKey, JSON.stringify(testVal));
    const readback = JSON.parse(localStorage.getItem(testKey));
    localStorage.removeItem(testKey);
    results.push(readback?.ts === testVal.ts ? '✅ localStorage: 正常' : '❌ localStorage: 数据不一致');
  } catch(e) {
    results.push('❌ localStorage: ' + e.message);
  }

  // Test 2: IndexedDB
  if (DB._db) {
    try {
      const tx = DB._db.transaction('kv', 'readwrite');
      const store = tx.objectStore('kv');
      store.put(testVal, testKey);
      tx.oncomplete = () => {
        const tx2 = DB._db.transaction('kv', 'readonly');
        const req = tx2.objectStore('kv').get(testKey);
        req.onsuccess = () => {
          const readback = req.result;
          const tx3 = DB._db.transaction('kv', 'readwrite');
          tx3.objectStore('kv').delete(testKey);
          results.push(readback?.ts === testVal.ts ? '✅ IndexedDB: 正常' : '❌ IndexedDB: 数据不一致');
          showTestResult(results);
        };
        req.onerror = () => { results.push('❌ IndexedDB: 读取失败'); showTestResult(results); };
      };
      tx.onerror = () => { results.push('❌ IndexedDB: 写入失败'); showTestResult(results); };
      return;
    } catch(e) {
      results.push('❌ IndexedDB: ' + e.message);
    }
  } else {
    results.push('⚠️ IndexedDB: 未初始化');
  }

  showTestResult(results);

  async function showTestResult(r) {
    const mcKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('mc_')) mcKeys.push(k);
    }
    const idbReady = DB._idbReady ? '已就绪' : '未就绪';

    // V3.4: persistent storage & quota info
    let persistLine = '持久存储: 不支持';
    let quotaLine = '';
    try {
      if (navigator.storage) {
        if (navigator.storage.persisted) {
          const persisted = await navigator.storage.persisted();
          persistLine = persisted ? '✅ 持久存储: 已生效(数据安全)' : '⚠️ 持久存储: 未生效(可能被系统清理)';
        }
        if (navigator.storage.estimate) {
          const est = await navigator.storage.estimate();
          const usedMB = ((est.usage || 0) / 1048576).toFixed(1);
          const quotaMB = ((est.quota || 0) / 1048576).toFixed(0);
          quotaLine = `\n存储配额: ${usedMB}MB / ${quotaMB}MB`;
        }
      }
    } catch(e) {}

    alert(`${r.join('\n')}\n\n${persistLine}${quotaLine}\n\n缓存项: ${Object.keys(DB._cache).length}\nlocalStorage项: ${mcKeys.length}\nIDB状态: ${idbReady}\n患者数: ${State.patients.length}\n\n关闭页面再打开，数据应保留。\n如仍丢失，请截图发给我。`);
  }
}

function saveLabRanges() {
  const ranges = {};
  const defs = LAB_RANGE_DEFAULTS || [];
  document.querySelectorAll('.lr-lo').forEach(el => {
    const key = el.dataset.key;
    const lo = parseFloat(el.value);
    const hi = parseFloat(document.querySelector(`.lr-hi[data-key="${key}"]`)?.value);
    const def = defs.find(d => d.key === key);
    ranges[key] = { key, label: def?.label || '', lo: isNaN(lo) ? null : lo, hi: isNaN(hi) ? null : hi };
  });
  DB.set('mc_lab_ranges', ranges);
  State.labRanges = ranges;
  closeSheet();
  showToast('参考范围已保存');

function exportAllData() {
  const data = {
    patients: State.patients,
    favorites: State.favorites,
    quickCmds: State.quickCmds,
    events: State.events,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `clinical-data-${today()}.json`;
  a.click();
  showToast('数据已导出');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.patients) { State.patients = data.patients; State.savePatients(); }
        if (data.favorites) { State.favorites = data.favorites; State.saveFavorites(); }
        if (data.quickCmds) { State.quickCmds = data.quickCmds; State.saveQuickCmds(); }
        Pages.render('workspace');
        showToast('数据已导入');
      } catch(err) { showToast('导入失败: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function sendToAI(prompt) {
  Router.switch('ai');
  setTimeout(() => {
    appendAI('user', prompt);
    _callAI();
  }, 200);
}

/* ===== Start ===== */
init();
</script>
</body>
</html>
